<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>STIAM-HR Portal</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <!-- Supabase JS v2 UMD (no bundler needed) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

/* ════════════════════════════════════════════════════════════
   SUPABASE CLIENT
   ════════════════════════════════════════════════════════════ */
const SUPABASE_URL = "https://qvtyqrwitdtxaomgaujr.supabase.co";
const SUPABASE_KEY = "sb_publishable_YHqznPjbfc9uV-LuWcSANw_MQgaCNkS";
const { createClient } = window.supabase;
const supa = createClient(SUPABASE_URL, SUPABASE_KEY);

const TODAY = new Date().toISOString().split('T')[0];

/* ─── DATA MAPPERS  (snake_case DB → camelCase app) ───────── */
const mapStaff = s => ({
  id:s.id, name:s.name, email:s.email, phone:s.phone||'—',
  designation:s.designation, dept:s.dept, company:s.company,
  color:s.color, manager:s.manager||'', photo:s.photo||null,
  achievements:s.achievements||'', docs:[],
  isAdmin:s.is_admin||false, isSuperAdmin:s.is_super_admin||false, customPassword:s.custom_password||null, customPassword:s.custom_password||null,
});
const mapLeave = l => ({
  id:l.id, staffId:l.staff_id, employee:l.employee, type:l.type,
  from:l.from_date, to:l.to_date, days:l.days, relief:l.relief||'',
  reason:l.reason||'', status:l.status, submitted:l.submitted,
});
const mapClock = c => ({
  id:c.staff_id, status:c.status,
  ci:c.clock_in||'—', co:c.clock_out||'—',
});
const mapExited = e => ({
  id:e.id, name:e.name, role:e.role, dept:e.dept,
  exitDate:e.exit_date, reason:e.reason, type:e.type,
  clearance:e.clearance, company:e.company, notes:e.notes||'',
});
const mapPost = p => ({
  id:p.id, title:p.title, dept:p.dept, type:p.type,
  req:p.requirements, status:p.status, company:p.company,
  posted:p.posted_date,
});
const mapGrievance = g => ({
  id:g.id, category:g.category, description:g.description,
  incidentDate:g.incident_date, status:g.status,
  submittedAt:g.submitted_at,
});
const mapAdvance = a => ({
  id:a.id, staffId:a.staff_id, employee:a.employee,
  amount:a.amount, reason:a.reason,
  repaymentMonths:a.repayment_months, status:a.status,
  submittedAt:a.submitted_at,
});
const mapAppraisal = a => ({
  id:a.id, staffId:a.staff_id, employee:a.employee,
  type:a.type, period:a.period, selfAssessment:a.self_assessment,
  status:a.status, hrComments:a.hr_comments,
  submittedAt:a.submitted_at,
});
const mapStaffDoc = d => ({
  id:d.id, staffId:d.staff_id, name:d.name,
  path:d.storage_path, size:d.file_size, type:d.file_type,
  uploaded:new Date(d.uploaded_at).toLocaleDateString(),
});
const mapNotif = n => ({
  id:n.id, recipientId:n.recipient_id, fromName:n.from_name,
  title:n.title, message:n.message, type:n.type||'info',
  read:n.read||false, createdAt:n.created_at,
});

/* ════════════════════════════════════════════════════════════
   NOTIFICATION CONTEXT  (global bell + message center)
   ════════════════════════════════════════════════════════════ */
const NotifContext = React.createContext(null);
const NotifProvider = ({children, user, allStaff, isOffline}) => {
  const[notifs, setNotifs] = useState([]);
  const[panelOpen, setPanelOpen] = useState(false);
  const toast = useToast();

  // Load on mount / when user changes
  useEffect(()=>{
    if(!user||isOffline) return;
    db.getNotifs(user.id).then(({data})=>{ if(data) setNotifs(data.map(mapNotif)); });
  },[user?.id, isOffline]);

  // Real-time listener for new notifications
  useEffect(()=>{
    if(!user||isOffline) return;
    const ch = supa.channel('notifs-'+user.id)
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'notifications',filter:`recipient_id=eq.${user.id}`},
        payload=>{
          const n = mapNotif(payload.new);
          setNotifs(p=>[n,...p]);
          toast.info('📬 '+n.title);
        })
      .subscribe();
    return()=>supa.removeChannel(ch);
  },[user?.id, isOffline]);

  const unread = notifs.filter(n=>!n.read).length;

  // Helper: send notification(s) — pass array of recipient ids
  const send = async (recipientIds, fromName, title, message, type='info') => {
    if(isOffline||!recipientIds?.length) return;
    const rows = recipientIds.map(id=>({
      recipient_id:id, from_name:fromName,
      title, message, type, read:false
    }));
    await db.addNotif(rows);
  };

  // Helper: find all admin staff IDs
  const adminIds = allStaff.filter(s=>s.isAdmin||s.isSuperAdmin).map(s=>s.id);

  const markRead = async(id) => {
    await db.markRead(id);
    setNotifs(p=>p.map(n=>n.id===id?{...n,read:true}:n));
  };
  const markAll = async() => {
    await db.markAllRead(user.id);
    setNotifs(p=>p.map(n=>({...n,read:true})));
  };

  return(
    <NotifContext.Provider value={{notifs,unread,panelOpen,setPanelOpen,send,adminIds,markRead,markAll}}>
      {children}
      {/* ── Notification Bell (fixed top-right) ── */}
      {user && (
        <button onClick={()=>setPanelOpen(p=>!p)} style={{
          position:'fixed', top:16, right:20, zIndex:900,
          background:'#0D1B3E', border:'none', borderRadius:'50%',
          width:42, height:42, cursor:'pointer', display:'flex',
          alignItems:'center', justifyContent:'center', fontSize:18,
          boxShadow:'0 4px 14px rgba(13,27,62,.35)', transition:'all .2s'
        }}>
          🔔
          {unread>0&&<span style={{
            position:'absolute', top:-4, right:-4, background:'#E53E3E',
            color:'#fff', borderRadius:'50%', width:18, height:18,
            fontSize:10, fontWeight:800, display:'flex', alignItems:'center',
            justifyContent:'center', fontFamily:"'DM Sans',sans-serif"
          }}>{unread>9?'9+':unread}</span>}
        </button>
      )}
      {/* ── Notification Panel ── */}
      {panelOpen&&user&&(
        <div style={{
          position:'fixed', top:0, right:0, bottom:0, width:380, maxWidth:'100vw',
          background:'#fff', zIndex:1100, boxShadow:'-8px 0 40px rgba(13,27,62,.18)',
          display:'flex', flexDirection:'column', fontFamily:"'DM Sans',sans-serif"
        }}>
          {/* Panel Header */}
          <div style={{background:'linear-gradient(135deg,#0D1B3E,#162550)', color:'#fff', padding:'20px 22px'}}>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8}}>
              <div style={{fontFamily:"'Playfair Display',serif", fontSize:17, fontWeight:700}}>📬 Messages & Notifications</div>
              <button onClick={()=>setPanelOpen(false)} style={{background:'none',border:'none',color:'rgba(255,255,255,.7)',cursor:'pointer',fontSize:20}}>✕</button>
            </div>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
              <span style={{fontSize:12, opacity:.7}}>{unread} unread · {notifs.length} total</span>
              {unread>0&&<button onClick={markAll} style={{background:'rgba(201,168,76,.2)',border:'1px solid rgba(201,168,76,.4)',color:'#C9A84C',borderRadius:7,padding:'4px 10px',fontSize:11,cursor:'pointer',fontFamily:"'DM Sans',sans-serif"}}>Mark all read</button>}
            </div>
          </div>
          {/* Notifications List */}
          <div style={{flex:1, overflowY:'auto', padding:'8px 0'}}>
            {notifs.length===0&&(
              <div style={{textAlign:'center', padding:'60px 20px', color:'#8892A4'}}>
                <div style={{fontSize:40, marginBottom:12}}>📭</div>
                <div style={{fontWeight:600}}>No messages yet</div>
                <div style={{fontSize:12, marginTop:4}}>Notifications will appear here</div>
              </div>
            )}
            {notifs.map(n=>(
              <div key={n.id} onClick={()=>markRead(n.id)} style={{
                padding:'14px 20px', borderBottom:'1px solid #F0F2F8',
                background:n.read?'#fff':'#F0F7FF', cursor:'pointer',
                transition:'background .15s', borderLeft:`3px solid ${n.type==='success'?'#1A7F64':n.type==='error'?'#E53E3E':n.type==='warning'?'#DD6B20':'#2980B9'}`
              }}>
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:8}}>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:n.read?500:700, fontSize:13, color:'#0D1B3E', marginBottom:3}}>{n.title}</div>
                    <div style={{fontSize:12.5, color:'#4A5568', lineHeight:1.5}}>{n.message}</div>
                    <div style={{fontSize:11, color:'#8892A4', marginTop:6, display:'flex', gap:8, alignItems:'center'}}>
                      {n.fromName&&<span>From: <strong>{n.fromName}</strong></span>}
                      <span>{new Date(n.createdAt).toLocaleString('en-NG',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}</span>
                    </div>
                  </div>
                  {!n.read&&<span style={{width:8,height:8,borderRadius:'50%',background:'#2980B9',flexShrink:0,marginTop:4}}/>}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
      {/* ── Backdrop ── */}
      {panelOpen&&<div onClick={()=>setPanelOpen(false)} style={{position:'fixed',inset:0,zIndex:1099,background:'rgba(13,27,62,.3)'}}/>}
    </NotifContext.Provider>
  );
};
const useNotif = () => React.useContext(NotifContext);

/* ─── DB OPERATIONS ────────────────────────────────────────── */
const db = {

  /* ── STAFF ─────────────────────────────────────────────── */
  // Load all staff rows (admin) or single row (staff)
  getStaff:       ()        => supa.from('staff').select('*').order('id'),
  getStaffById:   (id)      => supa.from('staff').select('*').eq('id',id).single(),
  addStaff:       (row)     => supa.from('staff').insert(row).select(),
  // Staff can only update their own phone / photo / achievements
  updateStaff:    (id,u)    => supa.from('staff').update(u).eq('id',id),
  updatePassword: (id,pw)   => supa.from('staff').update({custom_password:pw}).eq('id',id),
  setAdmin:       (id,val)  => supa.from('staff').update({is_admin:val}).eq('id',id),

  /* ── LEAVE REQUESTS ─────────────────────────────────────── */
  // All leaves (admin) — ordered newest first
  getLeaves:      ()        => supa.from('leave_requests').select('*').order('created_at',{ascending:false}),
  // Just this staff member's leaves
  getMyLeaves:    (staffId) => supa.from('leave_requests').select('*').eq('staff_id',staffId).order('created_at',{ascending:false}),
  addLeave:       (row)     => supa.from('leave_requests').insert(row).select(),
  // Admin approves / declines
  updateLeave:    (id,st)   => supa.from('leave_requests').update({status:st}).eq('id',id),

  /* ── CLOCK RECORDS ──────────────────────────────────────── */
  // Fetch today's register (admin sees all, staff sees own)
  getTodayClock:  ()        => supa.from('clock_records').select('*').eq('record_date',TODAY),
  // Upsert: creates the row on first clock-in, updates on retry
  clockIn:        (staffId,time) => supa.from('clock_records').upsert(
    {staff_id:staffId, record_date:TODAY, clock_in:time, status:'Present'},
    {onConflict:'staff_id,record_date'}
  ),
  clockOut:       (staffId,time) => supa.from('clock_records')
    .update({clock_out:time}).eq('staff_id',staffId).eq('record_date',TODAY),
  setAbsent:      (staffId)      => supa.from('clock_records').upsert(
    {staff_id:staffId, record_date:TODAY, status:'Absent'},
    {onConflict:'staff_id,record_date'}
  ),

  /* ── EXITED STAFF ───────────────────────────────────────── */
  getExited:      ()        => supa.from('exited_staff').select('*').order('exit_date',{ascending:false}),
  addExited:      (row)     => supa.from('exited_staff').insert(row).select(),
  updateExited:   (id,u)    => supa.from('exited_staff').update(u).eq('id',id),
  deleteExited:   (id)      => supa.from('exited_staff').delete().eq('id',id),

  /* ── REDEPLOYMENT / INTERNAL TRANSFERS ─────────────────── */
  // dept = from_company, type = to_company (field repurposed)
  getPosts:       ()        => supa.from('redeployment_posts').select('*').order('posted_date',{ascending:false}),
  addPost:        (row)     => supa.from('redeployment_posts').insert(row).select(),
  updatePost:     (id,u)    => supa.from('redeployment_posts').update(u).eq('id',id),
  getTransfers:   ()        => supa.from('redeployment_posts').select('*').order('posted_date',{ascending:false}),
  addTransfer:    (row)     => supa.from('redeployment_posts').insert(row).select(),
  updateTransfer: (id,u)    => supa.from('redeployment_posts').update(u).eq('id',id),

  /* ── GRIEVANCES (anonymous — no staff_id stored) ────────── */
  // Admin reads all; any user can submit
  getGrievances:  ()        => supa.from('grievances').select('*').order('submitted_at',{ascending:false}),
  addGrievance:   (row)     => supa.from('grievances').insert(row).select(),
  updateGrievance:(id,u)    => supa.from('grievances').update(u).eq('id',id),

  /* ── SALARY ADVANCES ────────────────────────────────────── */
  // Admin reads all; staff submits + reads own
  getAdvances:    ()        => supa.from('salary_advances').select('*').order('submitted_at',{ascending:false}),
  getMyAdvances:  (staffId) => supa.from('salary_advances').select('*').eq('staff_id',staffId).order('submitted_at',{ascending:false}),
  addAdvance:     (row)     => supa.from('salary_advances').insert(row).select(),
  updateAdvance:  (id,u)    => supa.from('salary_advances').update(u).eq('id',id),

  /* ── APPRAISAL REQUESTS ─────────────────────────────────── */
  // Admin reads all; staff submits + reads own
  getAppraisals:  ()        => supa.from('appraisal_requests').select('*').order('submitted_at',{ascending:false}),
  getMyAppraisals:(staffId) => supa.from('appraisal_requests').select('*').eq('staff_id',staffId).order('submitted_at',{ascending:false}),
  addAppraisal:   (row)     => supa.from('appraisal_requests').insert(row).select(),
  updateAppraisal:(id,u)    => supa.from('appraisal_requests').update(u).eq('id',id),

  /* ── STAFF DOCUMENTS (metadata, file in Storage) ────────── */
  getMyDocs:      (staffId) => supa.from('staff_documents').select('*').eq('staff_id',staffId).order('uploaded_at',{ascending:false}),
  addDoc:         (row)     => supa.from('staff_documents').insert(row).select(),
  deleteDoc:      (id)      => supa.from('staff_documents').delete().eq('id',id),

  /* ── SUPABASE STORAGE  (bucket: hr-documents) ───────────── */
  // HR vault documents
  /* ── VAULT DOCUMENTS TABLE ─────────────────────────────── */
  getVaultDocs:   ()          => supa.from('vault_documents').select('*').order('uploaded_at',{ascending:false}),
  addVaultDoc:    (row)       => supa.from('vault_documents').insert(row).select(),
  deleteVaultDocRow:(id)      => supa.from('vault_documents').delete().eq('id',id),

  /* ── SUPABASE STORAGE  (bucket: hr-documents) ───────────── */
  listVaultDocs:  (folder='') => supa.storage.from('hr-documents').list(folder,{sortBy:{column:'created_at',order:'desc'}}),
  uploadVaultDoc: (path,file) => supa.storage.from('hr-documents').upload(path,file,{upsert:true}),
  downloadVaultDoc:(path)     => supa.storage.from('hr-documents').download(path),
  deleteVaultDoc: (path)      => supa.storage.from('hr-documents').remove([path]),
  getPublicUrl:   (path)      => supa.storage.from('hr-documents').getPublicUrl(path).data.publicUrl,
  // Staff personal docs (stored under staff-docs/{staffId}/)
  uploadStaffDoc: (staffId,filename,file) =>
    supa.storage.from('hr-documents').upload(`staff-docs/${staffId}/${filename}`,file,{upsert:true}),
  downloadStaffDoc:(path)     => supa.storage.from('hr-documents').download(path),


  /* ── NOTIFICATIONS ──────────────────────────────────────── */
  // recipient_id = staff_id OR 'ADMIN' for all admins
  getNotifs:      (recipientId) => supa.from('notifications').select('*')
    .eq('recipient_id', recipientId).order('created_at',{ascending:false}).limit(50),
  addNotif:       (row)         => supa.from('notifications').insert(row).select(),
  markRead:       (id)          => supa.from('notifications').update({read:true}).eq('id',id),
  markAllRead:    (recipientId) => supa.from('notifications').update({read:true}).eq('recipient_id',recipientId),
  deleteNotif:    (id)          => supa.from('notifications').delete().eq('id',id),
  deleteAllRead:  (recipientId) => supa.from('notifications').delete().eq('recipient_id',recipientId).eq('read',true),

  // Keep old aliases for backward compatibility
  uploadDoc:      (path,file) => supa.storage.from('hr-documents').upload(path,file,{upsert:true}),
  downloadDoc:    (path)      => supa.storage.from('hr-documents').download(path),

  /* ── CONTRACTS ───────────────────────────────────────────── */
  getContracts:   ()       => supa.from('contracts').select('*').order('start_date',{ascending:false}),
  getMyContract:  (id)     => supa.from('contracts').select('*').eq('staff_id',id).order('start_date',{ascending:false}),
  addContract:    (row)    => supa.from('contracts').insert(row).select(),
  updateContract: (id,u)   => supa.from('contracts').update(u).eq('id',id),

  /* ── DISCIPLINARY ────────────────────────────────────────── */
  getDisciplinary: ()      => supa.from('disciplinary_records').select('*').order('issued_date',{ascending:false}),
  addDisciplinary: (row)   => supa.from('disciplinary_records').insert(row).select(),
  updateDisciplinary:(id,u)=> supa.from('disciplinary_records').update(u).eq('id',id),

  /* ── ONBOARDING / OFFBOARDING ────────────────────────────── */
  getOnboarding:  ()       => supa.from('onboarding_tasks').select('*').order('created_at',{ascending:false}),
  addOnboarding:  (row)    => supa.from('onboarding_tasks').insert(row).select(),
  updateOnboarding:(id,u)  => supa.from('onboarding_tasks').update(u).eq('id',id),
  deleteOnboarding:(id)    => supa.from('onboarding_tasks').delete().eq('id',id),

  /* ── PAYROLL ─────────────────────────────────────────────── */
  getPayrollRuns: ()       => supa.from('payroll_runs').select('*').order('pay_month',{ascending:false}),
  addPayrollRun:  (row)    => supa.from('payroll_runs').insert(row).select(),
  updatePayrollRun:(id,u)  => supa.from('payroll_runs').update(u).eq('id',id),
  getPayrollItems:(runId)  => supa.from('payroll_items').select('*').eq('run_id',runId).order('staff_name'),
  addPayrollItems:(rows)   => supa.from('payroll_items').insert(rows),
  getMyPayslips:  (staffId)=> supa.from('payroll_items').select('*,payroll_runs(pay_month,status)').eq('staff_id',staffId).order('created_at',{ascending:false}),

  /* ── BENEFITS ────────────────────────────────────────────── */
  getBenefits:    ()       => supa.from('benefits').select('*').order('staff_name'),
  getMyBenefit:   (id)     => supa.from('benefits').select('*').eq('staff_id',id).single(),
  upsertBenefit:  (row)    => supa.from('benefits').upsert(row,{onConflict:'staff_id'}).select().single(),

  /* ── LEAVE BALANCES ──────────────────────────────────────── */
  getLeaveBalances: ()     => supa.from('leave_balances').select('*').order('staff_name'),
  getMyBalance:   (id)     => supa.from('leave_balances').select('*').eq('staff_id',id).single(),
  upsertBalance:  (row)    => supa.from('leave_balances').upsert(row,{onConflict:'staff_id,year'}).select().single(),
  updateBalance:  (id,u)   => supa.from('leave_balances').update(u).eq('id',id),

  /* ── AUDIT LOG ───────────────────────────────────────────── */
  getAuditLog:    (limit=200) => supa.from('audit_log').select('*').order('created_at',{ascending:false}).limit(limit),
  addAudit:       (row)    => supa.from('audit_log').insert(row),

  /* ── TRAINING RECORDS ────────────────────────────────────── */
  getTraining:    ()       => supa.from('training_records').select('*').order('training_date',{ascending:false}),
  getMyTraining:  (id)     => supa.from('training_records').select('*').eq('staff_id',id).order('training_date',{ascending:false}),
  addTraining:    (row)    => supa.from('training_records').insert(row).select(),
  updateTraining: (id,u)   => supa.from('training_records').update(u).eq('id',id),
  deleteTraining: (id)     => supa.from('training_records').delete().eq('id',id),

  /* ── SURVEYS ─────────────────────────────────────────────── */
  getSurveys:     ()       => supa.from('surveys').select('*').order('created_at',{ascending:false}),
  addSurvey:      (row)    => supa.from('surveys').insert(row).select(),
  updateSurvey:   (id,u)   => supa.from('surveys').update(u).eq('id',id),
  getSurveyResponses:(surveyId) => supa.from('survey_responses').select('*').eq('survey_id',surveyId),
  addSurveyResponse:(row)  => supa.from('survey_responses').insert(row).select(),
  getMyResponses: (staffId,surveyId) => supa.from('survey_responses').select('*').eq('staff_id',staffId).eq('survey_id',surveyId),
};

const G = () => (<style>{`

   TOAST SYSTEM
   ════════════════════════════════════════════════════════════ */
const ToastContext = React.createContext(null);
const ToastProvider = ({children}) => {
  const[toasts,setToasts]=useState([]);
  const push=(msg,type='ok')=>{
    const id=Date.now();
    setToasts(p=>[...p,{id,msg,type}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),3500);
  };
  const toast={ok:(m)=>push(m,'ok'),err:(m)=>push(m,'err'),info:(m)=>push(m,'info')};
  return(<ToastContext.Provider value={toast}>
    {children}
    <div className="toast-wrap">
      {toasts.map(t=>(
        <div key={t.id} className={`toast toast-${t.type}`}>
          {t.type==='ok'?'✅':t.type==='err'?'❌':'ℹ️'} {t.msg}
        </div>
      ))}
    </div>
  </ToastContext.Provider>);
};
const useToast=()=>React.useContext(ToastContext);

  useEffect(()=>{const i=setInterval(()=>setT(new Date()),1000);return()=>clearInterval(i);},[]);

    <div style={{fontFamily:"'Playfair Display',serif",fontSize:46,color:"#0D1B3E",letterSpacing:2}}>{t.toLocaleTimeString("en-NG",{hour:"2-digit",minute:"2-digit",second:"2-digit"})}</div>

function downloadPayslipPDF(emp,month,basic,housing,transport,gross,pension,tax,net){
  const{jsPDF}=window.jspdf;const doc=new jsPDF({unit:"mm",format:"a4"});const W=210,P=20;
  doc.setFillColor(13,27,62);doc.rect(0,0,W,45,"F");
  doc.setFont("helvetica","bold");doc.setFontSize(16);doc.setTextColor(201,168,76);
  doc.text("STI Asset Management Limited",P,18);
  doc.setFontSize(8);doc.setTextColor(180,190,210);
  doc.text("Plot 169B Moshood Olugbani St, Victoria Island, Lagos",P,25);
  doc.setFontSize(11);doc.setTextColor(255,255,255);
  doc.text("PAY STATEMENT — "+month.toUpperCase(),P,36);

const NOTIF_ICONS={
  leave_requested:'📋', leave_approved:'✅', leave_declined:'❌',
  advance_requested:'💰', advance_approved:'✅', advance_declined:'❌',
  appraisal_submitted:'📊', transfer_requested:'🔄',
  system:'🔔',
};
const NOTIF_COLORS={
  leave_approved:'#F0FFF4', leave_declined:'#FFF5F5',
  leave_requested:'#FFFFF0', advance_requested:'#FFFFF0',
  advance_approved:'#F0FFF4', advance_declined:'#FFF5F5',
  appraisal_submitted:'#EBF8FF', transfer_requested:'#FAF5FF',
};

const NotificationPanel=({notifs,unread,onMarkRead,onMarkAll,onClose,user})=>{
  const myNotifs=[...new Map(notifs.filter(n=>n.recipientId===user.id||(n.recipientId==='ADMIN'&&(user.isAdmin||user.isSuperAdmin))).map(n=>[n.id,n])).values()];
  const fmt=dt=>{
    const d=new Date(dt);const now=new Date();
    const diff=Math.floor((now-d)/1000);
    if(diff<60)return 'just now';
    if(diff<3600)return Math.floor(diff/60)+'m ago';
    if(diff<86400)return Math.floor(diff/3600)+'h ago';
    return d.toLocaleDateString();
  };
  return(<>
    <div style={{position:'fixed',inset:0,background:'rgba(13,27,62,.35)',zIndex:499}} onClick={onClose}/>
    <div className="npanel">
      <div style={{background:'linear-gradient(135deg,#0D1B3E,#162550)',padding:'20px 18px',flexShrink:0}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{fontFamily:"'Playfair Display',serif",color:'#fff',fontSize:17,fontWeight:700}}>Message Centre</div>
            <div style={{color:'#C9A84C',fontSize:11.5,marginTop:2}}>{unread} unread notification{unread!==1?'s':''}</div>
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            {unread>0&&<button onClick={onMarkAll} style={{background:'rgba(201,168,76,.2)',border:'1px solid rgba(201,168,76,.3)',color:'#C9A84C',borderRadius:7,padding:'5px 11px',fontSize:11.5,cursor:'pointer',fontWeight:600}}>Mark all read</button>}
            <button onClick={onClose} style={{background:'none',border:'none',color:'rgba(255,255,255,.6)',cursor:'pointer',fontSize:20,lineHeight:1}}>✕</button>
          </div>
        </div>
      </div>
      <div style={{flex:1,overflowY:'auto'}}>
        {myNotifs.length===0&&(
          <div style={{textAlign:'center',padding:'60px 20px',color:'#8892A4'}}>
            <div style={{fontSize:48,marginBottom:12}}>📭</div>
            <div style={{fontWeight:600,fontSize:14}}>No messages yet</div>
            <div style={{fontSize:12.5,marginTop:4}}>Notifications will appear here</div>
          </div>
        )}
        {myNotifs.map((n,i)=>(
          <div key={n.id||i} className={'nitem'+(n.read?'':' unread')} onClick={()=>!n.read&&onMarkRead(n.id||i)}>
            <div style={{width:36,height:36,borderRadius:10,background:NOTIF_COLORS[n.type]||'#F5F6FA',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>
              {NOTIF_ICONS[n.type]||'🔔'}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:n.read?400:700,color:'#1A202C',lineHeight:1.45}}>{n.message}</div>
              <div style={{display:'flex',justifyContent:'space-between',marginTop:5,alignItems:'center'}}>
                <div style={{fontSize:11,color:'#8892A4'}}>From: {n.senderName}</div>
                <div style={{fontSize:11,color:'#8892A4'}}>{fmt(n.createdAt||new Date().toISOString())}</div>
              </div>
              {!n.read&&<div style={{width:6,height:6,borderRadius:'50%',background:'#C9A84C',marginTop:4}}/>}
            </div>
          </div>
        ))}
      </div>
    </div>
  </>);
};

const TopBar=({user,notifs,unread,onMarkRead,onMarkAll,onBell,showPanel,onClosePanel})=>(
  <>
    <div className="topbar" style={{position:'fixed',top:0,left:0,right:0,zIndex:201}}>
      
      <div style={{flex:1}}/>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <div style={{textAlign:'right',display:'flex',flexDirection:'column',alignItems:'flex-end'}}>
          <div style={{color:'#fff',fontSize:12.5,fontWeight:600}}>{user.name.split(' ').slice(0,2).join(' ')}</div>
          <div style={{color:'#C9A84C',fontSize:10.5}}>{user.isSuperAdmin?'🔑 Super Admin':user.isAdmin?'👑 HR Admin':user.designation}</div>
        </div>
        <Av name={user.name} color={user.color} size={32} fs={12} photo={user.photo}/>
        <div className="nbell" onClick={onBell} title="Notifications">
          <span style={{fontSize:18}}>🔔</span>
          {unread>0&&<span className="nbadge">{unread>99?'99+':unread}</span>}
        </div>
      </div>
    </div>
    {showPanel&&<NotificationPanel notifs={notifs} unread={unread} onMarkRead={onMarkRead} onMarkAll={onMarkAll} onClose={onClosePanel} user={user}/>}
  </>
);

/* ════════════════════════════════════════════════════════════
   DASHBOARD
   ════════════════════════════════════════════════════════════ */
const Dashboard=({user,allStaff,leaves,onApprove,onDecline})=>{
  const pending=leaves.filter(l=>l.status==="Pending");
  return(<div className="ani">
    <PH title="HR Dashboard" subtitle={"Welcome, "+user.name.split(" ")[0]+" · "+new Date().toDateString()} user={user}/>
    <div className="g4" style={{marginBottom:18}}>
      {Object.entries(COMPANIES).map(([k,co])=>{
        const cnt=allStaff.filter(s=>s.company===k).length;
        return(<div className="scard" key={k} style={{borderLeftColor:co.color}}>
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <div>
              <div style={{fontSize:10.5,color:"#8892A4",fontWeight:600,textTransform:"uppercase",letterSpacing:.4}}>{co.short}</div>
              <div style={{fontSize:28,fontWeight:700,color:co.color,lineHeight:1.2,marginTop:3}}>{cnt}</div>
              <div style={{fontSize:10.5,color:"#8892A4",marginTop:2,maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{co.name}</div>
            </div>
            <span style={{fontSize:22}}>🏢</span>
          </div>
        </div>);
      })}
    </div>
    <div className="g2">
      <div className="card">
        <div style={{fontWeight:700,color:"#0D1B3E",marginBottom:14,fontSize:13.5}}>Leave Entitlement — STIAM Staff</div>
        <div style={{maxHeight:290,overflowY:"auto"}}>
          {allStaff.filter(s=>s.company==="STIAM").map((s,i)=>{
            const d=getLeaveDays(s.designation,s.name);
            return(<div key={i} style={{display:"flex",alignItems:"center",gap:10,marginBottom:9}}>

const AddStaffModal=({open,onClose,onAdd,allStaff})=>{
  const toast=useToast();
  const blank={name:"",email:"",phone:"",designation:"Staff",dept:"",company:"STIAM",manager:"",color:"#2980B9"};
  const[f,setF]=useState(blank);const[saving,setSaving]=useState(false);
  const colors=["#2980B9","#1A7F64","#C9A84C","#7B4F9E","#C0392B","#E67E22","#16A085","#27AE60","#8E44AD","#2C3E50"];
  const submit=async()=>{
    if(!f.name||!f.email){toast.err("Name and email are required");return;}
    setSaving(true);
    const pre={STIAM:"STI",DEVTAGE:"DVT",CEDAR_LON:"CLS",CEDAR_ASSET:"CAP"}[f.company]||"EMP";
    const cnt=allStaff.filter(s=>s.id.startsWith(pre+"-")).length;
    const newId=`${pre}-${String(cnt+1).padStart(3,"0")}`;
    const row={id:newId,name:f.name,email:f.email,phone:f.phone,designation:f.designation,
      dept:f.dept,company:f.company,manager:f.manager,color:f.color,
      is_admin:false,is_super_admin:false,achievements:"",photo:null};
    const{data,error}=await db.addStaff(row);
    setSaving(false);
    if(error){toast.err("Failed to add staff: "+error.message);return;}
    onAdd(mapStaff(data));
    toast.ok(f.name+" added successfully");
    setF(blank);onClose();
  };
  return(<Modal open={open} onClose={onClose} title="Add New Employee" size="mbl">
    <div className="g2">
      <div className="fg"><label className="lbl">Full Name *</label><input className="inp" placeholder="Full name" value={f.name} onChange={e=>setF({...f,name:e.target.value})}/></div>
      <div className="fg"><label className="lbl">Work Email *</label><input className="inp" type="email" placeholder="name@company.com" value={f.email} onChange={e=>setF({...f,email:e.target.value})}/></div>
      <div className="fg"><label className="lbl">Phone</label><input className="inp" placeholder="080XXXXXXXX" value={f.phone} onChange={e=>setF({...f,phone:e.target.value})}/></div>
      <div className="fg"><label className="lbl">Designation</label>
        <select className="sel" value={f.designation} onChange={e=>setF({...f,designation:e.target.value})}>
          {["Staff","IT Officer II","HOD IT","HOD Finance","HOD Investment","HOD Operations","HOD HR Manager","HOD HR Manager/Admin","HOD Credit","HOD Legal","Chief Operating Officer","Director","MD/Ceo","Vice Chairman","Executive Director","Managing Director"].map(d=><option key={d}>{d}</option>)}
        </select>
      </div>
      <div className="fg"><label className="lbl">Department</label><input className="inp" placeholder="e.g. Finance" value={f.dept} onChange={e=>setF({...f,dept:e.target.value})}/></div>
      <div className="fg"><label className="lbl">Company / Entity</label>
        <select className="sel" value={f.company} onChange={e=>setF({...f,company:e.target.value})}>
          {Object.entries(COMPANIES).map(([k,c])=><option key={k} value={k}>{c.name}</option>)}
        </select>
      </div>
      <div className="fg"><label className="lbl">Line Manager</label>
        <select className="sel" value={f.manager} onChange={e=>setF({...f,manager:e.target.value})}>
          <option value="">Select manager…</option>
          {allStaff.filter(s=>SENIOR.includes(s.designation)).map(s=><option key={s.id}>{s.name}</option>)}
        </select>
      </div>
      <div className="fg"><label className="lbl">Avatar Colour</label>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:6}}>
          {colors.map(c=><div key={c} onClick={()=>setF({...f,color:c})} style={{width:28,height:28,borderRadius:"50%",background:c,cursor:"pointer",border:f.color===c?"3px solid #C9A84C":"3px solid transparent"}}/>)}
        </div>
      </div>
    </div>
    <div style={{background:"#F0FFF4",borderRadius:8,padding:"10px 14px",fontSize:12.5,color:"#276749",marginBottom:14}}>
      Staff ID auto-generated · Saved to Supabase instantly · Default password = Staff ID
    </div>
    <div style={{display:"flex",gap:10}}>
      <button className="btn bp" style={{flex:1}} onClick={submit} disabled={saving}>{saving?<><Spinner/> Saving…</>:"Add Employee"}</button>
      <button className="btn bo" onClick={onClose} disabled={saving}>Cancel</button>
    </div>
  </Modal>);
};

const MyProfile=({user,allStaff,onUpdateStaff,onAddExited,onLogout})=>{
  const toast=useToast();
  const cur=allStaff.find(s=>s.id===user.id)||user;
  const[editing,setEditing]=useState(false);
  const[f,setF]=useState({phone:cur.phone||""});
  const[achDraft,setAchDraft]=useState(cur.achievements||"");
  const[saving,setSaving]=useState(false);const[achSaving,setAchSaving]=useState(false);
  const fileRef=useRef(null);const docRef=useRef(null);
  const[localPhoto,setLocalPhoto]=useState(null);
  const[docs,setDocs]=useState([]);
  const[docLoading,setDocLoading]=useState(false);
  const days=getLeaveDays(cur.designation,cur.name);

  
  // Load staff documents from Supabase on mount
  useEffect(()=>{
    db.getMyDocs(user.id).then(({data,error})=>{
      if(!error&&data)setDocs(data.map(mapStaffDoc));
    });
  },[user.id]);

  const saveProfile=async()=>{
    setSaving(true);
    const updates={phone:f.phone};
    if(localPhoto)updates.photo=localPhoto;
    const{error}=await db.updateStaff(user.id,updates);
    setSaving(false);
    if(error){toast.err("Save failed: "+error.message);return;}
    onUpdateStaff(user.id,{...updates});
    setEditing(false);toast.ok("Profile updated");
  };
  const handlePhoto=e=>{const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>setLocalPhoto(ev.target.result);r.readAsDataURL(file);};

  const handleDoc=async(e)=>{
    const file=e.target.files[0];
    if(!file)return;
    setDocLoading(true);
    const ext=file.name.split('.').pop().toUpperCase();
    const filename=Date.now()+'_'+file.name;
    const path=`staff-docs/${user.id}/${filename}`;
    // 1. Upload file to Supabase Storage
    const{error:storageErr}=await db.uploadStaffDoc(user.id,filename,file);
    if(storageErr){toast.err("Upload failed: "+storageErr.message);setDocLoading(false);return;}
    // 2. Save metadata row to staff_documents table
    const sizeStr=file.size>1048576?(file.size/1048576).toFixed(1)+' MB':(file.size/1024).toFixed(0)+' KB';
    const row={staff_id:user.id,name:file.name,storage_path:path,file_size:sizeStr,file_type:ext};
    const{data,error:dbErr}=await db.addDoc(row);
    setDocLoading(false);
    if(dbErr){toast.err("Metadata save failed: "+dbErr.message);return;}
    setDocs(p=>[mapStaffDoc(data),...p]);
    toast.ok(file.name+' uploaded successfully');
  };

  const notifyHR=async()=>{
    setAchSaving(true);
    const{error}=await db.updateStaff(user.id,{achievements:achDraft});
    setAchSaving(false);
    if(error){toast.err("Failed: "+error.message);return;}
    onUpdateStaff(user.id,{achievements:achDraft});
    toast.ok("Achievement sent to HR!");
  };
  const photo=localPhoto||(cur.photo);

  return(<div className="ani">
    <PH title="My Profile" subtitle="Synced with Supabase · Changes save instantly" user={cur}/>
    <div className="g2">
      <div>
        <div className="card">
          <div style={{textAlign:"center",paddingBottom:20}}>
            <div style={{display:"flex",justifyContent:"center",marginBottom:14}}>
              <div className="photo-ring" onClick={()=>editing&&fileRef.current&&fileRef.current.click()} title={editing?"Click to change photo":""}>
                {photo?<img src={photo} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>:<Av name={cur.name} color={cur.color} size={90} fs={28}/>}
              </div>
              {editing&&<input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={handlePhoto}/>}
            </div>
            {editing&&<div style={{fontSize:11.5,color:"#8892A4",marginBottom:10}}>Click ring to change photo</div>}
            {editing?(<div>
              <div className="fg"><label className="lbl">Phone</label><input className="inp" value={f.phone} onChange={e=>setF({...f,phone:e.target.value})}/></div>
              <div style={{display:"flex",gap:8}}>
                <button className="btn bt" style={{flex:1}} onClick={saveProfile} disabled={saving}>{saving?<><Spinner/> Saving…</>:"Save"}</button>
                <button className="btn bo" onClick={()=>setEditing(false)} disabled={saving}>Cancel</button>
              </div>
            </div>):(<div>
              <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:"#0D1B3E"}}>{cur.name}</h2>
              <div style={{color:"#8892A4",fontSize:13,marginTop:3}}>{cur.designation}</div>
              <div style={{color:"#4A5568",fontSize:13}}>{cur.dept} · {COMPANIES[cur.company]?.short}</div>
              <div style={{marginTop:10,display:"flex",justifyContent:"center",gap:8,flexWrap:"wrap"}}><CoTag co={cur.company}/><span className="tag ty">{cur.id}</span></div>
              <button className="btn bo" style={{marginTop:14,fontSize:12}} onClick={()=>setEditing(true)}>✏️ Edit Profile</button>
            </div>)}
          </div>
          <div style={{borderTop:"1px solid #F0F2F8",paddingTop:14}}>
            {[["Email",cur.email],["Phone",cur.phone||"—"],["Department",cur.dept],["Line Manager",cur.manager||"—"],["Staff ID",cur.id]].map(([l,v])=>(
              <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #F0F2F8",fontSize:13}}>
                <span style={{color:"#8892A4",fontWeight:500}}>{l}</span>
                <span style={{color:"#2D3748",fontWeight:600,textAlign:"right",maxWidth:"60%",wordBreak:"break-all"}}>{v}</span>
              </div>
            ))}
          </div>
          
        </div>
        <div className="card">
          <div style={{fontWeight:700,color:"#0D1B3E",marginBottom:10,fontSize:13.5}}>📎 Documents</div>
          <p style={{fontSize:12.5,color:"#8892A4",marginBottom:12}}>Upload passport, certificates, academic and professional documents</p>
          <button className="btn bo" style={{width:"100%",justifyContent:"center",marginBottom:12,fontSize:12.5}} onClick={()=>docRef.current&&docRef.current.click()} disabled={docLoading}>{docLoading?<><Spinner dark/> Uploading…</>:"📤 Upload Document"}</button>
          <input ref={docRef} type="file" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx" style={{display:"none"}} onChange={handleDoc}/>
          {docs.length===0?<div style={{fontSize:12.5,color:"#CBD5E0",textAlign:"center",padding:"12px 0"}}>No documents uploaded yet</div>
            :docs.map((d,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0",borderBottom:"1px solid #F0F2F8"}}>
              <span style={{fontSize:16}}>📄</span>
              <div style={{flex:1}}><div style={{fontSize:12.5,fontWeight:600}}>{d.name}</div><div style={{fontSize:11,color:"#8892A4"}}>{d.uploaded}</div></div>
            </div>))
          }
        </div>
      </div>
      <div>
        <div className="card">
          <div style={{fontWeight:700,color:"#0D1B3E",marginBottom:12,fontSize:13.5}}>Leave Entitlement</div>
          <div style={{textAlign:"center",padding:"14px 0"}}>
            <div style={{fontSize:58,fontWeight:800,fontFamily:"'Playfair Display',serif",color:days===30?"#C9A84C":days===20?"#DD6B20":"#1A7F64"}}>{days}</div>
            <div style={{color:"#8892A4",fontSize:13}}>approved leave days per year</div>
            <div className="lm" style={{margin:"14px 0 8px"}}><div style={{height:"100%",background:days===30?"#C9A84C":days===20?"#DD6B20":"#1A7F64",borderRadius:10,width:days===30?"100%":days===20?"66%":"50%"}}/></div>
            <div style={{fontSize:12,color:"#8892A4"}}>Designation: <strong>{cur.designation}</strong></div>
            <div style={{marginTop:12,padding:"10px 14px",background:days===30?"#FFFFF0":days===20?"#FFFAF0":"#F0FFF4",borderRadius:10,fontSize:12.5,color:"#4A5568"}}>
              {days===30?"✨ Senior Executive — 30 days annually":days===20?"🏅 HOD / Director — 20 days annually":"📋 Staff member — 15 days annually"}
            </div>
          </div>
        </div>
        <div className="card">
          <div style={{fontWeight:700,color:"#0D1B3E",marginBottom:10,fontSize:13.5}}>🏆 Notify HR of Achievement</div>
          <p style={{fontSize:12.5,color:"#8892A4",marginBottom:12}}>Share a certification, award, or professional milestone — saved to Supabase</p>
          <div className="fg"><label className="lbl">Achievement</label>
            <textarea className="inp" rows={4} placeholder="e.g. Completed CFA Level 1, Won Best Employee Award…" value={achDraft} onChange={e=>setAchDraft(e.target.value)}/>
          </div>
          <button className="btn bg" style={{width:"100%",justifyContent:"center"}} onClick={notifyHR} disabled={achSaving}>
            {achSaving?<><Spinner dark/> Sending…</>:"📨 Send to HR"}
          </button>
        </div>
      </div>
    </div>

  </div>);
};

/* ════════════════════════════════════════════════════════════
   MY LEAVE
   ════════════════════════════════════════════════════════════ */
const MyLeave=({user,leaves,onAddLeave,isOffline})=>{
  const toast=useToast();
  const notif=useNotif();
  const[showForm,setShowForm]=useState(false);
  const[f,setF]=useState({type:"Annual Leave",from:"",to:"",relief:"",reason:""});
  const[saving,setSaving]=useState(false);
  const my=leaves.filter(l=>l.staffId===user.id);
  const days=getLeaveDays(user.designation,user.name);
  const used=my.filter(l=>l.status==="Approved").reduce((a,b)=>a+b.days,0);
  const rem=Math.max(0,days-used);
  const submit=async()=>{
    if(!f.from||!f.to||!f.relief){toast.err("Please fill all fields");return;}
    setSaving(true);
    const d=Math.round((new Date(f.to)-new Date(f.from))/86400000)+1;
    const id="LR-"+Date.now();
    const row={id,staff_id:user.id,employee:user.name,type:f.type,
      from_date:f.from,to_date:f.to,days:d,relief:f.relief,
      reason:f.reason,status:"Pending",submitted:TODAY};
    const{data,error}=await db.addLeave(row);
    setSaving(false);
    if(error){toast.err("Failed to submit: "+error.message);return;}
    onAddLeave(mapLeave(data));
    toast.ok("Leave request submitted");
    // Notify all HR admins
    if(notif&&notif.adminIds?.length){
      await db.addNotif(notif.adminIds.map(aid=>({
        recipient_id:aid,from_name:user.name,
        title:"📋 New Leave Request",
        message:`${user.name} submitted a ${f.type} request for ${d} day(s) — ${f.from} to ${f.to}. Relief: ${f.relief}.`,
        type:"info",read:false
      })));
    }
    setShowForm(false);setF({type:"Annual Leave",from:"",to:"",relief:"",reason:""});
  };
  return(<div className="ani">
    <PH title="My Leave" subtitle="Leave records synced with Supabase" user={user}/>
    <div className="g3" style={{marginBottom:18}}>
      {[{l:"Annual Entitlement",v:days,c:"#C9A84C"},{l:"Days Used",v:used,c:"#E53E3E"},{l:"Days Remaining",v:rem,c:"#1A7F64"}].map((s,i)=>(
        <div className="scard" key={i} style={{borderLeftColor:s.c}}>
          <div style={{fontSize:11,color:"#8892A4",fontWeight:600,textTransform:"uppercase",letterSpacing:.5}}>{s.l}</div>
          <div style={{fontSize:32,fontWeight:700,color:s.c,marginTop:4}}>{s.v}</div>
          <div style={{fontSize:12,color:"#8892A4"}}>days</div>
        </div>
      ))}
    </div>
    <div style={{marginBottom:14}}><button className="btn bp" onClick={()=>setShowForm(true)}>+ Request Leave</button></div>
    <div className="card">
      <div style={{fontWeight:700,color:"#0D1B3E",marginBottom:14,fontSize:13.5}}>Leave History</div>
      {my.length===0
        ?<div style={{textAlign:"center",padding:"40px 0",color:"#8892A4"}}><div style={{fontSize:32}}>📅</div><div style={{marginTop:8}}>No leave requests yet</div></div>
        :<div style={{overflowX:"auto"}}><table className="table">
          <thead><tr><th>Type</th><th>From</th><th>To</th><th>Days</th><th>Relief</th><th>Status</th><th>Submitted</th></tr></thead>
          <tbody>{my.map((r,i)=>(
            <tr key={i}>
              <td>{r.type}</td><td>{r.from}</td><td>{r.to}</td>
              <td style={{fontWeight:700}}>{r.days}</td>
              <td style={{color:"#1A7F64"}}>{r.relief}</td>
              <td><span className={`tag ${r.status==="Approved"?"tg":r.status==="Declined"?"tr":"to"}`}>{r.status}</span></td>
              <td style={{color:"#8892A4"}}>{r.submitted}</td>
            </tr>
          ))}</tbody>
        </table></div>
      }
    </div>
    <Modal open={showForm} onClose={()=>setShowForm(false)} title="New Leave Request">
      <div className="fg"><label className="lbl">Leave Type</label>
        <select className="sel" value={f.type} onChange={e=>setF({...f,type:e.target.value})}>
          {["Annual Leave","Sick Leave","Compassionate Leave","Maternity Leave","Paternity Leave"].map(t=><option key={t}>{t}</option>)}
        </select>
      </div>
      <div className="g2">
        <div className="fg"><label className="lbl">From</label><input type="date" className="inp" value={f.from} onChange={e=>setF({...f,from:e.target.value})}/></div>
        <div className="fg"><label className="lbl">To</label><input type="date" className="inp" value={f.to} onChange={e=>setF({...f,to:e.target.value})}/></div>
      </div>
      <div className="fg"><label className="lbl">Relief Officer</label>
        <select className="sel" value={f.relief} onChange={e=>setF({...f,relief:e.target.value})}>
          <option value="">Select relief officer…</option>
          {/* loaded from parent allStaff via closure not available here — use static list */}
        </select>
      </div>
      <div className="fg"><label className="lbl">Or type relief name</label><input className="inp" placeholder="Relief officer name" value={f.relief} onChange={e=>setF({...f,relief:e.target.value})}/></div>
      <div className="fg"><label className="lbl">Reason</label><textarea className="inp" rows={3} value={f.reason} onChange={e=>setF({...f,reason:e.target.value})}/></div>
      <div style={{background:"#F5F6FA",borderRadius:8,padding:"10px 14px",fontSize:12,color:"#4A5568",marginBottom:14}}>
        Entitlement: <strong>{days}d/yr</strong> · Remaining: <strong style={{color:"#1A7F64"}}>{rem} days</strong>
      </div>
      <div style={{display:"flex",gap:10}}>
        <button className="btn bp" style={{flex:1}} onClick={submit} disabled={saving}>{saving?<><Spinner/> Submitting…</>:"Submit Request"}</button>
        <button className="btn bo" onClick={()=>setShowForm(false)} disabled={saving}>Cancel</button>
      </div>
    </Modal>
  </div>);
};

/* ════════════════════════════════════════════════════════════
   REQUESTS HUB
   ════════════════════════════════════════════════════════════ */
const Requests=({user,leaves,onAddLeave,onApprove,onDecline,allStaff,isOffline})=>{
  const toast=useToast();
  const notif=useNotif();
  const[tab,setTab]=useState("leave");
  const canApprove=user.isAdmin||user.isSuperAdmin;
  const pending=leaves.filter(l=>l.status==="Pending");
  const myLeaves=canApprove?leaves:leaves.filter(l=>l.staffId===user.id);

  // ── Grievance state ─────────────────────────────────────
  const[gf,setGf]=useState({category:"Workplace Harassment",description:"",incidentDate:""});
  const[gSaving,setGSaving]=useState(false);
  const[grievances,setGrievances]=useState([]);
  useEffect(()=>{
    if(canApprove)db.getGrievances().then(({data})=>data&&setGrievances(data.map(mapGrievance)));
  },[canApprove]);
  const submitGrievance=async()=>{
    if(!gf.description.trim()){toast.err("Please describe the issue");return;}
    setGSaving(true);
    const row={category:gf.category,description:gf.description,
      incident_date:gf.incidentDate||null,status:'Received'};
    const{error}=await db.addGrievance(row);
    setGSaving(false);
    if(error){toast.err("Submission failed: "+error.message);return;}
    toast.ok("Grievance submitted anonymously");
    if(onNotify)onNotify("system",`🔒 An anonymous grievance has been submitted. Category: ${gf.category}. Please review in the Requests Hub.`);
    setGf({category:"Workplace Harassment",description:"",incidentDate:""});
  };

  // ── Salary Advance state ─────────────────────────────────
  const[af,setAf]=useState({amount:"",reason:"",repaymentMonths:"1"});
  const[aSaving,setASaving]=useState(false);
  const[advances,setAdvances]=useState([]);
  useEffect(()=>{
    const fn=canApprove?db.getAdvances():db.getMyAdvances(user.id);
    fn.then(({data})=>data&&setAdvances(data.map(mapAdvance)));
  },[canApprove,user.id]);
  const submitAdvance=async()=>{
    if(!af.amount||!af.reason.trim()){toast.err("Amount and reason required");return;}
    setASaving(true);
    const row={staff_id:user.id,employee:user.name,amount:Number(af.amount),
      reason:af.reason,repayment_months:Number(af.repaymentMonths),status:'Pending'};
    const{data,error}=await db.addAdvance(row);
    setASaving(false);
    if(error){toast.err("Submission failed: "+error.message);return;}
    setAdvances(p=>[mapAdvance(data),...p]);
    toast.ok("Advance request submitted");
    // Notify admins
    if(notif&&notif.adminIds?.length){
      await db.addNotif(notif.adminIds.map(aid=>({
        recipient_id:aid,from_name:user.name,
        title:"💰 Salary Advance Request",
        message:`${user.name} has requested a salary advance of ₦${Number(af.amount).toLocaleString()} — repayment over ${af.repaymentMonths} month(s).`,
        type:"warning",read:false
      })));
    }
    setAf({amount:"",reason:"",repaymentMonths:"1"});
  };

  // ── Appraisal Request state ──────────────────────────────
  const[pf,setPf]=useState({type:"Annual Appraisal",period:"Q1 2026",selfAssessment:""});
  const[pSaving,setPSaving]=useState(false);
  const[appraisals,setAppraisals]=useState([]);
  useEffect(()=>{
    const fn=canApprove?db.getAppraisals():db.getMyAppraisals(user.id);
    fn.then(({data})=>data&&setAppraisals(data.map(mapAppraisal)));
  },[canApprove,user.id]);
  const submitAppraisal=async()=>{
    if(!pf.selfAssessment.trim()){toast.err("Please complete your self-assessment");return;}
    setPSaving(true);
    const row={staff_id:user.id,employee:user.name,type:pf.type,
      period:pf.period,self_assessment:pf.selfAssessment,status:'Submitted'};
    const{data,error}=await db.addAppraisal(row);
    setPSaving(false);
    if(error){toast.err("Submission failed: "+error.message);return;}
    setAppraisals(p=>[mapAppraisal(data),...p]);
    toast.ok("Appraisal request submitted");
    // Notify admins
    if(notif&&notif.adminIds?.length){
      await db.addNotif(notif.adminIds.map(aid=>({
        recipient_id:aid,from_name:user.name,
        title:"📊 Appraisal Self-Assessment Submitted",
        message:`${user.name} has submitted their self-assessment for ${pf.type} — ${pf.period}. Please review.`,
        type:"info",read:false
      })));
    }
    setPf({type:"Annual Appraisal",period:"Q1 2026",selfAssessment:""});
  };

  const tabs=[
    {k:"leave",l:canApprove?"Leave Requests"+(pending.length>0?" ("+pending.length+")":""):"Leave Requests"},
    {k:"grievance",l:"Grievance (Anon)"},{k:"advance",l:"Salary Advance"},
    {k:"appraisal",l:"Appraisal"},{k:"redeploy",l:"Redeployment"},{k:"payslip",l:"Request Pay-slip"}
  ];
  return(<div className="ani">
    <PH title="Requests Hub" subtitle="All HR requests — live from Supabase" user={user}/>
    <div style={{display:"flex",gap:6,marginBottom:20,flexWrap:"wrap"}}>
      {tabs.map(t=><button key={t.k} onClick={()=>setTab(t.k)} className="btn" style={{fontSize:12.5,padding:"7px 15px",background:tab===t.k?"#0D1B3E":"#fff",color:tab===t.k?"#fff":"#4A5568",border:"1.5px solid #E2E6F0"}}>{t.l}</button>)}
    </div>

    {/* ── LEAVE TAB ─────────────────────────────────────── */}
    {tab==="leave"&&<div className="card">
      <div style={{fontWeight:700,color:"#0D1B3E",marginBottom:14,fontSize:13.5}}>{canApprove?"All Leave Requests":"My Leave Requests"}</div>
      <div style={{overflowX:"auto"}}><table className="table">
        <thead><tr><th>Employee</th><th>Type</th><th>Period</th><th>Days</th><th>Relief</th><th>Status</th>{canApprove&&<th>Action</th>}</tr></thead>
        <tbody>{myLeaves.map((r,i)=>(
          <tr key={i}>
            <td style={{fontWeight:600}}>{r.employee}</td>
            <td>{r.type}</td>
            <td style={{fontSize:12}}>{r.from} → {r.to}</td>
            <td style={{fontWeight:700}}>{r.days}</td>
            <td style={{color:"#1A7F64"}}>{r.relief}</td>
            <td><span className={`tag ${r.status==="Approved"?"tg":r.status==="Declined"?"tr":"to"}`}>{r.status}</span></td>
            {canApprove&&<td>{r.status==="Pending"
              ?<div style={{display:"flex",gap:4}}><button className="btn bt bsm" onClick={()=>onApprove(r.id)}>✓</button><button className="btn bd bsm" onClick={()=>onDecline(r.id)}>✗</button></div>
              :<span className="tag ty">Done</span>}
            </td>}
          </tr>
        ))}</tbody>
      </table></div>
    </div>}

    {/* ── GRIEVANCE TAB ─────────────────────────────────── */}
    {tab==="grievance"&&<div>
      <div className="card" style={{background:"linear-gradient(135deg,#1a2035,#0D1B3E)",color:"#fff",marginBottom:14}}>
        <div style={{fontSize:18,marginBottom:6}}>🔒 Anonymous Grievance Reporting</div>
        <p style={{fontSize:13,opacity:.8}}>Your identity is fully protected. No staff ID is stored. Reviewed only by HOD HR Manager.</p>
      </div>
      <div className="card">
        <div className="fg"><label className="lbl">Category</label>
          <select className="sel" value={gf.category} onChange={e=>setGf({...gf,category:e.target.value})}>
            {["Workplace Harassment","Unfair Treatment","Policy Violation","Safety Concern","Discrimination","Other"].map(c=><option key={c}>{c}</option>)}
          </select>
        </div>
        <div className="fg"><label className="lbl">Description *</label>
          <textarea className="inp" rows={5} placeholder="Describe fully. This report is completely anonymous…" value={gf.description} onChange={e=>setGf({...gf,description:e.target.value})}/>
        </div>
        <div className="fg"><label className="lbl">Date of Incident (optional)</label>
          <input type="date" className="inp" value={gf.incidentDate} onChange={e=>setGf({...gf,incidentDate:e.target.value})}/>
        </div>
        <button className="btn bp" onClick={submitGrievance} disabled={gSaving}>
          {gSaving?<><Spinner/> Submitting…</>:"🔒 Submit Anonymously"}
        </button>
      </div>
      {canApprove&&grievances.length>0&&<div className="card">
        <div style={{fontWeight:700,color:"#0D1B3E",marginBottom:14,fontSize:13.5}}>📋 Received Grievances (HR View)</div>
        <div style={{overflowX:"auto"}}><table className="table">
          <thead><tr><th>Category</th><th>Description</th><th>Incident Date</th><th>Status</th><th>Submitted</th></tr></thead>
          <tbody>{grievances.map((g,i)=>(
            <tr key={i}>
              <td><span className="tag ty">{g.category}</span></td>
              <td style={{maxWidth:260,fontSize:12.5}}>{g.description.slice(0,100)}{g.description.length>100?"…":""}</td>
              <td style={{color:"#8892A4"}}>{g.incidentDate||"—"}</td>
              <td><span className={`tag ${g.status==="Resolved"?"tg":"to"}`}>{g.status}</span></td>
              <td style={{color:"#8892A4",fontSize:12}}>{new Date(g.submittedAt).toLocaleDateString()}</td>
            </tr>
          ))}</tbody>
        </table></div>
      </div>}
    </div>}

    {/* ── SALARY ADVANCE TAB ────────────────────────────── */}
    {tab==="advance"&&<div>
      <div className="card">
        <div style={{fontWeight:700,color:"#0D1B3E",marginBottom:14,fontSize:13.5}}>Salary Advance / Loan Request</div>
        <div className="fg"><label className="lbl">Amount (₦) *</label>
          <input type="number" className="inp" placeholder="e.g. 150000" value={af.amount} onChange={e=>setAf({...af,amount:e.target.value})}/>
        </div>
        <div className="fg"><label className="lbl">Reason *</label>
          <textarea className="inp" rows={3} value={af.reason} onChange={e=>setAf({...af,reason:e.target.value})}/>
        </div>
        <div className="fg"><label className="lbl">Repayment Period</label>
          <select className="sel" value={af.repaymentMonths} onChange={e=>setAf({...af,repaymentMonths:e.target.value})}>
            <option value="1">1 Month</option><option value="2">2 Months</option>
            <option value="3">3 Months</option><option value="6">6 Months</option>
          </select>
        </div>
        <button className="btn bp" onClick={submitAdvance} disabled={aSaving}>
          {aSaving?<><Spinner/> Submitting…</>:"Submit Application"}
        </button>
      </div>
      {advances.length>0&&<div className="card">
        <div style={{fontWeight:700,color:"#0D1B3E",marginBottom:14,fontSize:13.5}}>{canApprove?"All Advance Requests":"My Requests"}</div>
        <div style={{overflowX:"auto"}}><table className="table">
          <thead><tr>{canApprove&&<th>Employee</th>}<th>Amount</th><th>Repayment</th><th>Status</th><th>Submitted</th></tr></thead>
          <tbody>{advances.map((a,i)=>(
            <tr key={i}>
              {canApprove&&<td style={{fontWeight:600}}>{a.employee}</td>}
              <td style={{fontWeight:700}}>₦{Number(a.amount).toLocaleString()}</td>
              <td>{a.repaymentMonths} month{a.repaymentMonths>1?"s":""}</td>
              <td><span className={`tag ${a.status==="Approved"?"tg":a.status==="Declined"?"tr":"to"}`}>{a.status}</span></td>
              <td style={{color:"#8892A4",fontSize:12}}>{new Date(a.submittedAt).toLocaleDateString()}</td>
            </tr>
          ))}</tbody>
        </table></div>
      </div>}
    </div>}

    {/* ── APPRAISAL TAB ─────────────────────────────────── */}
    {tab==="appraisal"&&<div>
      <div className="card">
        <div style={{fontWeight:700,color:"#0D1B3E",marginBottom:14,fontSize:13.5}}>Performance Appraisal Request</div>
        <div className="fg"><label className="lbl">Type</label>
          <select className="sel" value={pf.type} onChange={e=>setPf({...pf,type:e.target.value})}>
            {["Quarterly Review","Annual Appraisal","360° Review","Probation Review"].map(t=><option key={t}>{t}</option>)}
          </select>
        </div>
        <div className="fg"><label className="lbl">Period</label>
          <select className="sel" value={pf.period} onChange={e=>setPf({...pf,period:e.target.value})}>
            {["Q1 2026","Q4 2025","Annual 2025","Q3 2025"].map(p=><option key={p}>{p}</option>)}
          </select>
        </div>
        <div className="fg"><label className="lbl">Self-Assessment *</label>
          <textarea className="inp" rows={4} placeholder="Rate your own performance this period…" value={pf.selfAssessment} onChange={e=>setPf({...pf,selfAssessment:e.target.value})}/>
        </div>
        <button className="btn bp" onClick={submitAppraisal} disabled={pSaving}>
          {pSaving?<><Spinner/> Submitting…</>:"Submit for Review"}
        </button>
      </div>
      {appraisals.length>0&&<div className="card">
        <div style={{fontWeight:700,color:"#0D1B3E",marginBottom:14,fontSize:13.5}}>{canApprove?"All Appraisal Submissions":"My Submissions"}</div>
        <div style={{overflowX:"auto"}}><table className="table">
          <thead><tr>{canApprove&&<th>Employee</th>}<th>Type</th><th>Period</th><th>Status</th><th>Submitted</th></tr></thead>
          <tbody>{appraisals.map((a,i)=>(
            <tr key={i}>
              {canApprove&&<td style={{fontWeight:600}}>{a.employee}</td>}
              <td>{a.type}</td><td>{a.period}</td>
              <td><span className={`tag ${a.status==="Completed"?"tg":a.status==="In Review"?"tb":"to"}`}>{a.status}</span></td>
              <td style={{color:"#8892A4",fontSize:12}}>{new Date(a.submittedAt).toLocaleDateString()}</td>
            </tr>
          ))}</tbody>
        </table></div>
      </div>}
    </div>}

    {/* ── REDEPLOYMENT TAB ──────────────────────────────── */}
    {tab==="redeploy"&&<div className="card">
      <div style={{fontWeight:700,color:"#0D1B3E",marginBottom:14,fontSize:13.5}}>Redeployment Request</div>
      <p style={{fontSize:12.5,color:"#8892A4",marginBottom:14}}>Use the <strong>Internal Redeployment</strong> page in the sidebar for full inter-entity transfer management.</p>
      <div className="fg"><label className="lbl">Current Department</label><input className="inp" value={user.dept} readOnly/></div>
      <div className="fg"><label className="lbl">Requested Dept / Role</label><input className="inp" placeholder="Target department or role…"/></div>
      <div className="fg"><label className="lbl">Justification</label><textarea className="inp" rows={4}/></div>
      <button className="btn bp">Submit Request</button>
    </div>}

    {tab==="payslip"&&<div className="card">
      <div style={{fontWeight:700,color:"#0D1B3E",marginBottom:6,fontSize:13.5}}>💰 Request Pay-slip</div>
      <p style={{fontSize:12.5,color:"#8892A4",marginBottom:16}}>Submit a request to HR for a copy of your pay-slip for a specific month.</p>
      <PayslipRequestForm user={user} allStaff={allStaff} isOffline={isOffline}/>
    </div>}

  </div>);
};

/* ════════════════════════════════════════════════════════════
   PAYSLIP
   ════════════════════════════════════════════════════════════ */
const PayslipRequestForm=({user,allStaff,isOffline})=>{
  const toast=useToast();
  const[month,setMonth]=useState("");
  const[note,setNote]=useState("");
  const[sending,setSending]=useState(false);
  const PAY_MONTHS=(()=>{const ms=[];const now=new Date();for(let i=0;i<6;i++){const d=new Date(now.getFullYear(),now.getMonth()-i,1);ms.push(d.toLocaleString("default",{month:"long",year:"numeric"}));}return ms;})();
  const submit=async()=>{
    if(!month){toast.err("Please select a pay period");return;}
    setSending(true);
    const admins=allStaff.filter(s=>s.isAdmin||s.isSuperAdmin);
    const rows=admins.map(a=>({
      recipient_id:a.id, from_name:user.name,
      title:"💰 Pay-slip Request",
      message:`${user.name} (${user.designation}) has requested their pay-slip for ${month}.${note?" Note: "+note:""}`,
      type:"info", read:false
    }));
    if(!isOffline&&rows.length){
      const{error}=await db.addNotif(rows);
      if(error){toast.err("Failed to send request");setSending(false);return;}
    }
    toast.ok("Pay-slip request sent to HR");

const ScoreArc=({score,color,size=68})=>{
  const r=26;const circ=2*Math.PI*r;const fill=circ*(1-(score/100));
  return(<svg width={size} height={size} viewBox="0 0 68 68">
    <circle cx="34" cy="34" r={r} fill="none" stroke="#F0F2F8" strokeWidth="6"/>
    <circle cx="34" cy="34" r={r} fill="none" stroke={color} strokeWidth="6"
      strokeDasharray={circ} strokeDashoffset={fill}
      strokeLinecap="round" transform="rotate(-90 34 34)"
      style={{transition:"stroke-dashoffset .6s ease"}}/>
    <text x="34" y="38" textAnchor="middle" fontSize="14" fontWeight="700" fill={color}>{score}</text>
  </svg>);
};
