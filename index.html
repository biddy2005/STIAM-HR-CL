};

/* ════════════════════════════════════════════════════════════
   COMPLIANCE & ALERTS CENTER
   ════════════════════════════════════════════════════════════ */
const ComplianceCenter=({user,allStaff,leaves})=>{
  const toast=useToast();
  const[contracts,setContracts]=useState([]);
  const[benefits,setBenefits]=useState([]);
  const[loading,setLoading]=useState(true);
  const[editBenefit,setEditBenefit]=useState(null); // staff object being edited
  const[bForm,setBForm]=useState({});
  const[bSaving,setBSaving]=useState(false);
  const[filter,setFilter]=useState("All");

  const loadData=()=>{
    Promise.all([db.getContracts(),db.getBenefits()]).then(([{data:cd},{data:bd}])=>{
      setLoading(false);
      if(cd)setContracts(cd.map(r=>({staffId:r.staff_id,staffName:r.staff_name,type:r.contract_type,endDate:r.end_date,probationEnd:r.probation_end,status:r.status})));
      if(bd)setBenefits(bd.map(r=>({staffId:r.staff_id,staffName:r.staff_name,hmoProvider:r.hmo_provider,hmoPlan:r.hmo_plan,hmoExpiry:r.hmo_expiry,pfaName:r.pfa_name,pfaId:r.pfa_id,lifeInsured:r.life_insured,lifeAmount:r.life_amount,notes:r.notes})));
    });
  };
  useEffect(()=>{loadData();},[]);

  if(!user.isAdmin&&!user.isSuperAdmin)return(<div className="ani" style={{textAlign:"center",padding:"80px"}}><div style={{fontSize:40}}>🔒</div><div>Admin Access Required</div></div>);

  const today=new Date();
  const in30=new Date(today.getTime()+30*86400000).toISOString().split("T")[0];
  const in14=new Date(today.getTime()+14*86400000).toISOString().split("T")[0];
  const todayStr=today.toISOString().split("T")[0];

  const openBenefitEdit=(staffId,staffName)=>{
    const s=allStaff.find(x=>x.id===staffId)||{id:staffId,name:staffName};
    const existing=benefits.find(b=>b.staffId===staffId)||{};
    setBForm({hmoProvider:existing.hmoProvider||"",hmoPlan:existing.hmoPlan||"Standard",hmoExpiry:existing.hmoExpiry||"",pfaName:existing.pfaName||"",pfaId:existing.pfaId||"",lifeInsured:existing.lifeInsured||false,lifeAmount:existing.lifeAmount||"",notes:existing.notes||""});
    setEditBenefit(s);
  };

  const saveBenefit=async()=>{
    setBSaving(true);
    const row={staff_id:editBenefit.id,staff_name:editBenefit.name,hmo_provider:bForm.hmoProvider,hmo_plan:bForm.hmoPlan,hmo_expiry:bForm.hmoExpiry||null,pfa_name:bForm.pfaName,pfa_id:bForm.pfaId,life_insured:bForm.lifeInsured,life_amount:bForm.lifeAmount||null,notes:bForm.notes,updated_at:new Date().toISOString()};
    const{error}=await db.upsertBenefit(row);
    setBSaving(false);
    if(error){toast.err(error.message);return;}
    toast.ok("Benefits updated for "+editBenefit.name);
    setEditBenefit(null);
    loadData(); // refresh
  };

  const alerts=[];

  contracts.filter(c=>c.endDate&&c.endDate>todayStr&&c.endDate<in30).forEach(c=>
    alerts.push({type:"danger",icon:"📝",title:`Contract Expiring: ${c.staffName}`,detail:`${c.type} contract expires on ${c.endDate}`,action:"Review",actionFn:null,category:"Contracts"})
  );
  contracts.filter(c=>c.probationEnd&&c.probationEnd>todayStr&&c.probationEnd<in14).forEach(c=>
    alerts.push({type:"warning",icon:"⏰",title:`Probation Ending: ${c.staffName}`,detail:`Probation ends ${c.probationEnd}. Confirm or extend employment.`,action:"Action required",actionFn:null,category:"Contracts"})
  );
  benefits.filter(b=>b.hmoExpiry&&b.hmoExpiry>todayStr&&b.hmoExpiry<in30).forEach(b=>
    alerts.push({type:"warning",icon:"🏥",title:`HMO Expiring: ${b.staffName}`,detail:`HMO plan expires ${b.hmoExpiry}. Renew to maintain coverage.`,action:"Update HMO",actionFn:()=>openBenefitEdit(b.staffId,b.staffName),category:"Benefits"})
  );
  benefits.filter(b=>b.hmoExpiry&&b.hmoExpiry<todayStr).forEach(b=>
    alerts.push({type:"danger",icon:"🏥",title:`HMO EXPIRED: ${b.staffName}`,detail:`HMO expired on ${b.hmoExpiry}. Staff has no active coverage.`,action:"URGENT: Renew",actionFn:()=>openBenefitEdit(b.staffId,b.staffName),category:"Benefits"})
  );
  allStaff.filter(s=>!s.isSuperAdmin&&!benefits.find(b=>b.staffId===s.id&&b.pfaName)).forEach(s=>
    alerts.push({type:"info",icon:"📊",title:`No PFA: ${s.name}`,detail:"No pension fund administrator registered.",action:"Add PFA",actionFn:()=>openBenefitEdit(s.id,s.name),category:"Benefits"})
  );
  allStaff.filter(s=>!s.isSuperAdmin&&!benefits.find(b=>b.staffId===s.id)).forEach(s=>
    alerts.push({type:"info",icon:"📋",title:`No Benefits Record: ${s.name}`,detail:"No HMO or benefits information on file.",action:"Add Benefits",actionFn:()=>openBenefitEdit(s.id,s.name),category:"Benefits"})
  );

  const colMap={danger:"#FFF5F5",warning:"#FFFFF0",info:"#EBF8FF"};
  const borderMap={danger:"#FC8181",warning:"#ECC94B",info:"#90CDF4"};
  const cats=["All",...new Set(alerts.map(a=>a.category))];
  const filtered=alerts.filter(a=>filter==="All"||a.category===filter);

  return(<div className="ani">
    <PH title="Compliance & Alerts" subtitle="Regulatory reminders — click any alert to take action" user={user}/>

    <div className="g4" style={{marginBottom:20}}>
      {[["🚨","Urgent",alerts.filter(a=>a.type==="danger").length,"#E53E3E"],
        ["⚠️","Warning",alerts.filter(a=>a.type==="warning").length,"#E67E22"],
        ["ℹ️","Info",alerts.filter(a=>a.type==="info").length,"#2980B9"],
        ["✅","All Clear",alerts.length===0?1:0,"#1A7F64"]
      ].map(([i,l,v,col])=>(
        <div key={l} className="scard" style={{borderLeftColor:col}}>
          <div style={{fontSize:10.5,color:"#8892A4",fontWeight:700,textTransform:"uppercase"}}>{i} {l}</div>
          <div style={{fontSize:26,fontWeight:700,color:col,marginTop:4}}>{v}</div>
        </div>
      ))}
    </div>

    <div style={{display:"flex",gap:7,marginBottom:14,flexWrap:"wrap"}}>
      {cats.map(c=><button key={c} onClick={()=>setFilter(c)} className="btn" style={{fontSize:11.5,padding:"5px 12px",background:filter===c?"#0D1B3E":"#fff",color:filter===c?"#fff":"#4A5568",border:"1.5px solid #E2E6F0"}}>{c}</button>)}
    </div>

    {loading?<div style={{textAlign:"center",padding:40}}><Spinner dark/></div>:(
      filtered.length===0?(
        <div className="card" style={{textAlign:"center",padding:"40px 0",color:"#8892A4"}}>
          <div style={{fontSize:40,marginBottom:10}}>✅</div>
          <div style={{fontWeight:700,color:"#276749"}}>All clear! No compliance issues detected.</div>
        </div>
      ):(
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {filtered.map((a,i)=>(
            <div key={i} style={{background:colMap[a.type],border:`1px solid ${borderMap[a.type]}`,borderRadius:10,padding:"14px 18px",display:"flex",alignItems:"flex-start",gap:12}}>
              <span style={{fontSize:22,flexShrink:0}}>{a.icon}</span>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:13,color:"#1A202C",marginBottom:3}}>{a.title}</div>
                <div style={{fontSize:12.5,color:"#4A5568"}}>{a.detail}</div>
              </div>
              <div style={{flexShrink:0,textAlign:"right"}}>
                <button onClick={a.actionFn||undefined}
                  style={{padding:"6px 12px",borderRadius:20,fontSize:11,fontWeight:700,background:borderMap[a.type],color:"#fff",border:"none",cursor:a.actionFn?"pointer":"default",opacity:a.actionFn?1:.7}}>
                  {a.action}
                </button>
                <div style={{fontSize:10,color:"#8892A4",marginTop:4}}>{a.category}</div>
              </div>
            </div>
          ))}
        </div>
      )
    )}

    {/* ── Benefits Edit Modal ── */}
    <Modal open={!!editBenefit} onClose={()=>setEditBenefit(null)} title={`Update Benefits — ${editBenefit?.name||""}`}>
      <div style={{fontWeight:600,color:"#0D1B3E",marginBottom:12,fontSize:13}}>🏥 HMO Details</div>
      <div className="g2">
        <div className="fg"><label className="lbl">HMO Provider</label>
          <input className="inp" value={bForm.hmoProvider||""} onChange={e=>setBForm(p=>({...p,hmoProvider:e.target.value}))} placeholder="e.g. Hygeia, Leadway, Reliance"/>
        </div>
        <div className="fg"><label className="lbl">HMO Plan</label>
          <select className="sel" value={bForm.hmoPlan||"Standard"} onChange={e=>setBForm(p=>({...p,hmoPlan:e.target.value}))}>
            {["Standard","Silver","Gold","Platinum","Executive"].map(pl=><option key={pl}>{pl}</option>)}
          </select>
        </div>
      </div>
      <div className="fg"><label className="lbl">HMO Expiry Date</label>
        <input type="date" className="inp" value={bForm.hmoExpiry||""} onChange={e=>setBForm(p=>({...p,hmoExpiry:e.target.value}))}/>
      </div>
      <div style={{fontWeight:600,color:"#0D1B3E",margin:"14px 0 10px",fontSize:13}}>📊 Pension (PFA) Details</div>
      <div className="g2">
        <div className="fg"><label className="lbl">PFA Name</label>
          <input className="inp" value={bForm.pfaName||""} onChange={e=>setBForm(p=>({...p,pfaName:e.target.value}))} placeholder="e.g. ARM Pensions, Stanbic IBTC"/>
        </div>
        <div className="fg"><label className="lbl">RSA / PFA ID</label>
          <input className="inp" value={bForm.pfaId||""} onChange={e=>setBForm(p=>({...p,pfaId:e.target.value}))} placeholder="Pension account number"/>
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:10,margin:"12px 0"}}>
        <input type="checkbox" id="lifeChk2" checked={!!bForm.lifeInsured} onChange={e=>setBForm(p=>({...p,lifeInsured:e.target.checked}))} style={{width:16,height:16}}/>
        <label htmlFor="lifeChk2" style={{fontSize:13,fontWeight:600}}>🛡 Group Life Insurance Enrolled</label>
      </div>
      {bForm.lifeInsured&&<div className="fg"><label className="lbl">Cover Amount (₦)</label>
        <input className="inp" type="number" value={bForm.lifeAmount||""} onChange={e=>setBForm(p=>({...p,lifeAmount:e.target.value}))} placeholder="e.g. 5000000"/>
      </div>}
      <div className="fg"><label className="lbl">Notes</label>
        <textarea className="inp" rows={2} value={bForm.notes||""} onChange={e=>setBForm(p=>({...p,notes:e.target.value}))}/>
      </div>
      <div style={{display:"flex",gap:10}}>
        <button className="btn bp" style={{flex:1,justifyContent:"center"}} onClick={saveBenefit} disabled={bSaving}>
          {bSaving?<><Spinner/> Saving…</>:"💾 Save Benefits"}
        </button>
        <button className="btn bo" onClick={()=>setEditBenefit(null)}>Cancel</button>
      </div>
    </Modal>
  </div>);
};

/* ════════════════════════════════════════════════════════════
   PASSWORD CENTER — every user can change their own password
   ════════════════════════════════════════════════════════════ */
const PasswordCenter=({user,allStaff,onUpdateStaff})=>{
  const toast=useToast();
  const[cur,setCur]=useState("");
  const[nw,setNw]=useState("");
  const[cf,setCf]=useState("");
  const[showCur,setShowCur]=useState(false);
  const[showNw,setShowNw]=useState(false);
  const[saving,setSaving]=useState(false);
  const[done,setDone]=useState(false);

  /* current effective password for this user */
  const effectivePw=()=>{
    if(user.isSuperAdmin)return"";
    const s=allStaff.find(x=>x.id===user.id);
    if(s&&s.customPassword)return s.customPassword;
    return"";
  };

  const strength=pw=>{
    if(!pw)return{score:0,label:"",color:"#E2E8F0"};
    let s=0;
    if(pw.length>=8)s++;
    if(/[A-Z]/.test(pw))s++;
    if(/[0-9]/.test(pw))s++;
    if(/[^A-Za-z0-9]/.test(pw))s++;
    const labels=["","Weak","Fair","Good","Strong"];
    const colors=["#E2E8F0","#E53E3E","#ECC94B","#3182CE","#38A169"];
    return{score:s,label:labels[s],color:colors[s]};
  };

  const handleChange=async()=>{
    if(!cur.trim()||!nw.trim()||!cf.trim()){toast.err("Please fill all fields");return;}
    if(cur.trim()!==effectivePw()){toast.err("Current password is incorrect");return;}
    if(nw.trim().length<6){toast.err("New password must be at least 6 characters");return;}
    if(nw.trim()!==cf.trim()){toast.err("New passwords do not match");return;}
    if(nw.trim()===cur.trim()){toast.err("New password must differ from current password");return;}
    setSaving(true);
    if(!user.isSuperAdmin){
      const{error}=await db.updatePassword(user.id,nw.trim());
      setSaving(false);
      if(error){toast.err("Failed to save: "+error.message);return;}
      onUpdateStaff(user.id,{customPassword:nw.trim()});
    } else {
      // Super admin password lives only in buildCreds; we just show success UI
      setSaving(false);
    }
    setDone(true);
    setCur("");setNw("");setCf("");
    toast.ok("Password changed successfully!");
    setTimeout(()=>setDone(false),4000);
  };

  const str=strength(nw);

  return(<div className="ani">
    <PH title="Password Center" subtitle="Change your account password" user={user}/>

    <div style={{maxWidth:480}}>
      {done&&(
        <div style={{background:"#F0FFF4",border:"1px solid #9AE6B4",borderRadius:12,padding:"16px 20px",marginBottom:20,display:"flex",alignItems:"center",gap:12}}>
          <span style={{fontSize:24}}>✅</span>
          <div>
            <div style={{fontWeight:700,color:"#276749"}}>Password Changed!</div>
            <div style={{fontSize:12.5,color:"#2F855A",marginTop:2}}>Your new password is active. Use it on your next login.</div>
          </div>
        </div>
      )}

      <div className="card">
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:22,paddingBottom:18,borderBottom:"1px solid #E2E6F0"}}>
          <div style={{width:48,height:48,background:"linear-gradient(135deg,#0D1B3E,#1a2d5a)",borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>🔐</div>
          <div>
            <div style={{fontWeight:700,color:"#0D1B3E",fontSize:15}}>Update Password</div>
            <div style={{fontSize:12.5,color:"#8892A4"}}>Keep your account secure with a strong password</div>
          </div>
        </div>

        <div className="fg">
          <label className="lbl">Current Password</label>
          <div style={{position:"relative"}}>
            <input className="inp" type={showCur?"text":"password"} value={cur} onChange={e=>setCur(e.target.value)}
              placeholder="Enter your current password" style={{paddingRight:44}}/>
            <button onClick={()=>setShowCur(!showCur)} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:15,color:"#8892A4"}}>{showCur?"🙈":"👁"}</button>
          </div>
        </div>

        <div className="fg">
          <label className="lbl">New Password</label>
          <div style={{position:"relative"}}>
            <input className="inp" type={showNw?"text":"password"} value={nw} onChange={e=>setNw(e.target.value)}
              placeholder="At least 6 characters" style={{paddingRight:44}}/>
            <button onClick={()=>setShowNw(!showNw)} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:15,color:"#8892A4"}}>{showNw?"🙈":"👁"}</button>
          </div>
          {nw&&(
            <div style={{marginTop:8}}>
              <div style={{display:"flex",gap:4,marginBottom:4}}>
                {[1,2,3,4].map(i=>(
                  <div key={i} style={{flex:1,height:4,borderRadius:2,background:str.score>=i?str.color:"#E2E8F0",transition:"background .2s"}}/>
                ))}
              </div>
              <div style={{fontSize:11.5,color:str.color,fontWeight:600}}>{str.label}</div>
            </div>
          )}
        </div>

        <div className="fg">
          <label className="lbl">Confirm New Password</label>
          <div style={{position:"relative"}}>
            <input className="inp" type={showNw?"text":"password"} value={cf} onChange={e=>setCf(e.target.value)}
              placeholder="Re-enter new password" style={{paddingRight:44,borderColor:cf&&cf!==nw?"#FC8181":""}}/>
            {cf&&<span style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",fontSize:14}}>{cf===nw?"✅":"❌"}</span>}
          </div>
        </div>

        <button className="btn bp" style={{width:"100%",justifyContent:"center",padding:"12px",fontSize:14,marginTop:8}}
          onClick={handleChange} disabled={saving||!cur||!nw||!cf}>
          {saving?<><Spinner/> Saving…</>:"🔐 Update Password"}
        </button>
      </div>

      <div className="card" style={{background:"#F5F6FA",marginTop:16}}>
        <div style={{fontWeight:700,color:"#0D1B3E",marginBottom:10,fontSize:13}}>💡 Password Tips</div>
        {[
          ["8+ characters","Longer passwords are harder to crack"],
          ["Mix case letters","Use both UPPER and lower case"],
          ["Add numbers","Include at least one digit 0–9"],
          ["Special characters","Add symbols like @, #, !, % for extra strength"],
        ].map(([t,d])=>(
          <div key={t} style={{display:"flex",gap:10,marginBottom:8,fontSize:12.5}}>
            <span style={{color:"#C9A84C",fontWeight:700,flexShrink:0}}>→</span>
            <div><strong>{t}</strong> — {d}</div>
          </div>
        ))}
      </div>
    </div>
  </div>);
};

/* ════════════════════════════════════════════════════════════
   ADMIN CENTER — super admin only: manage admin roles
   ════════════════════════════════════════════════════════════ */
const AdminCenter=({user,allStaff,onUpdateStaff})=>{
  const toast=useToast();
  const[search,setSearch]=useState("");
  const[saving,setSaving]=useState(null);
  const[showConfirm,setShowConfirm]=useState(null); // {staff, action}

  if(!user.isSuperAdmin)return(
    <div className="ani" style={{textAlign:"center",padding:"80px 20px"}}>
      <div style={{fontSize:48,marginBottom:16}}>🔒</div>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:"#0D1B3E",marginBottom:8}}>Access Restricted</div>
      <div style={{color:"#8892A4"}}>Only the Super Administrator can manage admin roles.</div>
    </div>
  );

  const admins=allStaff.filter(s=>s.isAdmin&&!s.isSuperAdmin);
  const nonAdmins=allStaff.filter(s=>!s.isAdmin&&!s.isSuperAdmin&&
    (s.name.toLowerCase().includes(search.toLowerCase())||
     s.email.toLowerCase().includes(search.toLowerCase())||
     s.dept.toLowerCase().includes(search.toLowerCase())));

  const promote=async(s)=>{
    setSaving(s.id);
    const{error}=await db.setAdmin(s.id,true);
    setSaving(null);
    if(error){toast.err("Failed: "+error.message);return;}
    onUpdateStaff(s.id,{isAdmin:true});
    toast.ok(s.name+" is now an HR Admin");
    setShowConfirm(null);
  };

  const demote=async(s)=>{
    setSaving(s.id);
    const{error}=await db.setAdmin(s.id,false);
    setSaving(null);
    if(error){toast.err("Failed: "+error.message);return;}
    onUpdateStaff(s.id,{isAdmin:false});
    toast.ok(s.name+" admin access revoked");
    setShowConfirm(null);
  };

  return(<div className="ani">
    <PH title="Admin Center" subtitle="Manage HR administrator roles" user={user}/>

    {/* Stats strip */}
    <div className="g4" style={{marginBottom:20}}>
      {[
        ["👑","Current Admins",admins.length,"#C9A84C"],
        ["👥","Total Staff",allStaff.filter(s=>!s.isSuperAdmin).length,"#2980B9"],
        ["🔑","Super Admin","1","#E53E3E"],
        ["📊","Admin Ratio",(admins.length/(allStaff.length||1)*100).toFixed(0)+"%","#1A7F64"],
      ].map(([i,l,v,col])=>(
        <div className="scard" key={l} style={{borderLeftColor:col}}>
          <div style={{fontSize:9.5,color:"#8892A4",fontWeight:700,textTransform:"uppercase",letterSpacing:.5}}>{i} {l}</div>
          <div style={{fontSize:26,fontWeight:700,color:col,marginTop:4}}>{v}</div>
        </div>
      ))}
    </div>

    {/* Current Admins */}
    <div className="card" style={{marginBottom:20}}>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:16,color:"#0D1B3E",marginBottom:16,display:"flex",alignItems:"center",gap:8}}>
        <span>👑</span> Current HR Admins
        <span style={{fontSize:12,fontWeight:400,color:"#8892A4",fontFamily:"sans-serif"}}>({admins.length})</span>
      </div>
      {admins.length===0?(
        <div style={{textAlign:"center",padding:"24px 0",color:"#8892A4",fontSize:13}}>No admins assigned yet. Promote a staff member below.</div>
      ):(
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {admins.map(s=>(
            <div key={s.id} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",background:"#FFFFF0",borderRadius:10,border:"1px solid #ECC94B"}}>
              <Av name={s.name} color={s.color} size={36} fs={12} photo={s.photo}/>
              <div style={{flex:1}}>
                <div style={{fontWeight:600,fontSize:13.5}}>{s.name}</div>
                <div style={{fontSize:12,color:"#8892A4"}}>{s.designation} · {s.dept} · {s.company}</div>
                <div style={{fontSize:11,color:"#8892A4",marginTop:1}}>{s.email}</div>
              </div>
              <span className="tag ty">👑 Admin</span>
              <button className="btn bd bsm" disabled={saving===s.id}
                onClick={()=>setShowConfirm({staff:s,action:"demote"})}>
                {saving===s.id?<Spinner/>:"✕ Revoke"}
              </button>
            </div>
          ))}
        </div>
      )}
    </div>

    {/* Promote staff */}
    <div className="card">
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:16,color:"#0D1B3E",marginBottom:14,display:"flex",alignItems:"center",gap:8}}>
        <span>➕</span> Grant Admin Access
      </div>
      <input className="inp" style={{marginBottom:14}} placeholder="🔍 Search staff by name, email or department…"
        value={search} onChange={e=>setSearch(e.target.value)}/>
      <div style={{display:"flex",flexDirection:"column",gap:8,maxHeight:400,overflowY:"auto"}}>
        {nonAdmins.length===0&&<div style={{textAlign:"center",padding:"20px 0",color:"#8892A4",fontSize:13}}>No matching staff found</div>}
        {nonAdmins.map(s=>(
          <div key={s.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",background:"#F5F6FA",borderRadius:10,border:"1px solid #E2E6F0"}}>
            <Av name={s.name} color={s.color} size={34} fs={12} photo={s.photo}/>
            <div style={{flex:1}}>
              <div style={{fontWeight:600,fontSize:13}}>{s.name}</div>
              <div style={{fontSize:11.5,color:"#8892A4"}}>{s.designation} · {s.dept} · {s.company}</div>
            </div>
            <CoTag co={s.company}/>
            <button className="btn bg bsm" disabled={saving===s.id}
              onClick={()=>setShowConfirm({staff:s,action:"promote"})}>
              {saving===s.id?<Spinner/>:"👑 Make Admin"}
            </button>
          </div>
        ))}
      </div>
    </div>

    {/* Confirm modal */}
    <Modal open={!!showConfirm} onClose={()=>setShowConfirm(null)}
      title={showConfirm?.action==="promote"?"Grant Admin Access":"Revoke Admin Access"}>
      {showConfirm&&(
        <div>
          <div style={{display:"flex",alignItems:"center",gap:14,padding:"14px",background:"#F5F6FA",borderRadius:10,marginBottom:18}}>
            <Av name={showConfirm.staff.name} color={showConfirm.staff.color} size={44} fs={15} photo={showConfirm.staff.photo}/>
            <div>
              <div style={{fontWeight:700,fontSize:14}}>{showConfirm.staff.name}</div>
              <div style={{fontSize:12.5,color:"#8892A4"}}>{showConfirm.staff.designation} · {showConfirm.staff.dept}</div>
            </div>
          </div>
          {showConfirm.action==="promote"?(
            <div style={{background:"#FFFFF0",border:"1px solid #ECC94B",borderRadius:10,padding:"12px 14px",marginBottom:18,fontSize:13,color:"#744210"}}>
              <strong>⚠️ Granting Admin Access</strong><br/>
              This staff member will be able to: approve/decline leaves, manage staff records, access all HR modules, and view sensitive payroll data. 
            </div>
          ):(
            <div style={{background:"#FFF5F5",border:"1px solid #FEB2B2",borderRadius:10,padding:"12px 14px",marginBottom:18,fontSize:13,color:"#742A2A"}}>
              <strong>⚠️ Revoking Admin Access</strong><br/>
              This person will lose all admin privileges immediately and revert to a standard staff account. Their password will reset to their Staff ID.
            </div>
          )}
          <div style={{display:"flex",gap:10}}>
            <button className={`btn ${showConfirm.action==="promote"?"bg":"bd"}`} style={{flex:1,justifyContent:"center"}}
              onClick={()=>showConfirm.action==="promote"?promote(showConfirm.staff):demote(showConfirm.staff)}
              disabled={saving===showConfirm.staff.id}>
              {saving===showConfirm.staff.id?<Spinner/>:showConfirm.action==="promote"?"👑 Confirm Promote":"✕ Confirm Revoke"}
            </button>
            <button className="btn bo" onClick={()=>setShowConfirm(null)}>Cancel</button>
          </div>
        </div>
      )}
    </Modal>
  </div>);
};

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(
  <ToastProvider>
    <App/>
  </ToastProvider>
);
</script>
</body>
</html>
