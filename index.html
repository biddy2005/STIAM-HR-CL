const EmployeeDirectory=({user,allStaff})=>{
  const[search,setSearch]=useState("");
  const[filterCo,setFilterCo]=useState("All");
  const[filterDept,setFilterDept]=useState("All");
  const[view,setView]=useState("grid"); // grid | table
  const depts=["All",...new Set(allStaff.map(s=>s.dept))].sort();
  const cos=["All",...Object.keys(COMPANIES)];

  const filtered=allStaff.filter(s=>{
    const q=search.toLowerCase();
    const matchQ=!q||s.name.toLowerCase().includes(q)||s.email.toLowerCase().includes(q)||
      s.designation.toLowerCase().includes(q)||s.dept.toLowerCase().includes(q)||s.id.toLowerCase().includes(q);
    const matchCo=filterCo==="All"||s.company===filterCo;
    const matchDept=filterDept==="All"||s.dept===filterDept;
    return matchQ&&matchCo&&matchDept;
  });

  return(<div className="ani">
    <PH title="Employee Directory" subtitle={"All staff — "+allStaff.length+" employees"} user={user}/>

    {/* Filters */}
    <div className="card" style={{marginBottom:16}}>
      <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
        <input className="inp" style={{flex:1,minWidth:200}} placeholder="🔍 Search by name, email, ID, designation…"
          value={search} onChange={e=>setSearch(e.target.value)}/>
        <select className="sel" style={{width:140}} value={filterCo} onChange={e=>setFilterCo(e.target.value)}>
          {cos.map(c=><option key={c}>{c==="All"?"All Companies":COMPANIES[c]?.short||c}</option>)}
        </select>
        <select className="sel" style={{width:160}} value={filterDept} onChange={e=>setFilterDept(e.target.value)}>
          {depts.map(d=><option key={d}>{d==="All"?"All Depts":d}</option>)}
        </select>
        <div style={{display:"flex",border:"1.5px solid #E2E6F0",borderRadius:8,overflow:"hidden"}}>
          {[["grid","⊞"],["table","☰"]].map(([v,i])=>(
            <button key={v} onClick={()=>setView(v)} style={{padding:"7px 12px",background:view===v?"#0D1B3E":"#fff",
              color:view===v?"#fff":"#4A5568",border:"none",cursor:"pointer",fontSize:15}}>{i}</button>
          ))}
        </div>
      </div>
      <div style={{fontSize:12,color:"#8892A4",marginTop:8}}>{filtered.length} result{filtered.length!==1?"s":""}</div>
    </div>

    {view==="grid"?(
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:14}}>
        {filtered.map(s=>(
          <div key={s.id} className="card" style={{padding:16,textAlign:"center"}}>
            <div style={{display:"flex",justifyContent:"center",marginBottom:10}}>
              <Av name={s.name} color={s.color} size={56} fs={18} photo={s.photo}/>
            </div>
            <div style={{fontWeight:700,fontSize:13.5,marginBottom:2}}>{s.name}</div>
            <div style={{fontSize:11.5,color:"#8892A4",marginBottom:4}}>{s.designation}</div>
            <div style={{display:"flex",gap:5,justifyContent:"center",flexWrap:"wrap",marginBottom:8}}>
              <CoTag co={s.company}/>
              <span className="tag ty">{s.dept}</span>
              {s.isAdmin&&<span className="tag tb">Admin</span>}
            </div>
            <div style={{fontSize:11.5,color:"#4A5568"}}>{s.email}</div>
            <div style={{fontSize:11.5,color:"#4A5568"}}>{s.phone}</div>
            {s.manager&&<div style={{fontSize:11,color:"#8892A4",marginTop:4}}>Reports to: {s.manager}</div>}
          </div>
        ))}
      </div>
    ):(
      <div className="card"><div style={{overflowX:"auto"}}>
        <table className="table">
          <thead><tr><th>Staff</th><th>ID</th><th>Designation</th><th>Dept</th><th>Entity</th><th>Email</th><th>Phone</th><th>Manager</th></tr></thead>
          <tbody>
            {filtered.map(s=>(
              <tr key={s.id}>
                <td><div style={{display:"flex",alignItems:"center",gap:8}}><Av name={s.name} color={s.color} size={30} fs={11} photo={s.photo}/><span style={{fontWeight:600,fontSize:13}}>{s.name}</span></div></td>
                <td style={{fontFamily:"monospace",fontSize:11}}>{s.id}</td>
                <td>{s.designation}</td>
                <td><span className="tag ty">{s.dept}</span></td>
                <td><CoTag co={s.company}/></td>
                <td style={{fontSize:12}}>{s.email}</td>
                <td style={{fontSize:12}}>{s.phone}</td>
                <td style={{fontSize:12,color:"#8892A4"}}>{s.manager||"—"}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div></div>
    )}
  </div>);
};

/* ════════════════════════════════════════════════════════════
   CONTRACTS & EMPLOYMENT RECORDS
   ════════════════════════════════════════════════════════════ */
const mapContract=r=>({
  id:r.id,staffId:r.staff_id,staffName:r.staff_name,type:r.contract_type,
  startDate:r.start_date,endDate:r.end_date,probationEnd:r.probation_end,
  noticePeriod:r.notice_period,grade:r.job_grade,band:r.salary_band,
  status:r.status,notes:r.notes,createdAt:r.created_at,
});
const ContractRecords=({user,allStaff,onLog})=>{
  const toast=useToast();
  const canManage=user.isAdmin||user.isSuperAdmin;
  const[contracts,setContracts]=useState([]);
  const[loading,setLoading]=useState(true);
  const[showForm,setShowForm]=useState(false);
  const[search,setSearch]=useState("");
  const[saving,setSaving]=useState(false);
  const blank={staffId:"",type:"Permanent",startDate:"",endDate:"",probationEnd:"",noticePeriod:"3 months",grade:"",band:"",notes:""};
  const[form,setForm]=useState(blank);
  const fld=(k,v)=>setForm(p=>({...p,[k]:v}));

  useEffect(()=>{
    db.getContracts().then(({data,error})=>{
      setLoading(false);
      if(!error&&data)setContracts(data.map(mapContract));
    });
  },[]);

  const save=async()=>{
    if(!form.staffId||!form.startDate){toast.err("Staff and Start Date are required");return;}
    const s=allStaff.find(x=>x.id===form.staffId);
    if(!s){toast.err("Staff not found");return;}
    setSaving(true);
    const row={staff_id:form.staffId,staff_name:s.name,contract_type:form.type,
      start_date:form.startDate,end_date:form.endDate||null,probation_end:form.probationEnd||null,
      notice_period:form.noticePeriod,job_grade:form.grade,salary_band:form.band,status:"Active",notes:form.notes};
    const{data,error}=await db.addContract(row);
    setSaving(false);
    if(error){toast.err("Save failed: "+error.message);return;}
    setContracts(p=>[mapContract(data),...p]);
    if(onLog)onLog("contract_added","Added contract for "+s.name);
    toast.ok("Contract saved for "+s.name);
    setShowForm(false);setForm(blank);
  };

  const today=new Date().toISOString().split("T")[0];
  const expiringSoon=contracts.filter(c=>c.endDate&&c.endDate>today&&c.endDate<new Date(Date.now()+30*86400000).toISOString().split("T")[0]);
  const probationSoon=contracts.filter(c=>c.probationEnd&&c.probationEnd>today&&c.probationEnd<new Date(Date.now()+14*86400000).toISOString().split("T")[0]);
  const filtered=contracts.filter(c=>c.staffName.toLowerCase().includes(search.toLowerCase())||c.type.toLowerCase().includes(search.toLowerCase()));
  const typeColor={Permanent:"#0D1B3E",Contract:"#E67E22",NYSC:"#1A7F64",Intern:"#8E44AD",Probation:"#C9A84C"};

  return(<div className="ani">
    <PH title="Contracts & Employment" subtitle="Employment records and contract management" user={user}/>

    {/* Alerts */}
    {expiringSoon.length>0&&(
      <div style={{background:"#FFFFF0",border:"1px solid #ECC94B",borderRadius:10,padding:"12px 16px",marginBottom:14,fontSize:13}}>
        ⚠️ <strong>{expiringSoon.length} contract(s)</strong> expiring within 30 days: {expiringSoon.map(c=>c.staffName).join(", ")}
      </div>
    )}
    {probationSoon.length>0&&(
      <div style={{background:"#EBF8FF",border:"1px solid #90CDF4",borderRadius:10,padding:"12px 16px",marginBottom:14,fontSize:13}}>
        ℹ️ <strong>{probationSoon.length} probation(s)</strong> ending within 14 days: {probationSoon.map(c=>c.staffName).join(", ")}
      </div>
    )}

    <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
      <input className="inp" style={{flex:1,minWidth:200}} placeholder="🔍 Search contracts…" value={search} onChange={e=>setSearch(e.target.value)}/>
      {canManage&&<button className="btn bg" onClick={()=>setShowForm(true)}>+ New Contract</button>}
    </div>

    {loading?<div style={{textAlign:"center",padding:40}}><Spinner dark/></div>:(
      <div className="card"><div style={{overflowX:"auto"}}>
        <table className="table">
          <thead><tr><th>Staff</th><th>Type</th><th>Start</th><th>End</th><th>Probation End</th><th>Notice</th><th>Grade</th><th>Status</th></tr></thead>
          <tbody>
            {filtered.length===0&&<tr><td colSpan={8} style={{textAlign:"center",color:"#8892A4",padding:"30px 0"}}>No contracts found</td></tr>}
            {filtered.map(c=>{
              const expired=c.endDate&&c.endDate<today;
              return(<tr key={c.id}>
                <td><div style={{fontWeight:600,fontSize:13}}>{c.staffName}</div></td>
                <td><span style={{padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:700,background:typeColor[c.type]+"22",color:typeColor[c.type]}}>{c.type}</span></td>
                <td style={{fontSize:12}}>{c.startDate||"—"}</td>
                <td style={{fontSize:12,color:expired?"#E53E3E":""}}>{c.endDate||"Indefinite"}</td>
                <td style={{fontSize:12}}>{c.probationEnd||"—"}</td>
                <td style={{fontSize:12}}>{c.noticePeriod||"—"}</td>
                <td style={{fontSize:12}}>{c.grade||"—"}</td>
                <td><span className={`tag ${expired?"td":"tg"}`}>{expired?"Expired":"Active"}</span></td>
              </tr>);
            })}
          </tbody>
        </table>
      </div></div>
    )}

    <Modal open={showForm} onClose={()=>setShowForm(false)} title="New Employment Contract">
      <div className="g2">
        <div className="fg"><label className="lbl">Staff Member *</label>
          <select className="sel" value={form.staffId} onChange={e=>fld("staffId",e.target.value)}>
            <option value="">Select staff…</option>
            {allStaff.map(s=><option key={s.id} value={s.id}>{s.name} ({s.id})</option>)}
          </select>
        </div>
        <div className="fg"><label className="lbl">Contract Type *</label>
          <select className="sel" value={form.type} onChange={e=>fld("type",e.target.value)}>
            {["Permanent","Contract","NYSC","Intern","Probation"].map(t=><option key={t}>{t}</option>)}
          </select>
        </div>
      </div>
      <div className="g2">
        <div className="fg"><label className="lbl">Start Date *</label><input type="date" className="inp" value={form.startDate} onChange={e=>fld("startDate",e.target.value)}/></div>
        <div className="fg"><label className="lbl">End Date (leave blank for permanent)</label><input type="date" className="inp" value={form.endDate} onChange={e=>fld("endDate",e.target.value)}/></div>
      </div>
      <div className="g2">
        <div className="fg"><label className="lbl">Probation End Date</label><input type="date" className="inp" value={form.probationEnd} onChange={e=>fld("probationEnd",e.target.value)}/></div>
        <div className="fg"><label className="lbl">Notice Period</label>
          <select className="sel" value={form.noticePeriod} onChange={e=>fld("noticePeriod",e.target.value)}>
            {["1 month","2 months","3 months","6 months"].map(n=><option key={n}>{n}</option>)}
          </select>
        </div>
      </div>
      <div className="g2">
        <div className="fg"><label className="lbl">Job Grade</label><input className="inp" value={form.grade} onChange={e=>fld("grade",e.target.value)} placeholder="e.g. Grade 7"/></div>
        <div className="fg"><label className="lbl">Salary Band</label><input className="inp" value={form.band} onChange={e=>fld("band",e.target.value)} placeholder="e.g. Band C"/></div>
      </div>
      <div className="fg"><label className="lbl">Notes</label><textarea className="inp" rows={2} value={form.notes} onChange={e=>fld("notes",e.target.value)} placeholder="Additional terms or notes…"/></div>
      <div style={{display:"flex",gap:10}}>
        <button className="btn bp" style={{flex:1,justifyContent:"center"}} onClick={save} disabled={saving}>{saving?<><Spinner/> Saving…</>:"Save Contract"}</button>
        <button className="btn bo" onClick={()=>setShowForm(false)}>Cancel</button>
      </div>
    </Modal>
  </div>);
};

/* ════════════════════════════════════════════════════════════
   DISCIPLINARY MODULE
   ════════════════════════════════════════════════════════════ */
const mapDisc=r=>({
  id:r.id,staffId:r.staff_id,staffName:r.staff_name,type:r.record_type,
  description:r.description,issuedDate:r.issued_date,issuedBy:r.issued_by,
  outcome:r.outcome,status:r.status,response:r.response,notes:r.notes,
});
const DisciplinaryModule=({user,allStaff,onLog})=>{
  const toast=useToast();
  const canManage=user.isAdmin||user.isSuperAdmin;
  const[records,setRecords]=useState([]);
  const[loading,setLoading]=useState(true);
  const[showForm,setShowForm]=useState(false);
  const[viewRec,setViewRec]=useState(null);
  const[saving,setSaving]=useState(false);
  const[filter,setFilter]=useState("All");
  const blank={staffId:"",type:"Query",description:"",issuedDate:TODAY,outcome:"",notes:""};
  const[form,setForm]=useState(blank);
  const fld=(k,v)=>setForm(p=>({...p,[k]:v}));

  useEffect(()=>{
    db.getDisciplinary().then(({data,error})=>{
      setLoading(false);
      if(!error&&data)setRecords(data.map(mapDisc));
    });
  },[]);

  const save=async()=>{
    if(!form.staffId||!form.description){toast.err("Staff and description required");return;}
    const s=allStaff.find(x=>x.id===form.staffId);
    setSaving(true);
    const row={staff_id:form.staffId,staff_name:s?.name||form.staffId,record_type:form.type,
      description:form.description,issued_date:form.issuedDate,issued_by:user.name,
      outcome:form.outcome,status:"Open",notes:form.notes};
    const{data,error}=await db.addDisciplinary(row);
    setSaving(false);
    if(error){toast.err("Failed: "+error.message);return;}
    setRecords(p=>[mapDisc(data),...p]);
    if(onLog)onLog("disciplinary_issued",`${form.type} issued to ${s?.name}`);
    toast.ok(`${form.type} record created`);
    setShowForm(false);setForm(blank);
  };

  const closeRecord=async(id)=>{
    const{error}=await db.updateDisciplinary(id,{status:"Closed"});
    if(error){toast.err(error.message);return;}
    setRecords(p=>p.map(r=>r.id===id?{...r,status:"Closed"}:r));
    toast.ok("Record closed");
  };

  const typeIcons={Query:"📝","Verbal Warning":"🗣","Written Warning":"✍️","Final Warning":"⛔","Suspension":"🚫","Hearing":"⚖️"};
  const typeColors={Query:"#2980B9","Verbal Warning":"#E67E22","Written Warning":"#C0392B","Final Warning":"#8E44AD","Suspension":"#E53E3E","Hearing":"#0D1B3E"};
  const types=["All","Query","Verbal Warning","Written Warning","Final Warning","Suspension","Hearing"];
  const filtered=records.filter(r=>filter==="All"||r.type===filter);

  return(<div className="ani">
    <PH title="Disciplinary Module" subtitle="Queries, warnings & disciplinary proceedings" user={user}/>

    <div style={{display:"flex",gap:7,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
      {types.map(t=><button key={t} onClick={()=>setFilter(t)} className="btn" style={{fontSize:11.5,padding:"5px 12px",background:filter===t?"#0D1B3E":"#fff",color:filter===t?"#fff":"#4A5568",border:"1.5px solid #E2E6F0"}}>{t}</button>)}
      {canManage&&<button className="btn bd" style={{marginLeft:"auto"}} onClick={()=>setShowForm(true)}>+ Issue Record</button>}
    </div>

    {loading?<div style={{textAlign:"center",padding:40}}><Spinner dark/></div>:(
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {filtered.length===0&&<div className="card" style={{textAlign:"center",padding:"30px 0",color:"#8892A4"}}>No disciplinary records</div>}
        {filtered.map(r=>(
          <div key={r.id} className="card" style={{borderLeft:`4px solid ${typeColors[r.type]||"#8892A4"}`,cursor:"pointer"}} onClick={()=>setViewRec(r)}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                  <span style={{fontSize:16}}>{typeIcons[r.type]||"📋"}</span>
                  <span style={{fontWeight:700,fontSize:13.5,color:typeColors[r.type]}}>{r.type}</span>
                  <span className={`tag ${r.status==="Closed"?"tg":"td"}`}>{r.status}</span>
                </div>
                <div style={{fontWeight:600,fontSize:13}}>{r.staffName}</div>
                <div style={{fontSize:12.5,color:"#4A5568",marginTop:3,maxWidth:500}}>{r.description.slice(0,120)}{r.description.length>120?"…":""}</div>
              </div>
              <div style={{textAlign:"right",fontSize:11.5,color:"#8892A4"}}>
                <div>{r.issuedDate}</div>
                <div>By: {r.issuedBy}</div>
                {canManage&&r.status!=="Closed"&&<button className="btn bo bsm" style={{marginTop:6}} onClick={e=>{e.stopPropagation();closeRecord(r.id);}}>✓ Close</button>}
              </div>
            </div>
          </div>
        ))}
      </div>
    )}

    <Modal open={showForm} onClose={()=>setShowForm(false)} title="Issue Disciplinary Record">
      <div className="g2">
        <div className="fg"><label className="lbl">Staff Member *</label>
          <select className="sel" value={form.staffId} onChange={e=>fld("staffId",e.target.value)}>
            <option value="">Select staff…</option>
            {allStaff.filter(s=>!s.isSuperAdmin).map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
          </select>
        </div>
        <div className="fg"><label className="lbl">Record Type *</label>
          <select className="sel" value={form.type} onChange={e=>fld("type",e.target.value)}>
            {["Query","Verbal Warning","Written Warning","Final Warning","Suspension","Hearing"].map(t=><option key={t}>{t}</option>)}
          </select>
        </div>
      </div>
      <div className="fg"><label className="lbl">Date Issued</label><input type="date" className="inp" value={form.issuedDate} onChange={e=>fld("issuedDate",e.target.value)}/></div>
      <div className="fg"><label className="lbl">Description / Offence *</label><textarea className="inp" rows={3} value={form.description} onChange={e=>fld("description",e.target.value)} placeholder="Describe the incident or offence in detail…"/></div>
      <div className="fg"><label className="lbl">Outcome / Decision</label><input className="inp" value={form.outcome} onChange={e=>fld("outcome",e.target.value)} placeholder="e.g. 3-day suspension, salary deduction…"/></div>
      <div className="fg"><label className="lbl">Internal Notes</label><textarea className="inp" rows={2} value={form.notes} onChange={e=>fld("notes",e.target.value)} placeholder="Confidential HR notes…"/></div>
      <div style={{display:"flex",gap:10}}>
        <button className="btn bd" style={{flex:1,justifyContent:"center"}} onClick={save} disabled={saving}>{saving?<><Spinner/> Saving…</>:"Issue Record"}</button>
        <button className="btn bo" onClick={()=>setShowForm(false)}>Cancel</button>
      </div>
    </Modal>

    <Modal open={!!viewRec} onClose={()=>setViewRec(null)} title="Disciplinary Record Detail">
      {viewRec&&<div>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,padding:"12px",background:"#F5F6FA",borderRadius:8}}>
          <span style={{fontSize:24}}>{typeIcons[viewRec.type]}</span>
          <div><div style={{fontWeight:700,color:typeColors[viewRec.type]}}>{viewRec.type}</div><div style={{fontSize:12.5,color:"#8892A4"}}>{viewRec.staffName} · {viewRec.issuedDate}</div></div>
          <span className={`tag ${viewRec.status==="Closed"?"tg":"td"}`} style={{marginLeft:"auto"}}>{viewRec.status}</span>
        </div>
        <div className="fg"><label className="lbl">Description</label><p style={{fontSize:13,color:"#2D3748",padding:"10px",background:"#F5F6FA",borderRadius:8,margin:0}}>{viewRec.description}</p></div>
        {viewRec.outcome&&<div className="fg"><label className="lbl">Outcome</label><p style={{fontSize:13,padding:"10px",background:"#FFF5F5",borderRadius:8,margin:0,color:"#742A2A"}}>{viewRec.outcome}</p></div>}
        {viewRec.notes&&<div className="fg"><label className="lbl">Internal Notes</label><p style={{fontSize:13,padding:"10px",background:"#EBF8FF",borderRadius:8,margin:0}}>{viewRec.notes}</p></div>}
        <div style={{fontSize:12,color:"#8892A4",marginTop:8}}>Issued by: {viewRec.issuedBy}</div>
      </div>}
    </Modal>
  </div>);
};

/* ════════════════════════════════════════════════════════════
   ONBOARDING & OFFBOARDING
   ════════════════════════════════════════════════════════════ */
const mapOnboard=r=>({
  id:r.id,staffId:r.staff_id,staffName:r.staff_name,category:r.category,
  task:r.task,status:r.status,assignedTo:r.assigned_to,dueDate:r.due_date,
  completedDate:r.completed_date,notes:r.notes,createdAt:r.created_at,
});
const ONBOARD_TEMPLATES={
  onboarding:[
    "Set up payroll account (bank details)",
    "Introduce to line manager and team",
    "Attend company induction session",
    "Complete HR documentation (offer letter, contract)",
    "Register with PFA (pension)",
    "Set up company email account",
    "Assign equipment and system access",
    "Issue staff ID card",
    "Read and sign Employee Handbook",
    "Complete IT security training",
  ],
  offboarding:[
    "Receive and accept resignation / exit letter",
    "Final payslip generation",
    "Conduct/exit form submission",
    "Collect company equipment (laptop, phone, ID card)",
    "Complete knowledge transfer documentation",
    "Final salary computation and clearance",
    "Remove from HMO and PFA records",
    "Notify IT for system access revocation",
    "Supabase account deactivation",
    "Archive employee records",
    "Update headcount metrics",
  ]
};
const OnboardingModule=({user,allStaff,onLog,onAddStaff})=>{
  const toast=useToast();
  const canManage=user.isAdmin||user.isSuperAdmin;
  const[tasks,setTasks]=useState([]);
  const[loading,setLoading]=useState(true);
  const[tab,setTab]=useState("onboarding"); // onboarding | offboarding
  const[showStart,setShowStart]=useState(false);
  const[showNewEmp,setShowNewEmp]=useState(false);
  const[saving,setSaving]=useState(false);
  const[staffSel,setStaffSel]=useState("");

  useEffect(()=>{
    db.getOnboarding().then(({data,error})=>{
      setLoading(false);
      if(!error&&data)setTasks(data.map(mapOnboard));
    });
  },[]);

  const startProcess=async()=>{
    const s=allStaff.find(x=>x.id===staffSel);
    if(!s){toast.err("Select a staff member");return;}
    setSaving(true);
    const rows=ONBOARD_TEMPLATES[tab].map(task=>({
      staff_id:s.id,staff_name:s.name,category:tab,task,
      status:"Pending",assigned_to:"HR",due_date:null,
    }));
    const{error}=await db.addOnboarding(rows);
    setSaving(false);
    if(error){toast.err(error.message);return;}
    // Re-fetch
    const{data}=await db.getOnboarding();
    if(data)setTasks(data.map(mapOnboard));
    if(onLog)onLog(tab+"_started",`${tab} started for ${s.name}`);
    toast.ok(`${tab.charAt(0).toUpperCase()+tab.slice(1)} checklist created for ${s.name}`);
    setShowStart(false);setStaffSel("");
  };

  const toggle=async(task)=>{
    const newStatus=task.status==="Complete"?"Pending":"Complete";
    const{error}=await db.updateOnboarding(task.id,{status:newStatus,completed_date:newStatus==="Complete"?TODAY:null});
    if(error){toast.err(error.message);return;}
    setTasks(p=>p.map(t=>t.id===task.id?{...t,status:newStatus,completedDate:newStatus==="Complete"?TODAY:null}:t));
  };

  const deleteTask=async(id)=>{
    await db.deleteOnboarding(id);
    setTasks(p=>p.filter(t=>t.id!==id));
  };

  const tabTasks=tasks.filter(t=>t.category===tab);
  const byStaff=[...new Set(tabTasks.map(t=>t.staffId))].map(sid=>{
    const staffTasks=tabTasks.filter(t=>t.staffId===sid);
    const done=staffTasks.filter(t=>t.status==="Complete").length;
    return{staffId:sid,staffName:staffTasks[0]?.staffName||sid,tasks:staffTasks,done,total:staffTasks.length};
  });

  return(<div className="ani">
    <PH title="Onboarding & Offboarding" subtitle="Staff induction and exit checklists" user={user}/>

    <div style={{display:"flex",gap:8,marginBottom:16,alignItems:"center",flexWrap:"wrap"}}>
      {[["onboarding","🎯 Onboarding"],["offboarding","🚪 Offboarding"]].map(([k,l])=>(
        <button key={k} onClick={()=>setTab(k)} className="btn"
          style={{background:tab===k?"#0D1B3E":"#fff",color:tab===k?"#fff":"#4A5568",border:"1.5px solid #E2E6F0",padding:"8px 18px"}}>
          {l}
        </button>
      ))}
      {canManage&&<div style={{marginLeft:"auto",display:"flex",gap:8}}>
        <button className="btn bt" onClick={()=>setShowNewEmp(true)}>👤 New Employee</button>
        <button className="btn bg" onClick={()=>setShowStart(true)}>+ Start {tab.charAt(0).toUpperCase()+tab.slice(1)}</button>
      </div>}
    </div>

    {loading?<div style={{textAlign:"center",padding:40}}><Spinner dark/></div>:(
      byStaff.length===0?(
        <div className="card" style={{textAlign:"center",padding:"40px 0",color:"#8892A4"}}>
          <div style={{fontSize:36,marginBottom:10}}>{tab==="onboarding"?"🎯":"🚪"}</div>
          <div style={{fontWeight:600}}>No active {tab} processes</div>
          {canManage&&<div style={{fontSize:12.5,marginTop:6}}>Click "Start {tab.charAt(0).toUpperCase()+tab.slice(1)}" to begin a checklist for a staff member.</div>}
        </div>
      ):(
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          {byStaff.map(({staffId,staffName,tasks:stasks,done,total})=>{
            const pct=total>0?Math.round(done/total*100):0;
            const s=allStaff.find(x=>x.id===staffId);
            return(<div key={staffId} className="card">
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
                <Av name={staffName} color={s?.color||"#0D1B3E"} size={38} fs={13} photo={s?.photo}/>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:14}}>{staffName}</div>
                  <div style={{fontSize:12,color:"#8892A4"}}>{done}/{total} tasks complete</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:20,fontWeight:700,color:pct===100?"#38A169":"#0D1B3E"}}>{pct}%</div>
                  {pct===100&&<span className="tag tg">✓ Complete</span>}
                </div>
              </div>
              <div style={{background:"#E2E6F0",borderRadius:4,height:6,marginBottom:14}}>
                <div style={{width:pct+"%",height:"100%",background:pct===100?"#38A169":"#0D1B3E",borderRadius:4,transition:"width .5s"}}/>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {stasks.map(t=>(
                  <div key={t.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",background:t.status==="Complete"?"#F0FFF4":"#FAFAFA",borderRadius:8,border:"1px solid "+(t.status==="Complete"?"#C6F6D5":"#E2E6F0")}}>
                    <button onClick={()=>canManage&&toggle(t)} style={{width:20,height:20,borderRadius:4,border:"2px solid "+(t.status==="Complete"?"#38A169":"#CBD5E0"),background:t.status==="Complete"?"#38A169":"#fff",cursor:canManage?"pointer":"default",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:12}}>{t.status==="Complete"?"✓":""}</button>
                    <span style={{flex:1,fontSize:12.5,color:t.status==="Complete"?"#276749":"#2D3748",textDecoration:t.status==="Complete"?"line-through":""}}>{t.task}</span>
                    {t.completedDate&&<span style={{fontSize:11,color:"#8892A4"}}>{t.completedDate}</span>}
                    {canManage&&<button onClick={()=>deleteTask(t.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#CBD5E0",fontSize:14}}>✕</button>}
                  </div>
                ))}
              </div>
            </div>);
          })}
        </div>
      )
    )}

    <Modal open={showStart} onClose={()=>setShowStart(false)} title={`Start ${tab.charAt(0).toUpperCase()+tab.slice(1)} Process`}>
      <div style={{background:"#EBF8FF",border:"1px solid #BEE3F8",borderRadius:8,padding:"10px 14px",fontSize:12.5,color:"#2C5282",marginBottom:14}}>
        This will create a checklist of {ONBOARD_TEMPLATES[tab].length} standard {tab} tasks for the selected staff member.
      </div>
      <div className="fg"><label className="lbl">Staff Member</label>
        <select className="sel" value={staffSel} onChange={e=>setStaffSel(e.target.value)}>
          <option value="">Select staff…</option>
          {allStaff.map(s=><option key={s.id} value={s.id}>{s.name} ({s.id})</option>)}
        </select>
      </div>
      <div style={{display:"flex",gap:10}}>
        <button className="btn bp" style={{flex:1,justifyContent:"center"}} onClick={startProcess} disabled={saving||!staffSel}>{saving?<><Spinner/> Creating…</>:"Create Checklist"}</button>
        <button className="btn bo" onClick={()=>setShowStart(false)}>Cancel</button>
      </div>
    </Modal>

    {/* ── New Employee Modal — creates staff record then auto-starts onboarding checklist ── */}
    <AddStaffModal open={showNewEmp} onClose={()=>setShowNewEmp(false)} allStaff={allStaff}
      onAdd={async(newStaff)=>{
        if(onAddStaff)onAddStaff(newStaff);
        setShowNewEmp(false);
        // Auto-create onboarding checklist for the new employee
        const rows=ONBOARD_TEMPLATES["onboarding"].map(task=>({
          staff_id:newStaff.id,staff_name:newStaff.name,category:"onboarding",task,
          status:"Pending",assigned_to:"HR",due_date:null,
        }));
        const{error}=await db.addOnboarding(rows);
        if(!error){
          const{data}=await db.getOnboarding();
          if(data)setTasks(data.map(mapOnboard));
          if(onLog)onLog("onboarding_started","Onboarding checklist auto-created for "+newStaff.name,"Onboarding");
          toast.ok("Employee added & onboarding checklist created for "+newStaff.name);
          setTab("onboarding");
        }
      }}/>
  </div>);
};

/* ════════════════════════════════════════════════════════════
   PAYROLL ENGINE — Full Nigerian Payroll
   ════════════════════════════════════════════════════════════ */
const mapBenefit=r=>({
  id:r.id,staffId:r.staff_id,staffName:r.staff_name,hmoProvider:r.hmo_provider,
  hmoPlan:r.hmo_plan,hmoExpiry:r.hmo_expiry,pfaName:r.pfa_name,pfaId:r.pfa_id,
  lifeInsured:r.life_insured,lifeAmount:r.life_amount,notes:r.notes,updatedAt:r.updated_at,
});
const BenefitsAdmin=({user,allStaff,onLog})=>{
  const toast=useToast();
  const canManage=user.isAdmin||user.isSuperAdmin;
  const[benefits,setBenefits]=useState([]);
  const[loading,setLoading]=useState(true);
  const[editStaff,setEditStaff]=useState(null);
  const[saving,setSaving]=useState(false);
  const blank={hmoProvider:"",hmoPlan:"Standard",hmoExpiry:"",pfaName:"",pfaId:"",lifeInsured:false,lifeAmount:"",notes:""};
  const[form,setForm]=useState(blank);
  const fld=(k,v)=>setForm(p=>({...p,[k]:v}));

  useEffect(()=>{
    db.getBenefits().then(({data,error})=>{
      setLoading(false);
      if(!error&&data)setBenefits(data.map(mapBenefit));
    });
  },[]);

  const openEdit=(s)=>{
    const existing=benefits.find(b=>b.staffId===s.id);
    setForm(existing?{hmoProvider:existing.hmoProvider||"",hmoPlan:existing.hmoPlan||"Standard",hmoExpiry:existing.hmoExpiry||"",pfaName:existing.pfaName||"",pfaId:existing.pfaId||"",lifeInsured:existing.lifeInsured||false,lifeAmount:existing.lifeAmount||"",notes:existing.notes||""}:blank);
    setEditStaff(s);
  };

  const save=async()=>{
    setSaving(true);
    const row={staff_id:editStaff.id,staff_name:editStaff.name,hmo_provider:form.hmoProvider,hmo_plan:form.hmoPlan,hmo_expiry:form.hmoExpiry||null,pfa_name:form.pfaName,pfa_id:form.pfaId,life_insured:form.lifeInsured,life_amount:form.lifeAmount||null,notes:form.notes,updated_at:new Date().toISOString()};
    const{data,error}=await db.upsertBenefit(row);
    setSaving(false);
    if(error){toast.err(error.message);return;}
    const mapped=mapBenefit(data);
    setBenefits(p=>{const idx=p.findIndex(b=>b.staffId===editStaff.id);return idx>=0?p.map(b=>b.staffId===editStaff.id?mapped:b):[mapped,...p];});
    if(onLog)onLog("benefit_updated","Benefits updated for "+editStaff.name);
    toast.ok("Benefits saved for "+editStaff.name);
    setEditStaff(null);
  };

  const today=new Date().toISOString().split("T")[0];
  const expiringHMO=benefits.filter(b=>b.hmoExpiry&&b.hmoExpiry>today&&b.hmoExpiry<new Date(Date.now()+30*86400000).toISOString().split("T")[0]);

  return(<div className="ani">
    <PH title="Benefits Administration" subtitle="HMO, Pension & Life Insurance tracking" user={user}/>

    {expiringHMO.length>0&&<div style={{background:"#FFFFF0",border:"1px solid #ECC94B",borderRadius:10,padding:"12px 16px",marginBottom:14,fontSize:13}}>
      ⚠️ HMO expiring within 30 days: <strong>{expiringHMO.map(b=>b.staffName).join(", ")}</strong>
    </div>}

    <div className="g4" style={{marginBottom:20}}>
      {[["🏥","HMO Covered",benefits.filter(b=>b.hmoProvider).length,"#1A7F64"],
        ["📊","On Pension",benefits.filter(b=>b.pfaName).length,"#2980B9"],
        ["🛡","Life Insured",benefits.filter(b=>b.lifeInsured).length,"#C9A84C"],
        ["⚠️","HMO Expiring",expiringHMO.length,"#E67E22"]
      ].map(([i,l,v,col])=>(
        <div key={l} className="scard" style={{borderLeftColor:col}}>
          <div style={{fontSize:10.5,color:"#8892A4",fontWeight:700,textTransform:"uppercase",letterSpacing:.4}}>{i} {l}</div>
          <div style={{fontSize:26,fontWeight:700,color:col,marginTop:4}}>{v}</div>
        </div>
      ))}
    </div>

    {loading?<div style={{textAlign:"center",padding:40}}><Spinner dark/></div>:(
      <div className="card"><div style={{overflowX:"auto"}}>
        <table className="table">
          <thead><tr><th>Staff</th><th>HMO Provider</th><th>HMO Plan</th><th>HMO Expiry</th><th>PFA</th><th>PFA ID</th><th>Life Insurance</th>{canManage&&<th>Edit</th>}</tr></thead>
          <tbody>
            {allStaff.filter(s=>!s.isSuperAdmin).map(s=>{
              const b=benefits.find(x=>x.staffId===s.id);
              const expired=b?.hmoExpiry&&b.hmoExpiry<today;
              return(<tr key={s.id}>
                <td><div style={{display:"flex",alignItems:"center",gap:8}}><Av name={s.name} color={s.color} size={28} fs={10} photo={s.photo}/><div><div style={{fontWeight:600,fontSize:12.5}}>{s.name}</div><div style={{fontSize:11,color:"#8892A4"}}>{s.dept}</div></div></div></td>
                <td>{b?.hmoProvider||<span style={{color:"#CBD5E0"}}>—</span>}</td>
                <td>{b?.hmoPlan||<span style={{color:"#CBD5E0"}}>—</span>}</td>
                <td style={{color:expired?"#E53E3E":""}}>{b?.hmoExpiry||"—"}</td>
                <td>{b?.pfaName||"—"}</td>
                <td style={{fontFamily:"monospace",fontSize:11}}>{b?.pfaId||"—"}</td>
                <td>{b?.lifeInsured?<span className="tag tg">✓ Insured</span>:<span className="tag" style={{background:"#FFF5F5",color:"#C53030"}}>Not Covered</span>}</td>
                {canManage&&<td><button className="btn bo bsm" onClick={()=>openEdit(s)}>Edit</button></td>}
              </tr>);
            })}
          </tbody>
        </table>
      </div></div>
    )}

    <Modal open={!!editStaff} onClose={()=>setEditStaff(null)} title={`Benefits — ${editStaff?.name||""}`}>
      <div style={{fontWeight:600,color:"#0D1B3E",marginBottom:14}}>🏥 HMO Details</div>
      <div className="g2">
        <div className="fg"><label className="lbl">HMO Provider</label><input className="inp" value={form.hmoProvider} onChange={e=>fld("hmoProvider",e.target.value)} placeholder="e.g. Hygeia, Leadway"/></div>
        <div className="fg"><label className="lbl">Plan</label>
          <select className="sel" value={form.hmoPlan} onChange={e=>fld("hmoPlan",e.target.value)}>
            {["Standard","Silver","Gold","Platinum","Executive"].map(p=><option key={p}>{p}</option>)}
          </select>
        </div>
      </div>
      <div className="fg"><label className="lbl">HMO Expiry Date</label><input type="date" className="inp" value={form.hmoExpiry} onChange={e=>fld("hmoExpiry",e.target.value)}/></div>
      <div style={{fontWeight:600,color:"#0D1B3E",marginTop:14,marginBottom:10}}>📊 Pension (PFA) Details</div>
      <div className="g2">
        <div className="fg"><label className="lbl">PFA Name</label><input className="inp" value={form.pfaName} onChange={e=>fld("pfaName",e.target.value)} placeholder="e.g. ARM Pensions"/></div>
        <div className="fg"><label className="lbl">RSA / PFA ID</label><input className="inp" value={form.pfaId} onChange={e=>fld("pfaId",e.target.value)} placeholder="Pension account number"/></div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:10,margin:"14px 0 10px"}}>
        <input type="checkbox" id="lifeCheck" checked={form.lifeInsured} onChange={e=>fld("lifeInsured",e.target.checked)} style={{width:16,height:16}}/>
        <label htmlFor="lifeCheck" style={{fontSize:13,fontWeight:600}}>🛡 Group Life Insurance Enrolled</label>
      </div>
      {form.lifeInsured&&<div className="fg"><label className="lbl">Cover Amount (₦)</label><input className="inp" type="number" value={form.lifeAmount} onChange={e=>fld("lifeAmount",e.target.value)} placeholder="e.g. 5000000"/></div>}
      <div className="fg"><label className="lbl">Notes</label><textarea className="inp" rows={2} value={form.notes} onChange={e=>fld("notes",e.target.value)}/></div>
      <div style={{display:"flex",gap:10}}>
        <button className="btn bp" style={{flex:1,justifyContent:"center"}} onClick={save} disabled={saving}>{saving?<><Spinner/> Saving…</>:"Save Benefits"}</button>
        <button className="btn bo" onClick={()=>setEditStaff(null)}>Cancel</button>
      </div>
    </Modal>
  </div>);
};

/* ════════════════════════════════════════════════════════════
   LEAVE CALENDAR
   ════════════════════════════════════════════════════════════ */
const LeaveCalendar=({user,allStaff,leaves})=>{
  const[monthOffset,setMonthOffset]=useState(0);
  const base=new Date();
  const viewDate=new Date(base.getFullYear(),base.getMonth()+monthOffset,1);
  const year=viewDate.getFullYear();
  const month=viewDate.getMonth();
  const monthName=viewDate.toLocaleString("en-NG",{month:"long",year:"numeric"});
  const daysInMonth=new Date(year,month+1,0).getDate();
  const firstDow=new Date(year,month,1).getDay(); // 0=Sun
  const approvedLeaves=leaves.filter(l=>l.status==="Approved");

  const getLeaveForDay=(dayNum)=>{
    const dateStr=`${year}-${String(month+1).padStart(2,"0")}-${String(dayNum).padStart(2,"0")}`;
    return approvedLeaves.filter(l=>l.from<=dateStr&&l.to>=dateStr);
  };

  const COLORS=["#0D1B3E","#1A7F64","#C9A84C","#2980B9","#8E44AD","#E67E22","#C0392B","#16A085"];

  // Who's on leave this month summary
  const monthStart=`${year}-${String(month+1).padStart(2,"0")}-01`;
  const monthEnd=`${year}-${String(month+1).padStart(2,"0")}-${String(daysInMonth).padStart(2,"0")}`;
  const onLeaveThisMonth=[...new Set(approvedLeaves.filter(l=>l.from<=monthEnd&&l.to>=monthStart).map(l=>l.employee))];

  const dow=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  return(<div className="ani">
    <PH title="Leave Calendar" subtitle={"Visual overview of approved leave"} user={user}/>

    {/* Navigation */}
    <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:20}}>
      <button className="btn bo" onClick={()=>setMonthOffset(p=>p-1)}>← Prev</button>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,color:"#0D1B3E",flex:1,textAlign:"center"}}>{monthName}</div>
      <button className="btn bo" onClick={()=>setMonthOffset(p=>p+1)}>Next →</button>
      <button className="btn bg bsm" onClick={()=>setMonthOffset(0)}>Today</button>
    </div>

    {/* Who's out summary */}
    {onLeaveThisMonth.length>0&&(
      <div className="card" style={{marginBottom:16,background:"#FFFFF0",border:"1px solid #ECC94B"}}>
        <div style={{fontWeight:700,fontSize:13,color:"#744210",marginBottom:8}}>📅 {onLeaveThisMonth.length} staff on approved leave in {monthName}:</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {onLeaveThisMonth.map((name,i)=>{
            const s=allStaff.find(x=>x.name===name);
            return(<div key={name} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 10px",borderRadius:20,background:"#fff",border:"1px solid #E2E6F0",fontSize:12}}>
              <Av name={name} color={s?.color||COLORS[i%COLORS.length]} size={20} fs={8} photo={s?.photo}/>
              {name}
            </div>);
          })}
        </div>
      </div>
    )}

    {/* Calendar grid */}
    <div className="card" style={{padding:0,overflow:"hidden"}}>
      {/* Day headers */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",background:"#0D1B3E"}}>
        {dow.map(d=><div key={d} style={{textAlign:"center",padding:"10px 0",fontSize:12,fontWeight:700,color:"#C9A84C"}}>{d}</div>)}
      </div>
      {/* Day cells */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)"}}>
        {Array.from({length:firstDow}).map((_,i)=>(
          <div key={"e"+i} style={{minHeight:80,borderRight:"1px solid #E2E6F0",borderBottom:"1px solid #E2E6F0",background:"#FAFAFA"}}/>
        ))}
        {Array.from({length:daysInMonth}).map((_,i)=>{
          const dayNum=i+1;
          const isToday=year===base.getFullYear()&&month===base.getMonth()&&dayNum===base.getDate();
          const dayLeaves=getLeaveForDay(dayNum);
          const weekday=(firstDow+i)%7;
          const isWeekend=weekday===0||weekday===6;
          return(<div key={dayNum} style={{minHeight:80,borderRight:"1px solid #E2E6F0",borderBottom:"1px solid #E2E6F0",padding:"4px",background:isWeekend?"#F5F6FA":isToday?"#EBF8FF":"#fff"}}>
            <div style={{fontSize:11.5,fontWeight:isToday?800:600,marginBottom:3,width:22,height:22,borderRadius:"50%",background:isToday?"#2980B9":"transparent",display:"flex",alignItems:"center",justifyContent:"center",color:isToday?"#fff":isWeekend?"#8892A4":"#0D1B3E"}}>{dayNum}</div>
            {dayLeaves.slice(0,2).map((l,li)=>{
              const s=allStaff.find(x=>x.name===l.employee);
              return(<div key={li} style={{fontSize:10,padding:"1px 5px",borderRadius:3,marginBottom:2,background:s?.color||COLORS[li%COLORS.length],color:"#fff",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}} title={`${l.employee} — ${l.type}`}>
                {l.employee.split(" ")[0]}
              </div>);
            })}
            {dayLeaves.length>2&&<div style={{fontSize:9.5,color:"#8892A4"}}>+{dayLeaves.length-2} more</div>}
          </div>);
        })}
      </div>
    </div>
  </div>);
};

/* ════════════════════════════════════════════════════════════
   TRAINING & DEVELOPMENT
   ════════════════════════════════════════════════════════════ */
const mapTraining=r=>({
  id:r.id,staffId:r.staff_id,staffName:r.staff_name,title:r.title,
  provider:r.provider,category:r.category,trainingDate:r.training_date,
  endDate:r.end_date,duration:r.duration_days,status:r.status,
  cost:r.cost,certificate:r.certificate_obtained,notes:r.notes,
});
const TrainingModule=({user,allStaff,onLog})=>{
  const toast=useToast();
  const canManage=user.isAdmin||user.isSuperAdmin;
  const[records,setRecords]=useState([]);
  const[loading,setLoading]=useState(true);
  const[showForm,setShowForm]=useState(false);
  const[filter,setFilter]=useState("All");
  const[saving,setSaving]=useState(false);
  const blank={staffId:user.isAdmin||user.isSuperAdmin?"":user.id,title:"",provider:"",category:"Technical",trainingDate:"",duration:"1",cost:"",certificate:false,notes:""};
  const[form,setForm]=useState(blank);
  const fld=(k,v)=>setForm(p=>({...p,[k]:v}));

  useEffect(()=>{
    const fetch=canManage?db.getTraining():db.getMyTraining(user.id);
    fetch.then(({data,error})=>{
      setLoading(false);
      if(!error&&data)setRecords(data.map(mapTraining));
    });
  },[]);

  const save=async()=>{
    if(!form.staffId||!form.title||!form.trainingDate){toast.err("Staff, title and date required");return;}
    const s=allStaff.find(x=>x.id===form.staffId)||user;
    setSaving(true);
    const row={staff_id:form.staffId,staff_name:s.name,title:form.title,provider:form.provider,category:form.category,training_date:form.trainingDate,end_date:form.endDate||null,duration_days:parseInt(form.duration)||1,status:"Completed",cost:form.cost?parseFloat(form.cost):null,certificate_obtained:form.certificate,notes:form.notes};
    const{data,error}=await db.addTraining(row);
    setSaving(false);
    if(error){toast.err(error.message);return;}
    setRecords(p=>[mapTraining(data),...p]);
    if(onLog)onLog("training_added",`Training "${form.title}" recorded for ${s.name}`);
    toast.ok("Training record saved");
    setShowForm(false);setForm(blank);
  };

  const cats=["All","Technical","Compliance","Leadership","Soft Skills","Safety","AML","IT","Finance","Legal","Other"];
  const filtered=records.filter(r=>filter==="All"||r.category===filter);
  const totalCost=records.reduce((s,r)=>s+(r.cost||0),0);
  const certified=records.filter(r=>r.certificate).length;

  return(<div className="ani">
    <PH title="Training & Development" subtitle="Learning records, certifications and costs" user={user}/>

    <div className="g4" style={{marginBottom:20}}>
      {[["🎓","Total Sessions",records.length,"#0D1B3E"],["💰","Training Budget Spent",fmtN(totalCost),"#1A7F64"],["🏅","Certificates Earned",certified,"#C9A84C"],["📊","Avg Duration",records.length>0?(records.reduce((s,r)=>s+(r.duration||1),0)/records.length).toFixed(1)+" days":"—","#2980B9"]].map(([i,l,v,col])=>(
        <div key={l} className="scard" style={{borderLeftColor:col}}>
          <div style={{fontSize:10.5,color:"#8892A4",fontWeight:700,textTransform:"uppercase"}}>{i} {l}</div>
          <div style={{fontSize:22,fontWeight:700,color:col,marginTop:4}}>{v}</div>
        </div>
      ))}
    </div>

    <div style={{display:"flex",gap:7,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
      {cats.map(c=><button key={c} onClick={()=>setFilter(c)} className="btn" style={{fontSize:11,padding:"5px 10px",background:filter===c?"#0D1B3E":"#fff",color:filter===c?"#fff":"#4A5568",border:"1.5px solid #E2E6F0"}}>{c}</button>)}
      <button className="btn bg bsm" style={{marginLeft:"auto"}} onClick={()=>setShowForm(true)}>+ Add Training</button>
    </div>

    {loading?<div style={{textAlign:"center",padding:40}}><Spinner dark/></div>:(
      <div className="card"><div style={{overflowX:"auto"}}>
        <table className="table">
          <thead><tr><th>Staff</th><th>Training</th><th>Category</th><th>Provider</th><th>Date</th><th>Duration</th><th>Cost</th><th>Certificate</th></tr></thead>
          <tbody>
            {filtered.length===0&&<tr><td colSpan={8} style={{textAlign:"center",color:"#8892A4",padding:"30px 0"}}>No training records</td></tr>}
            {filtered.map(r=>(
              <tr key={r.id}>
                <td style={{fontWeight:600,fontSize:12.5}}>{r.staffName}</td>
                <td style={{fontWeight:600,fontSize:12.5,maxWidth:180}}>{r.title}</td>
                <td><span className="tag ty" style={{fontSize:10}}>{r.category}</span></td>
                <td style={{fontSize:12}}>{r.provider||"—"}</td>
                <td style={{fontSize:12}}>{r.trainingDate}</td>
                <td style={{fontSize:12}}>{r.duration} day{r.duration!==1?"s":""}</td>
                <td style={{fontSize:12}}>{r.cost?fmtN(r.cost):"—"}</td>
                <td>{r.certificate?<span className="tag tg">🏅 Yes</span>:<span style={{color:"#8892A4",fontSize:12}}>No</span>}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div></div>
    )}

    <Modal open={showForm} onClose={()=>setShowForm(false)} title="Add Training Record">
      <div className="g2">
        <div className="fg"><label className="lbl">Staff Member *</label>
          <select className="sel" value={form.staffId} onChange={e=>fld("staffId",e.target.value)}>
            {canManage?allStaff.map(s=><option key={s.id} value={s.id}>{s.name}</option>):<option value={user.id}>{user.name}</option>}
          </select>
        </div>
        <div className="fg"><label className="lbl">Category *</label>
          <select className="sel" value={form.category} onChange={e=>fld("category",e.target.value)}>
            {["Technical","Compliance","Leadership","Soft Skills","Safety","AML","IT","Finance","Legal","Other"].map(c=><option key={c}>{c}</option>)}
          </select>
        </div>
      </div>
      <div className="fg"><label className="lbl">Training Title *</label><input className="inp" value={form.title} onChange={e=>fld("title",e.target.value)} placeholder="e.g. AML/CFT Compliance Training"/></div>
      <div className="g2">
        <div className="fg"><label className="lbl">Provider / Institution</label><input className="inp" value={form.provider} onChange={e=>fld("provider",e.target.value)} placeholder="e.g. SEC, CIBN"/></div>
        <div className="fg"><label className="lbl">Duration (days)</label><input type="number" className="inp" min="1" value={form.duration} onChange={e=>fld("duration",e.target.value)}/></div>
      </div>
      <div className="g2">
        <div className="fg"><label className="lbl">Training Date *</label><input type="date" className="inp" value={form.trainingDate} onChange={e=>fld("trainingDate",e.target.value)}/></div>
        <div className="fg"><label className="lbl">Cost (₦)</label><input type="number" className="inp" value={form.cost} onChange={e=>fld("cost",e.target.value)} placeholder="0"/></div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:10,margin:"10px 0"}}>
        <input type="checkbox" id="certCheck" checked={form.certificate} onChange={e=>fld("certificate",e.target.checked)} style={{width:16,height:16}}/>
        <label htmlFor="certCheck" style={{fontSize:13,fontWeight:600}}>🏅 Certificate / Qualification Obtained</label>
      </div>
      <div className="fg"><label className="lbl">Notes</label><textarea className="inp" rows={2} value={form.notes} onChange={e=>fld("notes",e.target.value)}/></div>
      <div style={{display:"flex",gap:10}}>
        <button className="btn bp" style={{flex:1,justifyContent:"center"}} onClick={save} disabled={saving}>{saving?<><Spinner/> Saving…</>:"Save Record"}</button>
        <button className="btn bo" onClick={()=>setShowForm(false)}>Cancel</button>
      </div>
    </Modal>
  </div>);
};

/* ════════════════════════════════════════════════════════════
   SURVEYS & FEEDBACK
   ════════════════════════════════════════════════════════════ */
const mapSurvey=r=>({
  id:r.id,title:r.title,description:r.description,questions:r.questions||[],
  status:r.status,createdBy:r.created_by,createdAt:r.created_at,
  deadline:r.deadline,anonymous:r.anonymous,
});
const SurveysModule=({user,allStaff})=>{
  const toast=useToast();
  const canManage=user.isAdmin||user.isSuperAdmin;
  const[surveys,setSurveys]=useState([]);
  const[responses,setResponses]=useState({});
  const[loading,setLoading]=useState(true);
  const[showCreate,setShowCreate]=useState(false);
  const[activeSurvey,setActiveSurvey]=useState(null);
  const[answers,setAnswers]=useState({});
  const[saving,setSaving]=useState(false);
  const[viewResults,setViewResults]=useState(null);
  const[sResults,setSResults]=useState([]);
  const[newQ,setNewQ]=useState("");
  const blank={title:"",description:"",deadline:"",anonymous:true,questions:[]};
  const[form,setForm]=useState(blank);

  useEffect(()=>{
    db.getSurveys().then(({data,error})=>{
      setLoading(false);
      if(!error&&data){
        const mapped=data.map(mapSurvey);
        setSurveys(mapped);
        // Check which user has responded to each survey
        mapped.filter(s=>s.status==="Active").forEach(s=>{
          db.getMyResponses(user.id,s.id).then(({data:rd})=>{
            if(rd&&rd.length>0)setResponses(p=>({...p,[s.id]:true}));
          });
        });
      }
    });
  },[]);

  const createSurvey=async()=>{
    if(!form.title||form.questions.length===0){toast.err("Title and at least one question required");return;}
    setSaving(true);
    const row={title:form.title,description:form.description,questions:form.questions,status:"Active",created_by:user.name,deadline:form.deadline||null,anonymous:form.anonymous};
    const{data,error}=await db.addSurvey(row);
    setSaving(false);
    if(error){toast.err(error.message);return;}
    setSurveys(p=>[mapSurvey(data),...p]);
    toast.ok("Survey published");
    setShowCreate(false);setForm(blank);
  };

  const submitResponse=async()=>{
    if(Object.keys(answers).length<activeSurvey.questions.length){toast.err("Please answer all questions");return;}
    setSaving(true);
    const row={survey_id:activeSurvey.id,staff_id:activeSurvey.anonymous?"anonymous":user.id,staff_name:activeSurvey.anonymous?"Anonymous":user.name,answers:answers,submitted_at:new Date().toISOString()};
    const{error}=await db.addSurveyResponse(row);
    setSaving(false);
    if(error){toast.err(error.message);return;}
    setResponses(p=>({...p,[activeSurvey.id]:true}));
    toast.ok("Response submitted — thank you!");
    setActiveSurvey(null);setAnswers({});
  };

  const loadResults=async(survey)=>{
    const{data,error}=await db.getSurveyResponses(survey.id);
    if(!error&&data){setSResults(data);setViewResults(survey);}
  };

  const closeSurvey=async(id)=>{
    await db.updateSurvey(id,{status:"Closed"});
    setSurveys(p=>p.map(s=>s.id===id?{...s,status:"Closed"}:s));
    toast.ok("Survey closed");
  };

  const RATINGS=["1 — Strongly Disagree","2 — Disagree","3 — Neutral","4 — Agree","5 — Strongly Agree"];
  const ratingColor=n=>["#E53E3E","#E67E22","#ECC94B","#1A7F64","#2980B9"][n-1];

  return(<div className="ani">
    <PH title="Surveys & Feedback" subtitle="Pulse surveys and employee engagement" user={user}/>

    {canManage&&<div style={{display:"flex",justifyContent:"flex-end",marginBottom:14}}>
      <button className="btn bg" onClick={()=>setShowCreate(true)}>+ Create Survey</button>
    </div>}

    {loading?<div style={{textAlign:"center",padding:40}}><Spinner dark/></div>:(
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {surveys.length===0&&<div className="card" style={{textAlign:"center",padding:"40px 0",color:"#8892A4"}}><div style={{fontSize:36,marginBottom:10}}>📋</div><div>No surveys yet</div></div>}
        {surveys.map(s=>{
          const hasResponded=responses[s.id];
          return(<div key={s.id} className="card">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                  <span className={`tag ${s.status==="Active"?"tg":"ty"}`}>{s.status}</span>
                  {s.anonymous&&<span className="tag" style={{background:"#FAF5FF",color:"#553C9A",fontSize:11}}>🔒 Anonymous</span>}
                </div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:15,color:"#0D1B3E",marginBottom:4}}>{s.title}</div>
                {s.description&&<div style={{fontSize:12.5,color:"#4A5568",marginBottom:4}}>{s.description}</div>}
                <div style={{fontSize:11.5,color:"#8892A4"}}>{s.questions.length} question{s.questions.length!==1?"s":""}  {s.deadline?`· Deadline: ${s.deadline}`:""}  · By {s.createdBy}</div>
              </div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {s.status==="Active"&&!hasResponded&&<button className="btn bp bsm" onClick={()=>{setActiveSurvey(s);setAnswers({});}}>Take Survey</button>}
                {hasResponded&&<span className="tag tg">✓ Responded</span>}
                {canManage&&<button className="btn bo bsm" onClick={()=>loadResults(s)}>Results</button>}
                {canManage&&s.status==="Active"&&<button className="btn bd bsm" onClick={()=>closeSurvey(s.id)}>Close</button>}
              </div>
            </div>
          </div>);
        })}
      </div>
    )}

    {/* Create Survey Modal */}
    <Modal open={showCreate} onClose={()=>setShowCreate(false)} title="Create Pulse Survey" size="wide">
      <div className="fg"><label className="lbl">Survey Title *</label><input className="inp" value={form.title} onChange={e=>setForm(p=>({...p,title:e.target.value}))} placeholder="e.g. Q1 2026 Employee Engagement Survey"/></div>
      <div className="fg"><label className="lbl">Description</label><textarea className="inp" rows={2} value={form.description} onChange={e=>setForm(p=>({...p,description:e.target.value}))}/></div>
      <div className="g2">
        <div className="fg"><label className="lbl">Deadline</label><input type="date" className="inp" value={form.deadline} onChange={e=>setForm(p=>({...p,deadline:e.target.value}))}/></div>
        <div style={{display:"flex",alignItems:"center",gap:10,paddingTop:24}}>
          <input type="checkbox" id="anonCheck" checked={form.anonymous} onChange={e=>setForm(p=>({...p,anonymous:e.target.checked}))} style={{width:16,height:16}}/>
          <label htmlFor="anonCheck" style={{fontSize:13,fontWeight:600}}>🔒 Anonymous Responses</label>
        </div>
      </div>
      <div style={{fontWeight:700,color:"#0D1B3E",margin:"14px 0 8px",fontSize:13}}>Questions ({form.questions.length})</div>
      {form.questions.map((q,i)=>(
        <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,padding:"8px 12px",background:"#F5F6FA",borderRadius:8,fontSize:13}}>
          <span style={{color:"#C9A84C",fontWeight:700,flexShrink:0}}>{i+1}.</span>
          <span style={{flex:1}}>{q}</span>
          <button onClick={()=>setForm(p=>({...p,questions:p.questions.filter((_,j)=>j!==i)}))} style={{background:"none",border:"none",cursor:"pointer",color:"#CBD5E0",fontSize:16}}>✕</button>
        </div>
      ))}
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        <input className="inp" style={{flex:1}} value={newQ} onChange={e=>setNewQ(e.target.value)} placeholder="Type a question and press Add…" onKeyDown={e=>{if(e.key==="Enter"&&newQ.trim()){setForm(p=>({...p,questions:[...p.questions,newQ.trim()]}));setNewQ("");}}}/>
        <button className="btn bo" onClick={()=>{if(newQ.trim()){setForm(p=>({...p,questions:[...p.questions,newQ.trim()]}));setNewQ("");}}}>+ Add</button>
      </div>
      <div style={{display:"flex",gap:10}}>
        <button className="btn bp" style={{flex:1,justifyContent:"center"}} onClick={createSurvey} disabled={saving}>{saving?<><Spinner/> Publishing…</>:"📋 Publish Survey"}</button>
        <button className="btn bo" onClick={()=>setShowCreate(false)}>Cancel</button>
      </div>
    </Modal>

    {/* Take Survey Modal */}
    <Modal open={!!activeSurvey} onClose={()=>setActiveSurvey(null)} title={activeSurvey?.title||""}>
      {activeSurvey&&<div>
        {activeSurvey.anonymous&&<div style={{background:"#FAF5FF",border:"1px solid #D6BCFA",borderRadius:8,padding:"8px 12px",fontSize:12.5,color:"#553C9A",marginBottom:14}}>🔒 Your response is anonymous — your name will not be recorded.</div>}
        {activeSurvey.questions.map((q,i)=>(
          <div key={i} className="fg">
            <label className="lbl">{i+1}. {q}</label>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {RATINGS.map((r,ri)=>(
                <button key={ri} onClick={()=>setAnswers(p=>({...p,[i]:ri+1}))}
                  style={{padding:"6px 12px",borderRadius:8,border:"2px solid "+(answers[i]===ri+1?ratingColor(ri+1):"#E2E6F0"),background:answers[i]===ri+1?ratingColor(ri+1)+"22":"#fff",color:answers[i]===ri+1?ratingColor(ri+1):"#4A5568",fontSize:11.5,cursor:"pointer",fontWeight:answers[i]===ri+1?700:400}}>
                  {r}
                </button>
              ))}
            </div>
          </div>
        ))}
        <button className="btn bp" style={{width:"100%",justifyContent:"center",marginTop:10}} onClick={submitResponse} disabled={saving}>{saving?<><Spinner/> Submitting…</>:"Submit Response"}</button>
      </div>}
    </Modal>

    {/* Results Modal */}
    <Modal open={!!viewResults} onClose={()=>setViewResults(null)} title={`Results: ${viewResults?.title||""}`}>
      {viewResults&&<div>
        <div style={{marginBottom:14,fontSize:13,color:"#4A5568"}}>{sResults.length} response{sResults.length!==1?"s":""} collected</div>
        {viewResults.questions.map((q,qi)=>{
          const qAnswers=sResults.map(r=>r.answers?.[qi]).filter(Boolean);
          const avg=qAnswers.length>0?(qAnswers.reduce((s,v)=>s+v,0)/qAnswers.length).toFixed(1):0;
          const dist=[1,2,3,4,5].map(n=>({rating:n,count:qAnswers.filter(v=>v===n).length}));
          return(<div key={qi} style={{marginBottom:16,padding:"12px",background:"#F5F6FA",borderRadius:10}}>
            <div style={{fontWeight:600,fontSize:12.5,marginBottom:8}}>{qi+1}. {q}</div>
            <div style={{fontSize:20,fontWeight:700,color:"#0D1B3E",marginBottom:6}}>Avg: {avg}/5</div>
            {dist.map(({rating,count})=>(
              <div key={rating} style={{display:"flex",alignItems:"center",gap:8,marginBottom:3,fontSize:11.5}}>
                <span style={{width:8,height:8,borderRadius:"50%",background:ratingColor(rating),flexShrink:0}}/>
                <span style={{width:60}}>{rating}/5</span>
                <div style={{flex:1,background:"#E2E6F0",borderRadius:3,height:6}}>
                  <div style={{width:qAnswers.length>0?count/qAnswers.length*100+"%":"0%",height:"100%",background:ratingColor(rating),borderRadius:3}}/>
                </div>
                <span style={{width:20,textAlign:"right"}}>{count}</span>
              </div>
            ))}
          </div>);
        })}
      </div>}
    </Modal>
  </div>);
};

/* ════════════════════════════════════════════════════════════
   AUDIT LOG
   ════════════════════════════════════════════════════════════ */
const mapAudit=r=>({id:r.id,action:r.action,actor:r.actor,detail:r.detail,mod:r.module,createdAt:r.created_at});
const AuditLog=({user,onLog})=>{
  const[records,setRecords]=useState([]);
  const[loading,setLoading]=useState(true);
  const[search,setSearch]=useState("");
  const[filterMod,setFilterMod]=useState("All");
  const[lastRefresh,setLastRefresh]=useState(null);

  const loadLogs=useCallback(()=>{
    if(!user.isAdmin&&!user.isSuperAdmin)return;
    db.getAuditLog(300).then(({data,error})=>{
      setLoading(false);
      if(!error&&data){setRecords(data.map(mapAudit));setLastRefresh(new Date());}
    });
  },[user]);

  useEffect(()=>{loadLogs();},[loadLogs]);

  // Real-time subscription — auto-update when any action is logged
  useEffect(()=>{
    if(!user.isAdmin&&!user.isSuperAdmin)return;
    const channel=supa.channel("audit-live")
      .on("postgres_changes",{event:"INSERT",schema:"public",table:"audit_log"},payload=>{
        const r=payload.new;
        if(r)setRecords(p=>[mapAudit(r),...p].slice(0,300));
      })
      .subscribe();
    return()=>supa.removeChannel(channel);
  },[user]);

  if(!user.isAdmin&&!user.isSuperAdmin)return(
    <div className="ani" style={{textAlign:"center",padding:"80px 20px"}}><div style={{fontSize:40}}>🔒</div><div style={{fontFamily:"'Playfair Display',serif",fontSize:18,marginTop:10}}>Admin Access Required</div></div>
  );

  const modules=["All",...new Set(records.map(r=>r.mod||"General"))];
  const filtered=records.filter(r=>{
    const q=search.toLowerCase();
    const matchQ=!q||r.actor?.toLowerCase().includes(q)||r.action?.toLowerCase().includes(q)||r.detail?.toLowerCase().includes(q);
    const matchM=filterMod==="All"||(r.mod||"General")===filterMod;
    return matchQ&&matchM;
  });

  const actionIcon={login:"🔐",logout:"🚪",leave_approved:"✅",leave_declined:"❌",payroll_run:"💵",contract_added:"📝",disciplinary_issued:"⚖️",training_added:"🎓",benefit_updated:"🏥",onboarding_started:"🎯",offboarding_started:"🚪",password_changed:"🔐",admin_promoted:"👑",admin_revoked:"✕"};

  const lastLogins=React.useMemo(()=>{
    const map={};
    records.filter(r=>r.action==="login").forEach(r=>{if(!map[r.actor]||new Date(r.createdAt)>new Date(map[r.actor].createdAt))map[r.actor]=r;});
    return Object.values(map).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  },[records]);

  return(<div className="ani">
    <PH title="Audit Log" subtitle="Complete activity trail — auto-updates in real time" user={user} live/>
    {lastLogins.length>0&&(
      <div className="card" style={{marginBottom:16}}>
        <div style={{fontWeight:700,fontSize:13,color:"#0D1B3E",marginBottom:10}}>Last Login per Staff</div>
