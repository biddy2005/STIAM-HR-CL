const ClockIn=({user,allStaff,clockData,onClockIn,onClockOut})=>{
  const toast=useToast();
  const[devTab,setDevTab]=useState("register");
  const[devLog,setDevLog]=useState([]);
  const myRecord=clockData.find(c=>c.id===user.id);
  const alreadyClockedIn=myRecord&&myRecord.ci!=="—";
  const alreadyClockedOut=myRecord&&myRecord.co!=="—";

  const handleClockIn=async()=>{
    const now=new Date();
    const timeStr=now.toLocaleTimeString("en-NG",{hour:"2-digit",minute:"2-digit"});
    const hour=now.getHours();
    const status=hour>=9?"Late":"Present";
    const{error}=await db.clockIn(user.id,timeStr);
    if(error){toast.err("Clock-in failed: "+error.message);return;}
    onClockIn(user.id,timeStr,status);
    toast.ok("Clocked in at "+timeStr+(status==="Late"?" — marked Late":""));
  };

  const handleClockOut=async()=>{
    const timeStr=new Date().toLocaleTimeString("en-NG",{hour:"2-digit",minute:"2-digit"});
    const{error}=await db.clockOut(user.id,timeStr);
    if(error){toast.err("Clock-out failed: "+error.message);return;}
    onClockOut(user.id,timeStr);
    toast.ok("Clocked out at "+timeStr);
  };

  const simulatePing=()=>{
    const pool=allStaff.filter(s=>s.company==="STIAM");
    const emp=pool[Math.floor(Math.random()*pool.length)];
    if(!emp)return;
    const tStr=new Date().toLocaleTimeString("en-NG",{hour:"2-digit",minute:"2-digit"});
    const existing=clockData.find(c=>c.id===emp.id);
    const action=existing&&existing.ci!=="—"?"Clock Out":"Clock In";
    setDevLog(p=>[{ts:new Date().toLocaleTimeString(),emp:emp.name,action,time:tStr},...p.slice(0,9)]);
    toast.info("Device ping: "+emp.name+" — "+action+" "+tStr);
  };

  return(<div className="ani">
    <PH title="Clock-In Register" subtitle={"Today — "+new Date().toDateString()} user={user} live={true}/>
    <div style={{display:"flex",gap:6,marginBottom:16}}>
      {[["register","📋 Register"],["device","🔌 Device Integration"]].map(([k,l])=>(
        <button key={k} className="btn" onClick={()=>setDevTab(k)} style={{background:devTab===k?"#0D1B3E":"#fff",color:devTab===k?"#fff":"#4A5568",border:"1.5px solid #E2E6F0"}}>{l}</button>
      ))}
    </div>

    {devTab==="register"&&<div>
      <div className="g2" style={{marginBottom:18}}>
        <div className="card" style={{textAlign:"center"}}>
          <LiveClock/>
          <div style={{marginTop:24}}>
            {!alreadyClockedIn?(
              <button className="btn bp" style={{fontSize:14,padding:"12px 36px"}} onClick={handleClockIn}>🕐 Clock In</button>
            ):!alreadyClockedOut?(
              <div>
                <div style={{marginBottom:12}}>
                  <span className="tag tg" style={{fontSize:13}}>✅ Clocked in at {myRecord.ci}</span>
                </div>
                <button className="btn bd" style={{fontSize:13,padding:"10px 30px"}} onClick={handleClockOut}>🔴 Clock Out</button>
              </div>
            ):(
              <div>
                <div style={{marginBottom:8}}><span className="tag tg" style={{fontSize:13}}>In: {myRecord.ci}</span></div>
                <span className="tag ty" style={{fontSize:13}}>Out: {myRecord.co}</span>
              </div>
            )}
          </div>
        </div>
        <div className="card">
          <div style={{fontWeight:700,color:"#0D1B3E",marginBottom:14,fontSize:13.5}}>Today's Summary</div>
          {["Present","Late","On Leave","Absent"].map((s,i)=>{
            const cnt=clockData.filter(c=>c.status===s).length;
            const col=["#1A7F64","#DD6B20","#2980B9","#E53E3E"][i];
            return(<div key={s} style={{display:"flex",justifyContent:"space-between",padding:"9px 0",borderBottom:i<3?"1px solid #F0F2F8":"none"}}>
              <span style={{color:"#4A5568"}}>{s}</span><span style={{fontWeight:700,color:col,fontSize:18}}>{cnt}</span>
            </div>);
          })}
          <div style={{marginTop:10,fontSize:11.5,color:"#8892A4",display:"flex",alignItems:"center",gap:5}}>
            <span className="dot puls" style={{background:"#38A169"}}/>Real-time via Supabase
          </div>
        </div>
      </div>
      <div className="card"><div style={{overflowX:"auto"}}><table className="table">
        <thead><tr><th>Employee</th><th>Staff ID</th><th>Designation</th><th>Clock In</th><th>Clock Out</th><th>Status</th></tr></thead>
        <tbody>{clockData.map((c,i)=>{
          const emp=allStaff.find(s=>s.id===c.id);if(!emp)return null;
          return(<tr key={i}>
            <td><div style={{display:"flex",alignItems:"center",gap:8}}><Av name={emp.name} color={emp.color} size={28} fs={10} photo={emp.photo}/><span style={{fontWeight:600}}>{emp.name}</span></div></td>
            <td style={{color:"#8892A4"}}>{emp.id}</td>
            <td style={{fontSize:12.5}}>{emp.designation}</td>
            <td style={{fontWeight:c.ci!=="—"?600:400,color:c.ci!=="—"?"#1A202C":"#CBD5E0"}}>{c.ci}</td>
            <td style={{color:c.co!=="—"?"#1A202C":"#CBD5E0"}}>{c.co}</td>
            <td><span className={`tag ${c.status==="Present"?"tg":c.status==="Late"?"to":c.status==="On Leave"?"tb":"tr"}`}>{c.status}</span></td>
          </tr>);
        })}</tbody>
      </table></div></div>
    </div>}

    {devTab==="device"&&<div>
      <div className="card" style={{background:"linear-gradient(135deg,#0D1B3E,#162550)",color:"#fff",marginBottom:14}}>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <div style={{fontSize:36}}>🔌</div>
          <div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:17,fontWeight:700}}>Biometric Device Integration</div>
            <p style={{fontSize:12.5,opacity:.8,marginTop:4}}>Device punches POST to the webhook below → Supabase updates → clock register updates live.</p>
          </div>
        </div>
      </div>
      <div className="g2">
        <div className="card">
          <div style={{fontWeight:700,color:"#0D1B3E",marginBottom:14,fontSize:13.5}}>🔗 Webhook Configuration</div>
          {[["Endpoint","POST /functions/v1/clock-punch"],["Host","Supabase Edge Function"],["Auth","Authorization: Bearer YOUR_ANON_KEY"]].map(([l,v])=>(
            <div key={l} style={{marginBottom:12}}>
              <div className="lbl">{l}</div>
              <div style={{background:"#F5F6FA",borderRadius:8,padding:"8px 12px",fontFamily:"monospace",fontSize:11.5,color:"#2D3748",wordBreak:"break-all"}}>{v}</div>
            </div>
          ))}
          <div style={{marginBottom:12}}>
            <div className="lbl">Request Body (JSON)</div>
            <pre style={{background:"#0D1B3E",color:"#C9A84C",borderRadius:8,padding:"12px",fontSize:11,margin:0,overflowX:"auto"}}>{`{\n  "staff_id":  "STI-024",\n  "action":    "clock_in",\n  "timestamp": "2026-02-18T08:01:00Z",\n  "device_id": "DEV-001"\n}`}</pre>
          </div>
          <div style={{padding:"10px 14px",background:"#EBF8FF",borderRadius:8,fontSize:12,color:"#2C5282"}}>
            💡 Supports ZKTeco, Hikvision, Suprema, VIRDI, Anviz, and any HTTP POST device
          </div>
        </div>
        <div className="card">
          <div style={{fontWeight:700,color:"#0D1B3E",marginBottom:14,fontSize:13.5}}>📡 Live Device Feed</div>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:16}}>
            <span className="dot puls" style={{background:"#38A169",width:10,height:10,flexShrink:0}}/>
            <span style={{fontSize:12.5,color:"#38A169",fontWeight:600}}>Supabase Realtime active</span>
          </div>
          <button className="btn bg" style={{width:"100%",justifyContent:"center",marginBottom:14}} onClick={simulatePing}>⚡ Simulate Device Punch</button>
          <div style={{fontWeight:600,color:"#4A5568",marginBottom:8,fontSize:12}}>RECENT ACTIVITY</div>
          {devLog.length===0
            ?<div style={{textAlign:"center",padding:"24px 0",color:"#CBD5E0",fontSize:13}}>No activity yet — click Simulate</div>
            :devLog.map((l,i)=>(<div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #F0F2F8",fontSize:12.5}}>
              <div><span className="dot" style={{background:l.action==="Clock In"?"#38A169":"#E53E3E"}}/><strong>{l.emp}</strong> — {l.action}</div>
              <div style={{color:"#8892A4",fontSize:11}}>{l.time}</div>
            </div>))
          }
        </div>
      </div>
    </div>}
  </div>);
};

/* ════════════════════════════════════════════════════════════
   REDEPLOYMENT
   ════════════════════════════════════════════════════════════ */
const Redeployment=({user,posts,onAddPost,onUpdatePost,onNotify,allStaff})=>{
  const toast=useToast();
  const notif=useNotif();
  const canManage=user.isSuperAdmin||user.isAdmin;
  const[tab,setTab]=useState("requests");
  const[showNew,setShowNew]=useState(false);
  const[editRec,setEditRec]=useState(null);
  const[saving,setSaving]=useState(false);

  // Transfer request form
  const blankT={fromCo:user.company||"STIAM",toCo:"DEVTAGE",dept:user.dept||"",role:user.designation||"",reason:"",staffName:user.name};
  const[tf,setTf]=useState(blankT);

  // Stats
  const pending=posts.filter(p=>p.status==="Pending");
  const approved=posts.filter(p=>p.status==="Approved");
  const myRequests=posts.filter(p=>p.req&&p.req.includes(user.name));

  const submitTransfer=async()=>{
    if(!tf.reason.trim()){toast.err("Please provide a reason for transfer");return;}
    setSaving(true);
    const row={
      title:`${tf.staffName} → ${COMPANIES[tf.toCo]?.short}`,
      dept:tf.fromCo,      // repurposed: source company
      type:tf.toCo,        // repurposed: target company
      requirements:`Role: ${tf.role} | Dept: ${tf.dept} | Reason: ${tf.reason} | Requested by: ${tf.staffName}`,
      status:"Pending",
      company:user.id,
      posted_date:TODAY,
    };
    const{data,error}=await db.addTransfer(row);
    setSaving(false);
    if(error){toast.err("Submission failed: "+error.message);return;}
    onAddPost(mapPost(data));toast.ok("Transfer request submitted");
    if(onNotify)onNotify("transfer_requested",`🔄 ${tf.staffName} has requested an internal transfer from ${COMPANIES[tf.fromCo]?.name} to ${COMPANIES[tf.toCo]?.name}. Department: ${tf.dept}. Reason: ${tf.reason}`);
    // Notify admins via Supabase
    if(notif&&notif.adminIds?.length){
      await db.addNotif(notif.adminIds.map(aid=>({
        recipient_id:aid,from_name:user.name,
        title:"🔄 Transfer Request Submitted",
        message:`${tf.staffName} has requested an internal transfer from ${COMPANIES[tf.fromCo]?.short} to ${COMPANIES[tf.toCo]?.short}. Role: ${tf.role}, Dept: ${tf.dept}.`,
        type:"info",read:false
      })));
    }
    setShowNew(false);setTf(blankT);
  };

  const updateStatus=async(id,status)=>{
    const{error}=await db.updateTransfer(id,{status});
    if(error){toast.err("Update failed: "+error.message);return;}
    onUpdatePost(id,{status});
    toast.ok(`Request ${status.toLowerCase()}`);
    // Notify requesting staff member
    const post=posts.find(p=>p.id===id);
    if(post&&post.company){
      await db.addNotif([{
        recipient_id:post.company,from_name:user.name,
        title:status==="Approved"?"✅ Transfer Request Approved":"❌ Transfer Request Declined",
        message:status==="Approved"
          ?`Your transfer request (${post.title}) has been approved by HR. Congratulations!`
          :`Your transfer request (${post.title}) was not approved. Please contact HR for details.`,
        type:status==="Approved"?"success":"error",read:false
      }]);
    }
  };

  const saveEdit=async()=>{
    setSaving(true);
    const{error}=await db.updateTransfer(editRec.id,{requirements:editRec.req,status:editRec.status});
    setSaving(false);
    if(error){toast.err("Update failed: "+error.message);return;}
    onUpdatePost(editRec.id,editRec);toast.ok("Updated");setEditRec(null);
  };

  const CoArrow=({from,to})=>(
    <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
      <span className={`tag ${COMPANIES[from]?.cls||"ty"}`}>{COMPANIES[from]?.short||from}</span>
      <span style={{color:"#C9A84C",fontWeight:700,fontSize:16}}>→</span>
      <span className={`tag ${COMPANIES[to]?.cls||"ty"}`}>{COMPANIES[to]?.short||to}</span>
    </div>
  );

  return(<div className="ani">
    <PH title="Internal Redeployment" subtitle="Inter-entity staff transfers across the STI Group" user={user} live/>

    {/* Stats */}
    <div className="g3" style={{marginBottom:18}}>
      {[{l:"Total Requests",v:posts.length,c:"#0D1B3E"},{l:"Pending Review",v:pending.length,c:"#DD6B20"},{l:"Approved",v:approved.length,c:"#1A7F64"}].map((s,i)=>(
        <div className="scard" key={i} style={{borderLeftColor:s.c}}>
          <div style={{fontSize:11,color:"#8892A4",fontWeight:600,textTransform:"uppercase",letterSpacing:.4}}>{s.l}</div>
          <div style={{fontSize:28,fontWeight:700,color:s.c,marginTop:4}}>{s.v}</div>
        </div>
      ))}
    </div>

    {/* Tabs + actions */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
      <div style={{display:"flex",gap:6}}>
        {[["requests","📋 All Transfers"],["map","🗺 Entity Map"]].map(([k,l])=>(
          <button key={k} className="btn" onClick={()=>setTab(k)} style={{fontSize:12.5,padding:"7px 15px",background:tab===k?"#0D1B3E":"#fff",color:tab===k?"#fff":"#4A5568",border:"1.5px solid #E2E6F0"}}>{l}</button>
        ))}
      </div>
      <button className="btn bp" onClick={()=>setShowNew(true)}>+ Request Transfer</button>
    </div>

    {tab==="map"&&(
      <div>
        <div style={{background:"linear-gradient(135deg,#0D1B3E,#162550)",borderRadius:16,padding:"28px 26px",marginBottom:16}}>
          <div style={{fontFamily:"'Playfair Display',serif",color:"#fff",fontSize:18,fontWeight:700,marginBottom:4}}>STI Group — Entity Network</div>
          <div style={{color:"rgba(201,168,76,.85)",fontSize:12.5}}>All entities may redeploy staff across the group. Transfers reviewed by HR within 5 working days.</div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:16,marginBottom:16}}>
          {Object.entries(COMPANIES).map(([k,co])=>{
            const inCnt=posts.filter(p=>p.type===k&&p.status==="Approved").length;
            const outCnt=posts.filter(p=>p.dept===k&&p.status==="Approved").length;
            const pendCnt=posts.filter(p=>(p.type===k||p.dept===k)&&p.status==="Pending").length;
            const logo=COMPANY_LOGOS[k];
            return(<div key={k} style={{background:"#fff",borderRadius:16,padding:"22px 20px",boxShadow:"0 2px 14px rgba(13,27,62,.07)",border:`2px solid ${co.color}22`,position:"relative",overflow:"hidden"}}>
              <div style={{position:"absolute",top:0,left:0,right:0,height:4,background:co.color}}/>
              {/* Logo */}
              <div style={{display:"flex",alignItems:"flex-start",gap:16,marginBottom:18}}>
                <div style={{width:80,height:80,borderRadius:12,border:`2px solid ${co.color}33`,overflow:"hidden",background:"#fff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,padding:4}}>
                  {logo?<img src={logo} style={{width:"100%",height:"100%",objectFit:"contain"}} alt={co.name}/>
                    :<div style={{background:co.color,width:"100%",height:"100%",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:800,fontSize:14}}>{co.short}</div>}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:14,color:"#0D1B3E",lineHeight:1.3}}>{co.name}</div>
                  <span className={`tag ${co.cls}`} style={{marginTop:6,display:"inline-flex"}}>{co.short}</span>
                </div>
              </div>
              {/* Stats */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                {[["Incoming",inCnt,"#1A7F64"],["Outgoing",outCnt,"#DD6B20"],["Pending",pendCnt,"#C9A84C"]].map(([l,v,c])=>(
                  <div key={l} style={{textAlign:"center",padding:"10px 6px",background:c+"11",borderRadius:8,border:`1px solid ${c}22`}}>
                    <div style={{fontSize:20,fontWeight:800,color:c}}>{v}</div>
                    <div style={{fontSize:10,color:"#8892A4",fontWeight:600}}>{l}</div>
                  </div>
                ))}
              </div>
            </div>);
          })}
        </div>
        <div style={{padding:"14px 18px",background:"#F5F6FA",borderRadius:10,fontSize:13,color:"#4A5568",lineHeight:2}}>
          <strong style={{color:"#0D1B3E"}}>Active transfer routes:</strong>&nbsp;
          STIAM ↔ Devtage &nbsp;·&nbsp; STIAM ↔ Cedar-L &nbsp;·&nbsp; STIAM ↔ Cedar-A &nbsp;·&nbsp; Devtage ↔ Cedar-L &nbsp;·&nbsp; Devtage ↔ Cedar-A &nbsp;·&nbsp; Cedar-L ↔ Cedar-A
        </div>
      </div>
    )}

    {tab==="requests"&&(<div>
      {posts.length===0&&<div className="card" style={{textAlign:"center",padding:"40px 0",color:"#8892A4"}}><div style={{fontSize:32}}>🔄</div><div style={{marginTop:8}}>No transfer requests yet</div></div>}
      {posts.map(r=>{
        const fromCo=r.dept;const toCo=r.type;
        // Parse details from req string
        const reqLines=(r.req||"").split("|").map(s=>s.trim());
        return(<div key={r.id} className="card">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:14}}>
            <div style={{flex:1}}>
              <div style={{marginBottom:8}}><CoArrow from={fromCo} to={toCo}/></div>
              <div style={{fontWeight:700,fontSize:14,color:"#0D1B3E",marginBottom:4}}>{r.title}</div>
              {reqLines.map((l,i)=><div key={i} style={{fontSize:12.5,color:"#4A5568",marginBottom:2}}>{l}</div>)}
              <div style={{display:"flex",gap:8,marginTop:10,alignItems:"center"}}>
                <span className={`tag ${r.status==="Approved"?"tg":r.status==="Declined"?"tr":r.status==="Pending"?"to":"ty"}`}>{r.status}</span>
                <span style={{fontSize:11.5,color:"#8892A4"}}>Submitted {r.posted}</span>
              </div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:5,flexShrink:0}}>
              {canManage&&r.status==="Pending"&&<>
                <button className="btn bt bsm" onClick={()=>updateStatus(r.id,"Approved")}>✓ Approve</button>
                <button className="btn bd bsm" onClick={()=>updateStatus(r.id,"Declined")}>✗ Decline</button>
              </>}
              {canManage&&<button className="btn bo bsm" onClick={()=>setEditRec({...r})}>✏️ Edit</button>}
            </div>
          </div>
        </div>);
      })}
    </div>)}

    {/* New Transfer Modal */}
    <Modal open={showNew} onClose={()=>setShowNew(false)} title="Request Internal Transfer" size="mbl">
      <div style={{background:"#EBF8FF",border:"1px solid #BEE3F8",borderRadius:10,padding:"12px 16px",fontSize:13,color:"#2C5282",marginBottom:16}}>
        ℹ️ Submit a formal request to transfer between STI Group entities. HR will review and process within 5 working days.
      </div>
      <div className="g2">
        <div className="fg">
          <label className="lbl">From Entity</label>
          <select className="sel" value={tf.fromCo} onChange={e=>setTf({...tf,fromCo:e.target.value})}>
            {Object.entries(COMPANIES).map(([k,c])=><option key={k} value={k}>{c.name}</option>)}
          </select>
        </div>
        <div className="fg">
          <label className="lbl">To Entity</label>
          <select className="sel" value={tf.toCo} onChange={e=>setTf({...tf,toCo:e.target.value})}>
            {Object.entries(COMPANIES).filter(([k])=>k!==tf.fromCo).map(([k,c])=><option key={k} value={k}>{c.name}</option>)}
          </select>
        </div>
        <div className="fg">
          <label className="lbl">Current Department</label>
          <input className="inp" value={tf.dept} onChange={e=>setTf({...tf,dept:e.target.value})} placeholder="e.g. Finance"/>
        </div>
        <div className="fg">
          <label className="lbl">Current Designation</label>
          <input className="inp" value={tf.role} onChange={e=>setTf({...tf,role:e.target.value})} placeholder="e.g. Staff"/>
        </div>
        <div className="fg">
          <label className="lbl">Requesting For</label>
          <input className="inp" value={tf.staffName} onChange={e=>setTf({...tf,staffName:e.target.value})} placeholder="Employee name"/>
        </div>
      </div>
      <div className="fg">
        <label className="lbl">Reason for Transfer *</label>
        <textarea className="inp" rows={4} placeholder="Explain the business or personal justification for this transfer…" value={tf.reason} onChange={e=>setTf({...tf,reason:e.target.value})}/>
      </div>
      <div style={{display:"flex",gap:10}}>
        <button className="btn bp" style={{flex:1}} onClick={submitTransfer} disabled={saving}>{saving?<><Spinner/> Submitting…</>:"Submit Transfer Request"}</button>
        <button className="btn bo" onClick={()=>setShowNew(false)} disabled={saving}>Cancel</button>
      </div>
    </Modal>

    {/* Edit Modal */}
    <Modal open={!!editRec} onClose={()=>setEditRec(null)} title="Edit Transfer Request">
      {editRec&&<div>
        <div className="fg"><label className="lbl">Notes / Decision</label><textarea className="inp" rows={4} value={editRec.req} onChange={e=>setEditRec({...editRec,req:e.target.value})}/></div>
        <div className="fg"><label className="lbl">Status</label>
          <select className="sel" value={editRec.status} onChange={e=>setEditRec({...editRec,status:e.target.value})}>
            {["Pending","Approved","Declined","Under Review"].map(s=><option key={s}>{s}</option>)}
          </select>
        </div>
        <div style={{display:"flex",gap:10}}>
          <button className="btn bp" style={{flex:1}} onClick={saveEdit} disabled={saving}>{saving?<><Spinner/> Saving…</>:"Save"}</button>
          <button className="btn bo" onClick={()=>setEditRec(null)} disabled={saving}>Cancel</button>
        </div>
      </div>}
    </Modal>
  </div>);
};

/* ════════════════════════════════════════════════════════════
   EXITED STAFF
   ════════════════════════════════════════════════════════════ */
const ExitedStaff=({user,exited,onAddExited,onUpdateExited,onDeleteExited})=>{
  const toast=useToast();
  const[editRec,setEditRec]=useState(null);const[showAdd,setShowAdd]=useState(false);
  const[saving,setSaving]=useState(false);
  const blank={name:"",role:"",dept:"",exitDate:"",reason:"Resignation",type:"Voluntary",clearance:"Pending",company:"STIAM",notes:""};
  const[nr,setNr]=useState(blank);
  const isSA=user.isSuperAdmin;

  const saveEdit=async()=>{
    setSaving(true);
    const{error}=await db.updateExited(editRec.id,{
      name:editRec.name,role:editRec.role,dept:editRec.dept,
      exit_date:editRec.exitDate,reason:editRec.reason,
      type:editRec.type,clearance:editRec.clearance,notes:editRec.notes
    });
    setSaving(false);
    if(error){toast.err("Update failed: "+error.message);return;}
    onUpdateExited(editRec.id,editRec);toast.ok("Record updated");setEditRec(null);
  };
  const deleteRec=async()=>{
    if(!confirm("Delete this exit record? This cannot be undone."))return;
    setSaving(true);
    const{error}=await db.deleteExited(editRec.id);
    setSaving(false);
    if(error){toast.err("Delete failed: "+error.message);return;}
    onDeleteExited(editRec.id);toast.ok("Record deleted");setEditRec(null);
  };
  const addRec=async()=>{
    if(!nr.name){toast.err("Name required");return;}
    setSaving(true);
    const row={name:nr.name,role:nr.role,dept:nr.dept,exit_date:nr.exitDate||null,
      reason:nr.reason,type:nr.type,clearance:nr.clearance,company:nr.company,notes:nr.notes};
    const{data,error}=await db.addExited(row);
    setSaving(false);
    if(error){toast.err("Failed: "+error.message);return;}
    onAddExited(mapExited(data));toast.ok("Exit record added");
    setShowAdd(false);setNr(blank);
  };

  return(<div className="ani">
    <PH title="Exited Staff Profiles" subtitle={isSA?"Full edit access — Super Admin · Live from Supabase":"Archive of former employees · Live from Supabase"} user={user}/>

      <button className="btn bp" onClick={()=>setShowAdd(true)}>+ Add Exit Record</button>
      <div style={{padding:"8px 14px",background:"#FFF5F5",border:"1px solid #FEB2B2",borderRadius:9,fontSize:12.5,color:"#C53030"}}>🔑 Super Admin — full edit rights</div>
    </div>}
    <div className="card"><div style={{overflowX:"auto"}}><table className="table">
      <thead><tr><th>Name</th><th>ID</th><th>Role</th><th>Dept</th><th>Company</th><th>Exit Date</th><th>Type</th><th>Clearance</th>{isSA&&<th>Edit</th>}</tr></thead>
      <tbody>{exited.length===0&&<tr><td colSpan={isSA?9:8} style={{textAlign:"center",padding:"30px 0",color:"#8892A4"}}>No exit records found</td></tr>}
      {exited.map((s,i)=>(
        <tr key={i}>
          <td><div style={{display:"flex",alignItems:"center",gap:8}}>
            <div className="av" style={{background:"#718096",color:"#fff",width:28,height:28,fontSize:10}}>{s.name.split(" ").map(n=>n[0]).join("").slice(0,2)}</div>
            <span style={{fontWeight:600}}>{s.name}</span></div></td>

          <td>{s.role}</td><td>{s.dept}</td>
          <td><CoTag co={s.company}/></td>
          <td>{s.exitDate||"—"}</td>
          <td><span className={`tag ${s.type==="Voluntary"?"tb":s.type==="Contractual"?"tx":"tr"}`}>{s.type}</span></td>

          {isSA&&<td><button className="btn bo bsm" onClick={()=>setEditRec({...s})}>✏️</button></td>}
        </tr>
      ))}</tbody>
    </table></div></div>

    <Modal open={!!editRec} onClose={()=>setEditRec(null)} title="Edit Exit Record" size="mbl">
      {editRec&&<div>
        <div className="g2">
          <div className="fg"><label className="lbl">Name</label><input className="inp" value={editRec.name} onChange={e=>setEditRec({...editRec,name:e.target.value})}/></div>
          <div className="fg"><label className="lbl">Role</label><input className="inp" value={editRec.role} onChange={e=>setEditRec({...editRec,role:e.target.value})}/></div>
          <div className="fg"><label className="lbl">Department</label><input className="inp" value={editRec.dept} onChange={e=>setEditRec({...editRec,dept:e.target.value})}/></div>
          <div className="fg"><label className="lbl">Exit Date</label><input type="date" className="inp" value={editRec.exitDate||""} onChange={e=>setEditRec({...editRec,exitDate:e.target.value})}/></div>
          <div className="fg"><label className="lbl">Exit Type</label>
            <select className="sel" value={editRec.type} onChange={e=>setEditRec({...editRec,type:e.target.value})}>
              <option>Voluntary</option><option>Involuntary</option><option>Contractual</option>
            </select>
          </div>
          <div className="fg"><label className="lbl">Clearance</label>
            <select className="sel" value={editRec.clearance} onChange={e=>setEditRec({...editRec,clearance:e.target.value})}>
              <option>Cleared</option><option>Pending</option><option>Withheld</option>
            </select>
          </div>
        </div>
        <div className="fg"><label className="lbl">Reason</label><input className="inp" value={editRec.reason||""} onChange={e=>setEditRec({...editRec,reason:e.target.value})}/></div>
        <div className="fg"><label className="lbl">Admin Notes</label><textarea className="inp" rows={3} value={editRec.notes||""} onChange={e=>setEditRec({...editRec,notes:e.target.value})}/></div>
        <div style={{display:"flex",gap:8}}>
          <button className="btn bp" style={{flex:1}} onClick={saveEdit} disabled={saving}>{saving?<><Spinner/> Saving…</>:"Save"}</button>
          <button className="btn bd" onClick={deleteRec} disabled={saving}>🗑 Delete</button>
          <button className="btn bo" onClick={()=>setEditRec(null)} disabled={saving}>Cancel</button>
        </div>
      </div>}
    </Modal>

    <Modal open={showAdd} onClose={()=>setShowAdd(false)} title="Add Exit Record">
      <div className="g2">
        <div className="fg"><label className="lbl">Name *</label><input className="inp" value={nr.name} onChange={e=>setNr({...nr,name:e.target.value})}/></div>
        <div className="fg"><label className="lbl">Role</label><input className="inp" value={nr.role} onChange={e=>setNr({...nr,role:e.target.value})}/></div>
        <div className="fg"><label className="lbl">Department</label><input className="inp" value={nr.dept} onChange={e=>setNr({...nr,dept:e.target.value})}/></div>
        <div className="fg"><label className="lbl">Exit Date</label><input type="date" className="inp" value={nr.exitDate} onChange={e=>setNr({...nr,exitDate:e.target.value})}/></div>
        <div className="fg"><label className="lbl">Company</label>
          <select className="sel" value={nr.company} onChange={e=>setNr({...nr,company:e.target.value})}>
            {Object.entries(COMPANIES).map(([k,c])=><option key={k} value={k}>{c.name}</option>)}
          </select>
        </div>
        <div className="fg"><label className="lbl">Exit Type</label>
          <select className="sel" value={nr.type} onChange={e=>setNr({...nr,type:e.target.value})}>
            <option>Voluntary</option><option>Involuntary</option><option>Contractual</option>
          </select>
        </div>
      </div>
      <div className="fg"><label className="lbl">Reason</label><input className="inp" value={nr.reason} onChange={e=>setNr({...nr,reason:e.target.value})}/></div>
      <div style={{display:"flex",gap:10}}>
        <button className="btn bp" style={{flex:1}} onClick={addRec} disabled={saving}>{saving?<><Spinner/> Saving…</>:"Add Record"}</button>
        <button className="btn bo" onClick={()=>setShowAdd(false)} disabled={saving}>Cancel</button>
      </div>
    </Modal>
  </div>);
};

/* ════════════════════════════════════════════════════════════
   DOCUMENT VAULT
   ════════════════════════════════════════════════════════════ */
/* mapVaultDoc: DB row → component shape */
const mapVaultDoc = d => ({
  id: d.id,
  name: d.name,
  cat: d.category,
  size: d.file_size,
  updated: d.uploaded_at ? new Date(d.uploaded_at).toLocaleDateString('en-NG') : TODAY,
  type: d.file_type,
  access: d.access_level,
  path: d.storage_path,
  uploadedBy: d.uploaded_by,
});
const DocumentVault=({user})=>{
  const toast=useToast();
  const[cat,setCat]=useState("All");
  const[docs,setDocs]=useState([]);
  const[loading,setLoading]=useState(true);
  const[uploading,setUploading]=useState(false);
  const[downloading,setDownloading]=useState(null);
  const[deleting,setDeleting]=useState(null);
  const[showUpload,setShowUpload]=useState(false);
  const[upFile,setUpFile]=useState(null);
  const[upMeta,setUpMeta]=useState({name:"",cat:"Policy",access:"All Staff"});
  const fileRef=useRef(null);

  const cats=["All","Policy","Appraisal","Guidelines","Compensation","HR Policy","General"];
  const tico={PDF:"🔴",DOCX:"🔵",XLSX:"🟢",PPT:"🟠",PPTX:"🟠",XLS:"🟢",DOC:"🔵",PNG:"🖼️",JPG:"🖼️",JPEG:"🖼️"};
  const canManage=user.isAdmin||user.isSuperAdmin;
  const canSee=d=>canManage||d.access==="All Staff";
  const filtered=docs.filter(d=>(cat==="All"||d.cat===cat)&&canSee(d));

  /* ── Load from DB on mount ── */
  const loadDocs=async()=>{
    setLoading(true);
    const{data,error}=await db.getVaultDocs();
    setLoading(false);
    if(error){
      // Table may not exist yet (offline mode) — show empty state
      if(!error.message.includes("schema")&&!error.message.includes("does not exist"))
        toast.err("Could not load vault: "+error.message);
      setDocs([]);
      return;
    }
    setDocs((data||[]).map(mapVaultDoc));
  };
  useEffect(()=>{loadDocs();},[]);

  /* ── Download ── */
  const handleDownload=async(doc)=>{
    setDownloading(doc.id);
    try{
      const{data,error}=await db.downloadVaultDoc(doc.path);
      if(error)throw new Error(error.message);
      const url=URL.createObjectURL(data);
      const a=document.createElement("a");a.href=url;a.download=doc.name;a.click();
      URL.revokeObjectURL(url);
      toast.ok("Downloaded: "+doc.name);
    }catch(e){
      // Fallback signed URL
      try{
        const url=db.getPublicUrl(doc.path);
        window.open(url,"_blank");
        toast.info("Opening in new tab");
      }catch{
        toast.err("Download failed — check storage permissions");
      }
    }
    setDownloading(null);
  };

  /* ── Preview ── */
  const handlePreview=async(doc)=>{
    try{
      // Try signed URL first (private bucket)
      const{data,error}=await supa.storage.from('hr-documents').createSignedUrl(doc.path,300);
      if(!error&&data?.signedUrl){ window.open(data.signedUrl,"_blank"); return; }
      // Fallback public URL
      window.open(db.getPublicUrl(doc.path),"_blank");
    }catch{
      toast.err("Preview failed — check storage permissions");
    }
  };

  /* ── Upload: Storage + DB row ── */
  const handleUpload=async()=>{
    if(!upFile||!upMeta.name.trim()){toast.err("Please select a file and enter a document name");return;}
    setUploading(true);
    const ext=upFile.name.split(".").pop().toUpperCase();
    const folder=upMeta.cat.toLowerCase().replace(/ /g,"-");
    const storagePath=`${folder}/${Date.now()}_${upFile.name}`;
    const sizeStr=upFile.size>1048576?(upFile.size/1048576).toFixed(1)+" MB":(upFile.size/1024).toFixed(0)+" KB";

    // 1. Upload file to Supabase Storage
    const{error:storageErr}=await db.uploadVaultDoc(storagePath,upFile);
    if(storageErr){
      setUploading(false);
      toast.err("Storage upload failed: "+storageErr.message);
      return;
    }

    // 2. Save metadata row to vault_documents table
    const row={
      name:upMeta.name,
      category:upMeta.cat,
      file_type:ext,
      file_size:sizeStr,
      storage_path:storagePath,
      access_level:upMeta.access,
      uploaded_by:user.name,
    };
    const{data,error:dbErr}=await db.addVaultDoc(row);
    setUploading(false);

    if(dbErr){
      // Storage upload succeeded but DB row failed — still show in local state
      toast.err("File uploaded but metadata save failed: "+dbErr.message);
      const localDoc={id:Date.now(),name:upMeta.name,cat:upMeta.cat,size:sizeStr,
        updated:new Date().toLocaleDateString('en-NG'),type:ext,access:upMeta.access,path:storagePath};
      setDocs(p=>[localDoc,...p]);
    } else {
      setDocs(p=>[mapVaultDoc(data),...p]);
      toast.ok("\u2705 "+upMeta.name+" uploaded successfully");
    }
    setShowUpload(false);
    setUpFile(null);
    setUpMeta({name:"",cat:"Policy",access:"All Staff"});
    if(fileRef.current) fileRef.current.value="";
  };

  /* ── Delete: Storage + DB row ── */
  const handleDelete=async(doc)=>{
    if(!window.confirm(`Permanently delete "${doc.name}"?\n\nThis will remove the file from storage. This cannot be undone.`))return;
    setDeleting(doc.id);

    // 1. Delete from Supabase Storage
    const{error:storageErr}=await db.deleteVaultDoc(doc.path);
    if(storageErr&&!storageErr.message.includes("Object not found")){
      setDeleting(null);
      toast.err("Storage delete failed: "+storageErr.message);
      return;
    }

    // 2. Delete metadata row from vault_documents table
    const{error:dbErr}=await db.deleteVaultDocRow(doc.id);
    setDeleting(null);
    if(dbErr){
      toast.err("File deleted from storage but metadata removal failed: "+dbErr.message);
    } else {
      toast.ok("Deleted: "+doc.name);
    }
    // Remove from UI regardless
    setDocs(p=>p.filter(d=>d.id!==doc.id));
  };

  return(<div className="ani">
    <PH title="Document Vault" subtitle="HR documents — Supabase Cloud Storage" user={user} live/>

    {/* Storage header banner */}
    <div className="card" style={{background:"linear-gradient(135deg,#0D1B3E,#162550)",color:"#fff",marginBottom:16,padding:"22px 26px"}}>
      <div style={{display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}}>
        <div style={{fontSize:28}}>🗄️</div>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:4}}>Supabase Cloud Storage — hr-documents Bucket</div>
          <div style={{fontSize:12.5,opacity:.8}}>Files are encrypted at rest · Metadata stored in DB · Real uploads & real deletes</div>
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
          {canManage&&<button className="btn bg" onClick={()=>setShowUpload(true)}>📤 Upload File</button>}
          <button className="btn bo bsm" onClick={loadDocs} title="Refresh from DB" style={{color:"#C9A84C",border:"1px solid rgba(201,168,76,.4)",background:"rgba(201,168,76,.1)"}}>🔄</button>
          <div style={{padding:"8px 14px",background:"rgba(201,168,76,.15)",borderRadius:9,fontSize:12,color:"#C9A84C",border:"1px solid rgba(201,168,76,.3)"}}>
            {docs.length} file{docs.length!==1?"s":""}
          </div>
        </div>
      </div>
    </div>

    {/* Category filter */}
    <div style={{display:"flex",gap:7,marginBottom:14,flexWrap:"wrap"}}>
      {cats.map(c=>(
        <button key={c} onClick={()=>setCat(c)} className="btn"
          style={{fontSize:12,padding:"6px 14px",background:cat===c?"#0D1B3E":"#fff",color:cat===c?"#fff":"#4A5568",border:"1.5px solid #E2E6F0"}}>
          {c}{c!=="All"&&<span style={{marginLeft:5,fontSize:10,opacity:.7}}>({docs.filter(d=>d.cat===c&&canSee(d)).length})</span>}
        </button>
      ))}
    </div>

    {/* Documents table */}
    <div className="card">
      {loading?(
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",padding:"48px 0",gap:12,color:"#8892A4"}}>
          <Spinner dark/><span>Loading from Supabase Storage…</span>
        </div>
      ):(
        <div style={{overflowX:"auto"}}>
          <table className="table">
            <thead>
              <tr>
                <th>Document</th><th>Category</th><th>Size</th><th>Uploaded</th>
                <th>Access</th><th>Uploaded By</th><th>Actions</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map((d,i)=>(
                <tr key={i}>
                  <td>
                    <div style={{display:"flex",alignItems:"center",gap:9}}>
                      <span style={{fontSize:18}}>{tico[d.type]||"📄"}</span>
                      <div>
                        <div style={{fontWeight:600,fontSize:13}}>{d.name}</div>
                        <div style={{fontSize:11,color:"#8892A4",fontFamily:"monospace",marginTop:1,maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={d.path}>{d.path}</div>
                      </div>
                    </div>
                  </td>
                  <td><span className="tag ty">{d.cat}</span></td>
                  <td style={{color:"#8892A4"}}>{d.size}</td>
                  <td style={{color:"#4A5568",fontSize:12}}>{d.updated}</td>
                  <td><span className={`tag ${d.access==="All Staff"?"tg":d.access==="Management"?"tb":"to"}`}>{d.access}</span></td>
                  <td style={{fontSize:12.5,color:"#4A5568"}}>{d.uploadedBy||"—"}</td>
                  <td>
                    <div style={{display:"flex",gap:5}}>
                      <button className="btn bo bsm" onClick={()=>handlePreview(d)} title="Preview in new tab">👁</button>
                      <button className="btn bo bsm" onClick={()=>handleDownload(d)} disabled={downloading===d.id} title="Download">
                        {downloading===d.id?<Spinner dark/>:"⬇"}
                      </button>
                      {canManage&&(
                        <button className="btn bd bsm" onClick={()=>handleDelete(d)} disabled={deleting===d.id} title="Delete permanently">
                          {deleting===d.id?<Spinner/>:"🗑"}
                        </button>
                      )}
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
          {filtered.length===0&&(
            <div style={{textAlign:"center",padding:"40px 0",color:"#8892A4"}}>
              <div style={{fontSize:36,marginBottom:10}}>🗄️</div>
              <div style={{fontWeight:600}}>No documents{cat!=="All"?` in "${cat}"`:"" } yet</div>
              {canManage&&<div style={{fontSize:12.5,marginTop:6}}>Click <strong>📤 Upload File</strong> to add the first document.</div>}
            </div>
          )}
        </div>
      )}
    </div>

    {/* Upload Modal */}
    <Modal open={showUpload} onClose={()=>{setShowUpload(false);setUpFile(null);setUpMeta({name:"",cat:"Policy",access:"All Staff"});}} title="Upload Document to Vault">
      <div style={{background:"#EBF8FF",border:"1px solid #BEE3F8",borderRadius:8,padding:"10px 14px",fontSize:12.5,color:"#2C5282",marginBottom:14}}>
        📦 Files are saved to <strong>Supabase Storage (hr-documents)</strong> and metadata is recorded in the database. Max 50 MB per file.
      </div>
      <div className="fg">
        <label className="lbl">Select File *</label>
        <input type="file" className="inp" ref={fileRef}
          onChange={e=>{
            const f=e.target.files[0];
            if(f){setUpFile(f);if(!upMeta.name)setUpMeta(p=>({...p,name:f.name.replace(/\.[^.]+$/,"")}));}
          }}
          accept=".pdf,.docx,.doc,.xlsx,.xls,.ppt,.pptx,.png,.jpg,.jpeg"/>
        {upFile&&(
          <div style={{marginTop:6,padding:"8px 12px",background:"#F0FFF4",borderRadius:8,fontSize:12,color:"#1A7F64",border:"1px solid #C6F6D5",display:"flex",gap:8,alignItems:"center"}}>
            <span>✅</span>
            <span><strong>{upFile.name}</strong> — {upFile.size>1048576?(upFile.size/1048576).toFixed(1)+" MB":(upFile.size/1024).toFixed(0)+" KB"}</span>
          </div>
        )}
      </div>
      <div className="fg"><label className="lbl">Document Display Name *</label>
        <input className="inp" value={upMeta.name} onChange={e=>setUpMeta({...upMeta,name:e.target.value})} placeholder="e.g. HR Policy Update 2026"/>
      </div>
      <div className="g2">
        <div className="fg"><label className="lbl">Category</label>
          <select className="sel" value={upMeta.cat} onChange={e=>setUpMeta({...upMeta,cat:e.target.value})}>
            {["Policy","Appraisal","Guidelines","Compensation","HR Policy","General"].map(c=><option key={c}>{c}</option>)}
          </select>
        </div>
        <div className="fg"><label className="lbl">Access Level</label>
          <select className="sel" value={upMeta.access} onChange={e=>setUpMeta({...upMeta,access:e.target.value})}>
            {["All Staff","Management","HR Only"].map(a=><option key={a}>{a}</option>)}
          </select>
        </div>
      </div>
      <div style={{display:"flex",gap:10}}>
        <button className="btn bp" style={{flex:1,justifyContent:"center"}} onClick={handleUpload} disabled={uploading||!upFile||!upMeta.name.trim()}>
          {uploading?<><Spinner/> Uploading to Supabase…</>:"📤 Upload & Save"}
        </button>
        <button className="btn bo" onClick={()=>{setShowUpload(false);setUpFile(null);setUpMeta({name:"",cat:"Policy",access:"All Staff"});}} disabled={uploading}>Cancel</button>
      </div>
    </Modal>
  </div>);
};

/* ════════════════════════════════════════════════════════════
   MESSAGE CENTER PAGE
   ════════════════════════════════════════════════════════════ */
const MSG_TYPE_LABELS={
  leave_requested:"Leave Request",leave_approved:"Leave Approved",leave_declined:"Leave Declined",
  advance_requested:"Advance Request",advance_approved:"Advance Approved",advance_declined:"Advance Declined",
  appraisal_submitted:"Appraisal Submitted",transfer_requested:"Transfer Request",system:"System",
};
const MessageCenter=({user,allStaff=[],notifs,onMarkRead,onMarkAll,onDeleteNotif,onDeleteAllRead,onAddNotif,sendNotif})=>{
  const toast=useToast();
  const[compose,setCompose]=useState(false);
  const[cMsg,setCMsg]=useState("");
  const[cTo,setCTo]=useState("ADMIN");
  const[sending,setSending]=useState(false);
  const[tab,setTab]=useState("inbox"); // inbox | sent

  const myNotifs=[...new Map(notifs.filter(n=>
    n.recipientId===user.id||
    (n.recipientId==="ADMIN"&&(user.isAdmin||user.isSuperAdmin))||
    (n.recipientId==="BROADCAST")
  ).map(n=>[n.id,n])).values()];
  const sentNotifs=notifs.filter(n=>n.senderId===user.id);
  const displayed=tab==="inbox"?myNotifs:sentNotifs;
  const unread=myNotifs.filter(n=>!n.read).length;

  const fmt=dt=>{
    if(!dt)return"Just now";
    const d=new Date(dt);
    const now=new Date();
    const diff=now-d;
    if(diff<60000)return"Just now";
    if(diff<3600000)return Math.floor(diff/60000)+"m ago";
    if(diff<86400000)return Math.floor(diff/3600000)+"h ago";
    return d.toLocaleString("en-NG",{dateStyle:"medium",timeStyle:"short"});
  };
  const typeColor=t=>({leave_approved:"#1A7F64",leave_declined:"#E53E3E",leave_requested:"#DD6B20",advance_approved:"#1A7F64",advance_declined:"#E53E3E",system:"#2980B9"}[t]||"#718096");
  const typeIcon=t=>({leave_requested:"📋",leave_approved:"✅",leave_declined:"❌",advance_requested:"💰",advance_approved:"✅",advance_declined:"❌",appraisal_submitted:"📊",transfer_requested:"🔄",system:"💬"}[t]||"💬");

  const sendMsg=async()=>{
    const msg=cMsg.trim();
    if(!msg){toast.err("Please type a message");return;}
    setSending(true);

    // Determine recipient(s)
    let recipientIds=[];
    if(cTo==="BROADCAST"){
      recipientIds=allStaff.filter(s=>!s.isSuperAdmin).map(s=>s.id);
    } else if(cTo==="ADMIN"){
      recipientIds=["ADMIN"];
    } else {
      recipientIds=[cTo];
    }

    // Optimistically add to local state for the sender
    const localId="local-"+Date.now();
    const localNotif={
      id:localId, recipientId:recipientIds[0], senderId:user.id,
      senderName:user.name, type:"system", message:msg,
      read:false, createdAt:new Date().toISOString(),
    };
    if(onAddNotif) onAddNotif(localNotif);

    // Insert rows into Supabase
    try{
      if(cTo==="BROADCAST"){
        // Insert one row per staff member
        const rows=recipientIds.map(rid=>({
          recipient_id:rid, sender_id:user.id, sender_name:user.name,
          type:"system", message:msg, read:false,
        }));
        const{error}=await supa.from("notifications").insert(rows);
        if(error)throw error;
      } else {
        const{error}=await db.addNotif({
          recipient_id:cTo, sender_id:user.id, sender_name:user.name,
          type:"system", message:msg, read:false,
        });
        if(error)throw error;
      }
      toast.ok(cTo==="BROADCAST"?"Broadcast sent to all staff":cTo==="ADMIN"?"Message sent to HR Admins":"Message sent");
    } catch(e){
      if(!(e.message||"").includes("schema"))toast.err("Failed to send: "+e.message);
    }

    setSending(false);
    setCMsg("");
    setCompose(false);
  };

  const recipientLabel=rid=>{
    if(rid==="ADMIN")return"All HR Admins";
    if(rid==="BROADCAST")return"All Staff (Broadcast)";
    const s=allStaff.find(x=>x.id===rid);
    return s?s.name:rid;
  };

  return(<div className="ani">
    <PH title="Message Centre" subtitle={"Notifications & HR communications · "+unread+" unread"} user={user} live/>

    <div style={{display:"flex",gap:10,marginBottom:20,alignItems:"center",flexWrap:"wrap"}}>
      <button className="btn bp" onClick={()=>setCompose(true)}>✉️ Compose</button>
      {unread>0&&<button className="btn bo" onClick={()=>onMarkAll(user.isAdmin||user.isSuperAdmin?"ADMIN":user.id)}>✓ Mark all read</button>}
      {myNotifs.some(n=>n.read)&&<button className="btn" onClick={()=>onDeleteAllRead&&onDeleteAllRead(user.isAdmin||user.isSuperAdmin?"ADMIN":user.id)} style={{background:"#FFF5F5",border:"1px solid #FEB2B2",color:"#C53030",fontSize:12}}>🗑 Delete all read</button>}
      <div style={{display:"flex",border:"1.5px solid #E2E6F0",borderRadius:8,overflow:"hidden",marginLeft:"auto"}}>
        {[["inbox","📥 Inbox",""+unread],["sent","📤 Sent",""]].map(([k,l,badge])=>(
          <button key={k} onClick={()=>setTab(k)} style={{padding:"7px 14px",background:tab===k?"#0D1B3E":"#fff",color:tab===k?"#fff":"#4A5568",border:"none",cursor:"pointer",fontSize:12.5,fontFamily:"inherit",display:"flex",alignItems:"center",gap:5}}>
            {l}{badge&&parseInt(badge)>0&&<span style={{background:"#C9A84C",color:"#0D1B3E",borderRadius:10,padding:"0 6px",fontSize:9.5,fontWeight:800}}>{badge}</span>}
          </button>
        ))}
      </div>
    </div>

    {displayed.length===0&&(
      <div className="card" style={{textAlign:"center",padding:"60px 0"}}>
        <div style={{fontSize:56}}>{tab==="inbox"?"📭":"📤"}</div>
        <div style={{fontWeight:700,color:"#0D1B3E",fontSize:16,marginTop:14}}>{tab==="inbox"?"No messages yet":"No sent messages"}</div>
        <div style={{color:"#8892A4",fontSize:13,marginTop:6}}>{tab==="inbox"?"HR notifications will appear here":"Messages you send will appear here"}</div>
      </div>
    )}

    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {displayed.map((n,i)=>{
        const color=typeColor(n.type);
        const isUnread=!n.read&&tab==="inbox";
        return(<div key={n.id||i}
          style={{background:isUnread?"#FFFFF8":"#fff",border:`1.5px solid ${isUnread?"#ECC94B":"#F0F2F8"}`,
            borderRadius:14,padding:"16px 20px",cursor:isUnread?"pointer":"default",
            borderLeft:`5px solid ${color}`,transition:"all .18s"}}
          onClick={()=>isUnread&&onMarkRead(n.id)}>
          <div style={{display:"flex",gap:14,alignItems:"flex-start"}}>
            <div style={{width:40,height:40,borderRadius:12,background:color+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>
              {typeIcon(n.type)}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10,flexWrap:"wrap",marginBottom:4}}>
                <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
                  <span style={{fontSize:11,fontWeight:700,color,textTransform:"uppercase",letterSpacing:.5}}>{n.fromName||n.senderName||MSG_TYPE_LABELS[n.type]||"System"}</span>
                  {isUnread&&<span style={{background:"#C9A84C",color:"#0D1B3E",borderRadius:10,padding:"1px 7px",fontSize:9.5,fontWeight:800}}>NEW</span>}
                  {tab==="sent"&&<span style={{fontSize:11,color:"#8892A4"}}>To: <strong style={{color:"#4A5568"}}>{recipientLabel(n.recipientId)}</strong></span>}
                </div>
                <span style={{fontSize:11.5,color:"#8892A4",flexShrink:0,whiteSpace:"nowrap"}}>{fmt(n.createdAt)}</span>
              </div>
              <div style={{fontSize:13.5,color:"#1A202C",lineHeight:1.55,fontWeight:isUnread?600:400}}>{n.message}</div>

              {tab==="inbox"&&!isUnread&&<div style={{marginTop:8,textAlign:"right"}}>
                <button onClick={e=>{e.stopPropagation();onDeleteNotif&&onDeleteNotif(n.id);}}
                  style={{fontSize:11,color:"#E53E3E",background:"#FFF5F5",border:"1px solid #FEB2B2",borderRadius:6,padding:"3px 10px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>
                  🗑 Delete
                </button>
              </div>}
            </div>
          </div>
        </div>);
      })}
    </div>

    <Modal open={compose} onClose={()=>{setCompose(false);setCMsg("");}} title="Compose Message">
      <div className="fg">
        <label className="lbl">To</label>
        <select className="sel" value={cTo} onChange={e=>setCTo(e.target.value)}>
          {(user.isAdmin||user.isSuperAdmin)&&<option value="ADMIN">📢 All HR Admins</option>}
          {(user.isAdmin||user.isSuperAdmin)&&<option value="BROADCAST">📣 All Staff (Broadcast)</option>}
          {allStaff.filter(s=>s.id!==user.id&&!s.isSuperAdmin).map(s=>(
            <option key={s.id} value={s.id}>{s.name} — {s.designation} ({s.company})</option>
          ))}
          {!user.isAdmin&&!user.isSuperAdmin&&<option value="ADMIN">📢 HR Admin Team</option>}
        </select>
      </div>
      <div className="fg">
        <label className="lbl">Message</label>
        <textarea className="inp" rows={5} placeholder="Type your message here…" value={cMsg} onChange={e=>setCMsg(e.target.value)}
          onKeyDown={e=>{if(e.key==="Enter"&&(e.ctrlKey||e.metaKey))sendMsg();}}/>
        <div style={{fontSize:11,color:"#8892A4",marginTop:4}}>Ctrl+Enter to send</div>
      </div>
      <div style={{display:"flex",gap:10}}>
        <button className="btn bp" style={{flex:1,justifyContent:"center"}} onClick={sendMsg} disabled={sending||!cMsg.trim()}>
          {sending?<><Spinner/> Sending…</>:"✉️ Send Message"}
        </button>
        <button className="btn bo" onClick={()=>{setCompose(false);setCMsg("");}}>Cancel</button>
      </div>
    </Modal>
  </div>);
};

function App(){
  const[appState,setAppState]=useState("loading"); // loading | offline | ready
  const[loadError,setLoadError]=useState("");
  const[isOffline,setIsOffline]=useState(false);
  const[user,setUser]=useState(null);
  const[active,setActive]=useState("dashboard");
  const[collapsed,setCollapsed]=useState(false);
  const[showNotifPanel,setShowNotifPanel]=useState(false);

  // All live data from Supabase (or local fallback)
  const[allStaff,setAllStaff]=useState([]);
  const[leaves,setLeaves]=useState([]);
  const[clockData,setClockData]=useState([]);
  const[exited,setExited]=useState([]);
  const[posts,setPosts]=useState([]);
  const[notifs,setNotifs]=useState([]);

  /* audit logger — fire-and-forget write to audit_log table */
  const auditLog=React.useCallback(async(action,detail,mod="General")=>{
    try{await db.addAudit({action,actor:user?.name||"System",detail,module:mod,created_at:new Date().toISOString()});}catch{}
  },[user]);

  const toast=useToast();

  /* ── Helpers ── */
  const isTableMissing=msg=>(msg||"").includes("schema cache")||(msg||"").includes("does not exist")||(msg||"").includes("relation")||(msg||"").includes("undefined");

  /* ── Initial load: fetch everything in parallel, fall back to local data ── */
  const loadAll=useCallback(async()=>{
    setAppState("loading");
    try{
      const[sr,lr,cr,er,pr]=await Promise.all([
        db.getStaff(),db.getLeaves(),db.getTodayClock(),db.getExited(),db.getPosts()
      ]);

      // If tables don't exist yet, fall back to local seed data silently
      if(sr.error&&isTableMissing(sr.error.message)){
        setAllStaff(LOCAL_STAFF);
        setExited(LOCAL_EXITED);
        setLeaves([]);setClockData([]);setPosts([]);
        setIsOffline(true);
        setAppState("ready");
        return;
      }

      // Real Supabase error (wrong URL/key, network, RLS) → show error screen
      if(sr.error)throw new Error(sr.error.message);

      setAllStaff((sr.data||[]).map(s=>{
        const mapped=mapStaff(s);
        const local=LOCAL_STAFF.find(l=>l.id===mapped.id);
        if(local){if(!mapped.manager&&local.manager)mapped.manager=local.manager;}
        return mapped;
      }));
      setLeaves((lr.data||[]).map(mapLeave));
      setClockData((cr.data||[]).map(mapClock));
      setExited((er.data||[]).map(mapExited));
      setPosts((pr.data||[]).map(mapPost));
      setIsOffline(false);
      setAppState("ready");
    }catch(e){
      // Any other error (bad URL, network down, bad key) → still try local fallback
      console.warn("Supabase error, using local data:",e.message);
      setAllStaff(LOCAL_STAFF);
      setExited(LOCAL_EXITED);
      setLeaves([]);setClockData([]);setPosts([]);
      setIsOffline(true);
      setLoadError(e.message);
      setAppState("ready");
    }
  },[]);

  useEffect(()=>{loadAll();},[loadAll]);

  /* ── Real-time: clock_records changes ── */
  useEffect(()=>{
    const channel=supa.channel("clock-live")
      .on("postgres_changes",{event:"*",schema:"public",table:"clock_records",filter:"record_date=eq."+TODAY},
        payload=>{
          const r=payload.new;
          if(!r)return;
          const mapped=mapClock(r);
          setClockData(p=>{
            const idx=p.findIndex(c=>c.id===mapped.id);
            if(idx>=0){const n=[...p];n[idx]=mapped;return n;}
            return[...p,mapped];
          });
        })
      .subscribe();
    return()=>supa.removeChannel(channel);
  },[]);

  /* ── Real-time: leave_requests changes ── */
  useEffect(()=>{
    const channel=supa.channel("leaves-live")
      .on("postgres_changes",{event:"INSERT",schema:"public",table:"leave_requests"},
        payload=>{
          const mapped=mapLeave(payload.new);
          setLeaves(p=>[mapped,...p.filter(l=>l.id!==mapped.id)]);
        })
      .on("postgres_changes",{event:"UPDATE",schema:"public",table:"leave_requests"},
        payload=>{
          const mapped=mapLeave(payload.new);
          setLeaves(p=>p.map(l=>l.id===mapped.id?mapped:l));
        })
      .subscribe();
    return()=>supa.removeChannel(channel);
  },[]);

  /* ── Leave approval ── */
  const handleApprove=async(id)=>{
    const{error}=await db.updateLeave(id,"Approved");
    if(error){toast.err("Approval failed: "+error.message);return;}
    setLeaves(p=>p.map(l=>l.id===id?{...l,status:"Approved"}:l));
    toast.ok("Leave approved");
    // Notify the requesting staff member
    const leave=leaves.find(l=>l.id===id);
    if(leave&&!isOffline){
      await db.addNotif([{
        recipient_id:leave.staffId,
        from_name:user.name,
        title:"✅ Leave Request Approved",
        message:`Your ${leave.type} request (${leave.from} – ${leave.to}, ${leave.days} days) has been approved by HR.`,
        type:"success",read:false
      }]);
    }
  };
  const handleDecline=async(id)=>{
    const{error}=await db.updateLeave(id,"Declined");
    if(error){toast.err("Failed: "+error.message);return;}
    setLeaves(p=>p.map(l=>l.id===id?{...l,status:"Declined"}:l));
    toast.ok("Leave declined");
    // Notify the requesting staff member
    const leave=leaves.find(l=>l.id===id);
    if(leave&&!isOffline){
      await db.addNotif([{
        recipient_id:leave.staffId,
        from_name:user.name,
        title:"❌ Leave Request Declined",
        message:`Your ${leave.type} request (${leave.from} – ${leave.to}, ${leave.days} days) was not approved. Please contact HR for details.`,
        type:"error",read:false
      }]);
    }
  };

  /* ── Clock handlers (local state — real-time channel syncs DB changes) ── */
  const handleClockIn=(staffId,time,status)=>{
    setClockData(p=>{
      const idx=p.findIndex(c=>c.id===staffId);
      const rec={id:staffId,ci:time,co:"—",status};
      if(idx>=0){const n=[...p];n[idx]=rec;return n;}
      return[...p,rec];
    });
  };
  const handleClockOut=(staffId,time)=>{
    setClockData(p=>p.map(c=>c.id===staffId?{...c,co:time}:c));
  };

  /* ── Staff mutations ── */
  const handleAddStaff=s=>setAllStaff(p=>[...p,s]);
  const handleUpdateStaff=(id,updates)=>setAllStaff(p=>p.map(s=>s.id===id?{...s,...updates}:s));

  /* ── Exited mutations ── */
  const handleAddExited=r=>setExited(p=>[r,...p]);
  const handleUpdateExited=(id,u)=>setExited(p=>p.map(e=>e.id===id?{...e,...u}:e));
  const handleDeleteExited=id=>setExited(p=>p.filter(e=>e.id!==id));

  /* ── Post mutations ── */
  const handleAddPost=p2=>setPosts(p=>[p2,...p]);
  const handleUpdatePost=(id,u)=>setPosts(p=>p.map(x=>x.id===id?{...x,...u}:x));

  /* ── Notification helpers ── */
  const addNotifLocal=n=>setNotifs(p=>[n,...p.filter(x=>x.id!==n.id)]);
  const unreadCount=notifs.filter(n=>!n.read).length;
  const notifyAdmin=()=>{}; // placeholder — real notifications go through db.addNotif directly

  const sendNotif=async(recipientId,type,message,senderId,senderName)=>{
    const local={id:"local-"+Date.now(),recipientId,senderId,senderName,type,message,read:false,createdAt:new Date().toISOString()};
    addNotifLocal(local);
    // Best-effort save to Supabase
    db.addNotif({recipient_id:recipientId,sender_id:senderId,sender_name:senderName,type,message,read:false})
      .then(({data})=>{if(data)setNotifs(p=>p.map(n=>n.id===local.id?mapNotif(data):n));})
      .catch(()=>{});
  };

  const handleMarkRead=id=>{ setNotifs(p=>p.map(n=>n.id===id?{...n,read:true}:n)); db.markRead(id).catch(()=>{}); };
  const handleDeleteNotif=async(id)=>{
    const{error}=await db.deleteNotif(id);
    if(error){toast.err("Could not delete message: "+error.message);return;}
    setNotifs(p=>p.filter(n=>n.id!==id));
  };
  const handleDeleteAllRead=async(recipId)=>{
    const{error}=await db.deleteAllRead(recipId);
    if(error){toast.err("Could not delete messages: "+error.message);return;}
    setNotifs(p=>p.filter(n=>!(n.read&&(n.recipientId===recipId||n.recipientId==='ADMIN'&&(user.isAdmin||user.isSuperAdmin)))));
  };
  const handleMarkAll=recipId=>{ setNotifs(p=>p.map(n=>n.recipientId===recipId?{...n,read:true}:n)); db.markAllRead(recipId).catch(()=>{}); };

  /* ── Load notifications for logged-in user ── */
  const loadNotifs=useCallback(async(usr)=>{
    if(!usr)return;
    const recipId=usr.isAdmin||usr.isSuperAdmin?"ADMIN":usr.id;
    const{data,error}=await db.getNotifs(recipId);
    if(!error&&data)setNotifs(data.map(mapNotif));
  },[]);

  const login=s=>{
    setUser(s);
    setActive((s.isAdmin||s.isSuperAdmin)?"dashboard":"myprofile");
    loadNotifs(s);
    try{db.addAudit({action:"login",actor:s.name,detail:"Logged in",module:"Auth",created_at:new Date().toISOString()});}catch(e){}
  };
  const logout=()=>{setUser(null);setActive("dashboard");setNotifs([]);};

  // ── Session timeout: log out after 300s of inactivity ──
  useEffect(()=>{
    if(!user)return;
    let timer=setTimeout(()=>{
      logout();
    },300000);
    const reset=()=>{clearTimeout(timer);timer=setTimeout(()=>{logout();},300000);};
    const events=["mousemove","keydown","mousedown","touchstart","scroll","click"];
    events.forEach(e=>window.addEventListener(e,reset,{passive:true}));
    return()=>{clearTimeout(timer);events.forEach(e=>window.removeEventListener(e,reset));};
  },[user]);

  if(appState==="loading")return<><G/><LoadingScreen/></>;
  if(!user)return<><G/><SignIn onLogin={login} allStaff={allStaff}/></>;

  const sw=collapsed?64:228;
  const pendingCount=leaves.filter(l=>l.status==="Pending").length;

  const sharedProps={user,allStaff,leaves};

  const logAction=(action,detail,mod)=>auditLog(action,detail,mod);
  const ADMIN_PAGES={
    dashboard:<Dashboard {...sharedProps} onApprove={handleApprove} onDecline={handleDecline}/>,
    analytics:<HRAnalytics user={user} allStaff={allStaff} leaves={leaves}/>,
    employees:<AllEmployees user={user} allStaff={allStaff} onAddStaff={handleAddStaff}/>,
    directory:<EmployeeDirectory user={user} allStaff={allStaff}/>,
    contracts:<ContractRecords user={user} allStaff={allStaff} onLog={logAction}/>,
    performance:<Performance user={user} allStaff={allStaff}/>,
    benefits:<BenefitsAdmin user={user} allStaff={allStaff} onLog={logAction}/>,
    clockin:<ClockIn user={user} allStaff={allStaff} clockData={clockData} onClockIn={handleClockIn} onClockOut={handleClockOut}/>,
    leavecal:<LeaveCalendar user={user} allStaff={allStaff} leaves={leaves}/>,
    redeploy:<Redeployment user={user} posts={posts} onAddPost={handleAddPost} onUpdatePost={handleUpdatePost} allStaff={allStaff}/>,
    disciplinary:<DisciplinaryModule user={user} allStaff={allStaff} onLog={logAction}/>,
    onboarding:<OnboardingModule user={user} allStaff={allStaff} onLog={logAction} onAddStaff={handleAddStaff}/>,
    training:<TrainingModule user={user} allStaff={allStaff} onLog={logAction}/>,
    surveys:<SurveysModule user={user} allStaff={allStaff}/>,
    vault:<DocumentVault user={user}/>,
    exited:<ExitedStaff user={user} exited={exited} onAddExited={handleAddExited} onUpdateExited={handleUpdateExited} onDeleteExited={handleDeleteExited}/>,
    auditlog:<AuditLog user={user} onLog={logAction}/>,
    compliance:<ComplianceCenter user={user} allStaff={allStaff} leaves={leaves}/>,
    requests:<Requests {...sharedProps} onAddLeave={l=>setLeaves(p=>[l,...p])} onApprove={handleApprove} onDecline={handleDecline} isOffline={isOffline}/>,
    dresscode:<DressCode user={user}/>,
    messages:<MessageCenter user={user} allStaff={allStaff} notifs={notifs} onMarkRead={handleMarkRead} onMarkAll={()=>handleMarkAll(user.isAdmin||user.isSuperAdmin?"ADMIN":user.id)} onDeleteNotif={handleDeleteNotif} onDeleteAllRead={handleDeleteAllRead} onAddNotif={addNotifLocal} sendNotif={sendNotif}/>,
    admincenter:<AdminCenter user={user} allStaff={allStaff} onUpdateStaff={handleUpdateStaff}/>,
    passwordcenter:<PasswordCenter user={user} allStaff={allStaff} onUpdateStaff={handleUpdateStaff}/>,
  };
  const STAFF_PAGES={
    myprofile:<MyProfile user={user} allStaff={allStaff} onUpdateStaff={handleUpdateStaff} onAddExited={handleAddExited} onLogout={logout}/>,
    myleave:<MyLeave user={user} leaves={leaves} onAddLeave={l=>setLeaves(p=>[l,...p])} isOffline={isOffline}/>,
    leavecal:<LeaveCalendar user={user} allStaff={allStaff} leaves={leaves}/>,
    requests:<Requests {...sharedProps} onAddLeave={l=>setLeaves(p=>[l,...p])} onApprove={handleApprove} onDecline={handleDecline} isOffline={isOffline}/>,
    training:<TrainingModule user={user} allStaff={allStaff}/>,
    surveys:<SurveysModule user={user} allStaff={allStaff}/>,
    dresscode:<DressCode user={user}/>,
    vault:<DocumentVault user={user}/>,
    directory:<EmployeeDirectory user={user} allStaff={allStaff}/>,
    messages:<MessageCenter user={user} allStaff={allStaff} notifs={notifs} onMarkRead={handleMarkRead} onMarkAll={()=>handleMarkAll(user.id)} onDeleteNotif={handleDeleteNotif} onDeleteAllRead={handleDeleteAllRead} onAddNotif={addNotifLocal} sendNotif={sendNotif}/>,
    passwordcenter:<PasswordCenter user={user} allStaff={allStaff} onUpdateStaff={handleUpdateStaff}/>,
  };
  const pages=(user.isAdmin||user.isSuperAdmin)?ADMIN_PAGES:STAFF_PAGES;

  return(
  <div style={{minHeight:"100vh"}}>
    <G/>
    <TopBar user={user} notifs={notifs} unread={unreadCount}
      onMarkRead={handleMarkRead} onMarkAll={()=>handleMarkAll(user.isAdmin||user.isSuperAdmin?"ADMIN":user.id)}
      onBell={()=>setShowNotifPanel(p=>!p)}
      showPanel={showNotifPanel} onClosePanel={()=>setShowNotifPanel(false)}/>
    <Sidebar active={active} setActive={setActive} user={user} collapsed={collapsed}
      setCollapsed={setCollapsed} onLogout={logout} pendingCount={pendingCount} unreadCount={unreadCount}/>
    <main style={{marginLeft:sw,paddingTop:52,padding:"84px 32px 48px",minHeight:"100vh",transition:"margin-left .25s"}}>
      {isOffline&&(
        <div style={{background:"#FFFFF0",border:"1px solid #ECC94B",borderRadius:12,padding:"12px 18px",marginBottom:20,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
          <span style={{fontSize:18}}>⚠️</span>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,color:"#975A16",fontSize:13}}>Supabase tables not set up yet — running on local data</div>
            <div style={{color:"#744210",fontSize:12,marginTop:2}}>
              Run <code style={{background:"#FEF3C7",padding:"1px 6px",borderRadius:4,fontFamily:"monospace"}}>src/schema_complete.sql</code> in your Supabase SQL Editor to go live. Changes made now won't be saved.
            </div>
          </div>
          <button className="btn bg bsm" onClick={loadAll}>🔄 Retry</button>
        </div>
      )}
      {pages[active]||<div style={{textAlign:"center",padding:40,color:"#8892A4"}}>Page not found</div>}
    </main>
  </div>
  );
}



/* ════════════════════════════════════════════════════════════
   NIGERIA PAYROLL HELPERS
   ════════════════════════════════════════════════════════════ */
const calcPAYE=(annualGross)=>{
  const bands=[[300000,.07],[300000,.11],[500000,.15],[500000,.19],[1600000,.21],[Infinity,.24]];
  let tax=0,remaining=Math.max(0,annualGross-200000);
  bands.forEach(function(b){
    if(remaining<=0)return;
    const band=b[0],rate=b[1];
    const taxable=Math.min(remaining,band);
    tax+=taxable*rate;
    remaining-=taxable;
  });
  return Math.round(tax/12);
};
const calcPayroll=(grossSalary)=>{
  const pension_emp=Math.round(grossSalary*0.08);
  const pension_er=Math.round(grossSalary*0.10);
  const nhf=Math.round(grossSalary*0.025);
  const paye=calcPAYE(grossSalary*12);
  const transport=Math.round(grossSalary*0.15);
  const housing=Math.round(grossSalary*0.15);
  const basic=Math.round(grossSalary*0.70);
  const totalDeductions=pension_emp+nhf+paye;
  const net=grossSalary-totalDeductions;
  return{gross:grossSalary,basic,transport,housing,pension_emp,pension_er,nhf,paye,totalDeductions,net};
};

const HRAnalytics=({user,allStaff,leaves})=>{
  const curYear=new Date().getFullYear();
  const depts=[...new Set(allStaff.map(s=>s.dept))].sort();
  const cos=Object.keys(COMPANIES);

  // Headcount by entity
  const headcountByCo=cos.map(k=>({label:COMPANIES[k].short,count:allStaff.filter(s=>s.company===k).length,color:COMPANIES[k].color}));

  // Headcount by dept (top 8)

    .sort((a,b)=>b.count-a.count).slice(0,8);

  // Leave stats
  const thisYearLeaves=leaves.filter(l=>l.from&&l.from.startsWith(String(curYear)));
  const approvedLeaves=thisYearLeaves.filter(l=>l.status==="Approved");
  const pendingLeaves=leaves.filter(l=>l.status==="Pending");

    type:t,count:thisYearLeaves.filter(l=>l.type===t).length
  })).sort((a,b)=>b.count-a.count);

      {sub&&<div style={{fontSize:11,color:"#8892A4",marginTop:3}}>{sub}</div>}
    </div>
  );

  return(<div className="ani">
    <PH title="HR Analytics" subtitle={"Live workforce intelligence · "+curYear} user={user}/>

    {/* Key metrics */}
    <div className="g4" style={{marginBottom:20}}>
      <StatCard icon="👥" label="Total Workforce" value={staffCount} sub={adminCount+" admin · "+(staffCount-adminCount)+" staff"} color="#0D1B3E"/>
      <StatCard icon="📅" label="Leaves This Year" value={approvedLeaves.length} sub={totalDaysTaken+" total days taken"} color="#1A7F64"/>
      <StatCard icon="⏳" label="Pending Requests" value={pendingLeaves.length} sub="awaiting approval" color="#E67E22"/>
      <StatCard icon="📊" label="Admin Ratio" value={(adminCount/staffCount*100).toFixed(0)+"%" } sub={adminCount+" of "+staffCount} color="#C9A84C"/>
    </div>

    <div className="g2" style={{marginBottom:20}}>
      {/* Headcount by entity */}
      <div className="card">
        <div style={{fontFamily:"'Playfair Display',serif",fontSize:15,color:"#0D1B3E",marginBottom:16}}>🏢 Headcount by Entity</div>
        {headcountByCo.map(({label,count,color})=>(
          <div key={label} style={{marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:12.5,marginBottom:4}}>
              <span style={{fontWeight:600}}>{label}</span><span style={{color:"#8892A4"}}>{count} staff</span>
            </div>
            <div style={{background:"#E2E6F0",borderRadius:4,height:8,overflow:"hidden"}}>
              <div style={{width:(count/staffCount*100)+"%",height:"100%",background:color,borderRadius:4,transition:"width 1s"}}/>
            </div>
          </div>
        ))}
      </div>

      {/* Department distribution */}
      <div className="card">
        <div style={{fontFamily:"'Playfair Display',serif",fontSize:15,color:"#0D1B3E",marginBottom:16}}>🏗 Department Distribution</div>
        {byDept.map(({dept,count})=>(
          <div key={dept} style={{marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:12.5,marginBottom:3}}>

              <span style={{color:"#8892A4"}}>{count}</span>
            </div>
            <div style={{background:"#E2E6F0",borderRadius:4,height:6}}>
              <div style={{width:(count/maxBar*100)+"%",height:"100%",background:"#0D1B3E",borderRadius:4}}/>
            </div>
          </div>
        ))}
      </div>
    </div>

    <div className="g2">
      {/* Leave by type */}
      <div className="card">
        <div style={{fontFamily:"'Playfair Display',serif",fontSize:15,color:"#0D1B3E",marginBottom:16}}>📋 Leave Requests by Type ({curYear})</div>
        {leaveByType.length===0?<div style={{color:"#8892A4",fontSize:13}}>No leave data yet</div>:
          leaveByType.map(({type,count})=>(
            <div key={type} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #F0F0F0"}}>
              <span style={{fontSize:13}}>{type}</span>
              <span style={{fontWeight:700,fontSize:13,color:"#0D1B3E"}}>{count}</span>
            </div>
          ))
        }
      </div>

      {/* Workforce summary table */}
      <div className="card">
        <div style={{fontFamily:"'Playfair Display',serif",fontSize:15,color:"#0D1B3E",marginBottom:16}}>📊 Workforce Summary</div>
        {[
          ["Total Active Staff",staffCount],
          ["HR Admins",adminCount],
          ["Regular Staff",staffCount-adminCount],
          ["Total Leave Days ("+curYear+")",totalDaysTaken],
          ["Avg Leave/Person",staffCount>0?(totalDaysTaken/staffCount).toFixed(1):0],
          ["Approval Rate",thisYearLeaves.length>0?(approvedLeaves.length/thisYearLeaves.length*100).toFixed(0)+"%":"—"],
          ["Companies",cos.length],
          ["Departments",depts.length],
        ].map(([l,v])=>(
          <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid #F0F0F0",fontSize:13}}>
            <span style={{color:"#4A5568"}}>{l}</span>
            <span style={{fontWeight:700,color:"#0D1B3E"}}>{v}</span>
          </div>
        ))}
      </div>
    </div>
  </div>);
};

/* ════════════════════════════════════════════════════════════
   EMPLOYEE DIRECTORY
